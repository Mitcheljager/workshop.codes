# This file is generated via script/get_hero_lore.rb

-
  hero: "Sierra"
  entries:
    - heading: "Life On The Run"
      paragraphs:
        - "Sierra grew up everywhere. Her mother, Kendra Woods, never said much about her past or explained why they were always on the move, but she taught Sierra how to spot trouble. As she bounced from school to school, Sierra consistently placed at the top of her class, but her preternatural skill and itinerant lifestyle put her at odds with her peers. Through it all, Sierra’s mother encouraged Sierra to take pride in her exceptional talent and celebrate every win, instilling in her a sense of self-confidence that she would carry with her into adulthood."
        - "Just before her thirteenth Birthday, Sierra’s mother mysteriously disappeared. Alone for the first time, Sierra followed her mother’s emergency protocol and used the bus ticket left in her mother’s things. The trail led her to the father she’d never met: James Turner, a park ranger in Virginia. As they grew closer, James explained how he met Kendra when she was living off the grid; how they settled down and started a family together, thinking they were safe in the seclusion of the Appalachian mountains; and how only a year later, Sierra’s mother fled in the night, taking their daughter with her. The only clue he had to Kendra’s past was that after she disappeared with Sierra, the US Government raided the house they'd built together, asking questions about “Project Naughton.”"
    - heading: "Summit Squad"
      paragraphs:
        - "Sierra was determined to track her mother down. With her father’s support, Sierra doggedly pursued the only lead she had. But “Project Naughton” was highly classified—whatever was left of the program had been transferred to Helix Security International, reportedly sealed away in a vault at Watchpoint: Grand Mesa. Leveraging her unique physical prowess and exceptional intelligence, Sierra applied to work for Helix and quickly found her place as a squad leader in Helix’s Perilous Operations team—colloquially known as the Summit Squad—which specialized in missions in difficult terrain."
        - "Utilizing plasma weaponry and her trusty R.O.T.H (remote operated traversal helper) unit DoR.O.T.H.y, Sierra spearheaded rescue missions in narrow canyons, busted criminal operations in cave networks, and lead her team to success atop the world’s highest peaks. From dangers in the Grand Canyon to Niagara, there was no challenge too great for Sierra to take on.  In just a few years, she earned a promotion to Watchpoint: Grand Mesa, just as she had planned. Finally, she was a step closer to the truth."
    - heading: "Project Naughton"
      paragraphs:
        - "As the Head of Security at Grand Mesa, the youngest in Helix’s history, Sierra finally had access to classified documents. She learned that her mother, whose real name was Kendra Banks, had another moniker: Soldier: 00. As the first candidate of the Soldier Enhancement program, Sierra’s mother had been subject to a series of experiments that had altered her body and given her uncanny abilities. Kendra’s service after that point was poorly documented or redacted, suggesting that she’d defected from the program shortly after her procedure and been in hiding ever since. Finally, Sierra’s own miraculous strength and skill made sense... but her mother’s whereabouts remained a mystery. "
    - heading: "Reign Of Talon"
      paragraphs:
        - "When Watchpoint: Grand Mesa was attacked by Talon, Sierra and her squad joined forces with Overwatch to fight them off. Sierra quickly took command, directing her squad to assist against the Deadlock Gang and Talon’s forces. Knowing Overwatch’s history of working with Jack Morrison and Gabriel Reyes, two of the Soldier Enhancement Program’s greatest successes, Sierra hopes that working with Overwatch will give her the information she needs to continue her search."
-
  hero: "Ramattra"
  entries:
    - heading: "Shambali"
      paragraphs:
        - "Ramattra was never designed to co-exist with humanity. The Ravager omnic series was created early in the Omnic Crisis, part of a commander class of omnics whose role was to guide units into combat and adapt various strategic protocols to battlefield condition changes in real time."
        - "After the Crisis, Ramattra heard rumors of a mysterious omnic named Aurora—the first of their kind. Intrigued and seeking direction, Ramattra embarked on a pilgrimage to the Shambali Monastery in Nepal, a place where Aurora was said to have resided. Ramattra survived the harsh journey and was welcomed by Tekhartha Mondatta. Choosing to become a monk of the Shambali, Ramattra studied under Mondatta for years, learning about the Iris—the mysterious phenomenon at the heart of the monks’ teachings—and the importance of coexisting with humans."
        - "Years later, Ramattra began venturing outside the temple seeking enlightenment. It was on one of his journeys that he met an omnic named Zenyatta whom he guided to Shambali, in hopes the omnic would find purpose there as he did. However, as time wore on, Ramattra failed to see true progress in the monks’ mission of peace. The Shambali urged Ramattra to be patient, but all around him, Ramattra saw his people dying . . . and no one taking action."
    - heading: "Null Sector"
      paragraphs:
        - "Ramattra knew he could follow the Shambali teachings no longer. He left the temple, seeking out omnics fighting in secret around the world and protecting them from the abuse of humans. The truths he shared with those he met inspired others and over time he gained an underground following of these hurt and angry omnics. Ramattra initially focused on building loyalty in his followers, but true radicalization and militarization would not be far behind."
        - "Soon Ramattra’s forces were large enough to warrant a test. The target was London, to liberate the omnics there and see how his forces would perform to a world nearly two decades after the Omnic Crisis. Null Sector was ultimately defeated by Overwatch, a scenario Ramattra did not anticipate since Overwatch was forbidden to operate in the country. In addition, the omnics of London did not support the sacrifices on their behalf, going so far as to denounce the actions of Null Sector."
        - "It’s been years since Ramattra—or Null Sector—was last seen. But now, for reasons unknown, Null Sector has appeared in the skies over Paris, Busan, and Rio. What’s certain is that Ramattra will see his plans for the future of omnics through . . . whatever the cost."
    - heading: "Calm Before the Storm"
      paragraphs:
        - "Following a worldwide invasion, Null Sector’s ships have retreated, taking their subjugated omnics with them. Ramattra has seemingly disappeared without a trace, his whereabouts as unknown as his next move."
-
  hero: "Ana"
  entries:
    - heading: "Overwatch"
      paragraphs:
        - "As the Omnic Crisis inflicted a heavy toll on Egypt, the country's depleted and undermanned armed forces relied on elite snipers for support. Among them was Ana Amari, who was widely considered to be the world's best. Her superior marksmanship, decision-making, and instincts made her a natural selection to join the Overwatch strike team that would end the war."
        - "Following the success of Overwatch's original mission, Ana served for many years as Strike Commander Morrison's second-in-command. Despite her responsibilities in leading the organization, Ana refused to step away from combat operations. She remained on active duty well into her fifties, until she was believed to have been killed during a hostage rescue mission by the Talon operative known as Widowmaker."
    - heading: "Post Overwatch"
      paragraphs:
        - "In truth, Ana survived that encounter, despite being gravely wounded and losing her right eye. During her recovery, she wrestled with the weight of a life spent in combat, and she chose to stay out of the world's growing conflicts. However, as time passed, she realized she could not sit on the sidelines while people threatened her city and the innocents around her. Ana rejoined the fight, this time as a healer, and dedicated herself to monitoring global security threats. Prior to disrupting Talon operations in Cairo, she intercepted an unlikely broadcast: the Overwatch Recall from her former friend, Winston."
    - heading: "Recall"
      paragraphs:
        - "Ana remained uncertain about the Recall, but she had decided to help her comrades from the shadows. She sent word to Cole Cassidy, knowing that he had survived the demise of Overwatch and returned as a gunslinger for hire. Ana knew the organization needed new blood—people like Cassidy and her daughter, Pharah—were it to stand a chance, and worried the old guard would only poison the agency’s return. She shared as much with her daughter in an overdue reunion, before embarking on her own mission with Soldier: 76."
        - "With no regrets left, Ana travels the world tracking down Talon and the ghosts that haunt her former allies. And while she didn’t rejoin Overwatch, Ana keeps her eye on their exploits just in case."
    - heading: "Reign of Talon"
      paragraphs:
        - "After Ana’s travels were suddenly interrupted by Talon’s attack on Gibraltar, she teams up with Overwatch once more to confront the looming global threat—at least until it’s been dealt with."
-
  hero: "Anran"
  entries:
    - heading: "The Perfect Prodigy"
      paragraphs:
        - "Raised to be the perfect prodigy, Anran grew up aspiring to transcend the sky-high expectations of her parents. Since the age of three, they personally trained her in academics and in kung fu, enrolling her in competitive wushu-taolu and classical Chinese dance as soon as she was old enough. Throughout her competitive career, she pushed through training injuries to break records year after year, never once finishing off the podium. Despite her success, she announced an early competitive retirement, relegating dance to a hobby as she entered the prestigious Wuxing University Fire College to focus on her wushu studies."
    - heading: "Family Dynamics"
      paragraphs:
        - "Among the many responsibilities Anran’s parents put on her shoulders, she was expected to help whip her 3-year-younger brother, Wuyang, into shape. Growing up, they emphasized that as his sole elder sister, it was her job to help teach, guide, and protect him —and protect him she did. She clashed with her parents often, stubbornly standing up for Wuyang any time they were dissatisfied with his progress in training, shouldering blame and claiming responsibility for failing as his mentor. After years of internalizing his shortcomings as her own, it was a relief when Wuyang finally found his footing at Wuxing University's Water College. But as he walked his own path out of reach of her guidance, she struggled to let go of her role in his life."
    - heading: "Wuxing University: Fire College"
      paragraphs:
        - "Anran was a star student at Wuxing University’s Fire College, a program dedicated to training China’s future top battle strategists through the lens of martial arts philosophies. Although she was undoubtedly a role model for her peers, most students found her extraordinary competence intimidating. Anyone brave enough to withstand her harsh, but constructive criticism found themselves improving exponentially alongside her, and she never gave up on those who were willing to put in the work."
        - "During the Null Sector attack on Chengdu, Anran and a small squadron of Fire College students were deployed to help evacuate civilians until official forces arrived. As Null Sector overwhelmed the students, Anran bought time for her peers to retreat, taking the whole fight on alone. With Wuyang arriving to her aid just in time, the two siblings were able to fight their way back out of danger. Their efforts saving Chengdu caught Overwatch’s attention, earning them both invitations to join their ranks."
    - heading: "Reign Of Talon"
      paragraphs:
        - "After Anran officially graduated, the two siblings began their journey to Watchpoint: Gibraltar. But their warm welcome didn't go as planned—Talon launched an attack on the base just as they arrived. As the siblings join the fray, Anran faces her future with a renewed intent to help Overwatch weather the conflict unfolding before them."
-
  hero: "Ashe"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Born into a wealthy family, Ashe grew up surrounded by privilege. Her parents owned the Arbalest Arms Company, a family business which had grown in power and scope during the Omnic Crisis. While the couple had little interest in weaponry or tech, they had become highly sought-after business consultants and coaches for the global elite. Though her parents paid little attention to her (mostly leaving her in the care of the family’s omnic butler, B.O.B., they ensured that Ashe had every opportunity to succeed. But a chance meeting with a local ruffian named Cole Cassidy, and an impromptu string of crimes committed together, opened her eyes to her true calling. The satisfaction of outwitting her targets and the thrill of getting away with it set her on the outlaw path."
    - heading: "Deadlock Rebel"
      paragraphs:
        - "Along with the other three founders of the Deadlock Rebels , Ashe started to make a name for herself with bigger and more extravagant heists. Her actions ultimately attracted the attention of Overwatch, who busted the gang early into their exploits, taking Cassidy into custody. The Deadlock Gang’s rapid rise to prominence put them at odds with more than just law enforcement, too. The other criminal organizations in the American Southwest wanted a piece of their pie; the encounters often became violent. After years of skirmishes and bloodshed, Ashe called the heads of the major groups together."
        - "Ashe saw the potential to grow the influence of all. She used what she’d learned from her parents’ business to bring order to these groups. Her proposal was that the gangs could work together (or at least, not work against each other). No longer having to focus her energies on squabbles with the other gangs, Ashe wrote her name across the American Southwest with a string of audacious heists and operations that cemented her legacy as an outlaw legend."
        - "Her principles? Keep your word, don’t work with the law, respect each other’s territory, and always punish betrayal. Speaking of which, some decades after Cole Cassidy turned coat for Overwatch, the Deadlock Rebels received a tip regarding precious tech moving across their turf via hypertrain. Too lucrative to ignore, the gang planned a train heist, only to learn they were the ones being robbed. Cassidy incapacitated the gang and released Echo into the world, singlehandedly stealing Ashe’s bike, her score, and her shot at revenge."
        - "But in these uncertain times, one thing is certain: Ashe gets what she wants. And she and her Deadlock Rebels won't stop until they claim what's theirs (and likely, what's yours)."
    - heading: "Reign of Talon"
      paragraphs:
        - "During Talon’s global takeover, Ashe and the Deadlock Gang struck a temporary deal with Vendetta to secure a weapons cache. Together, they launched an attack on Watchpoint: Grand Mesa, where they fiercely clashed with Helix Security and Overwatch."
-
  hero: "Baptiste"
  entries:
    - heading: "Caribbean Coalition"
      paragraphs:
        - "Jean-Baptiste Augustin was one of the 30 million children orphaned by the Omnic Crisis. With limited opportunities and resources, he enlisted in the military. The Caribbean Coalition, a pan-island force formed in response to the Crisis, became his new home. Guided by his innate desire to help people, Baptiste chose the path of a combat medic and served in an elite branch of the Caribbean Coalition’s special ops."
        - "After his service was complete, Baptiste struggled to find a demand for his unique skills. He turned to one of the few opportunities open to him: joining the Talon mercenary group, one of the many organizations that were poised to profit off the chaos in the war's aftermath."
    - heading: "Talon"
      paragraphs:
        - "For the first time ever, Baptiste had a taste of the good life. Talon's missions were easy and paid well, and he put aside some of his earnings to set up a clinic in his hometown. But slowly, his unit's orders escalated in brutality, expanding into assassinations and operations with civilian casualties. Confronted by his team's actions, Baptiste realized he was perpetuating a cycle of violence like the one that had destroyed his own community. He abandoned Talon, disgusted with what he had done and determined to forge a new path for himself."
        - "But Talon would not let him go. Baptiste knew too much, and they sent operatives to silence him. Agent after agent came for him, including Baptiste's former comrades. To stay under the radar, Baptiste drifted from place to place, aiding in humanitarian efforts around the globe. The few Talon members who managed to track him down were never seen again."
    - heading: "On The Run"
      paragraphs:
        - "After years on the run, Baptiste returned to his native Haiti to help the clinic he’d co-founded, an action that allowed Talon to spring a carefully laid trap. Mauga and Trung Le Nguyen, fellow Talon soldiers urged Baptiste to accompany them on a mission to shake down a local businessman, or fight—and die—now. To survive, Baptiste agreed, but when Baptiste found out the man had valuable intel about Overwatch, he saved him. His old friend, Mauga, gave Baptiste one final chance to return to Talon outside of a body bag, but he refused, escaping with the valuable intel: the list of names and locations to which Winston had broadcast Overwatch’s Recall."
        - "The hit list of known and likely Overwatch agents spurred Baptiste to warn those unfortunate enough to find their names on it, beginning with Dr. Angela Ziegler. In his efforts to locate Ziegler, Baptiste instead crossed paths with a suspicious Cassidy on his own mission to recruit global heroes for a renewed Overwatch. As Cassidy and Baptiste fell within Talon's crosshairs, their chance encounter and unlikely partnership gave Baptiste a chance at the redemption he sought. Baptiste now works toward a better world, healing where he can and fighting when he must. He knows that he cannot undo his past—but that making a difference now is what matters."
    - heading: "Reign Of Talon"
      paragraphs:
        - "Now part of the re-established Overwatch, Baptiste's skills as a combat medic are put to the test. As he faces familiar enemies from Talon, he deliberates whether or not to reveal his past ties to them. He knows that he cannot undo his past—that making a difference now is what matters. The question is whether his new allies will think the same."
-
  hero: "Bastion"
  entries:
    - heading: "Omnic Crisis"
      paragraphs:
        - "Originally created for peacekeeping purposes, Bastion-E54 robot units possessed the unique ability to rapidly reconfigure themselves into an assault-cannon mode. But during the Omnic Crisis, they were turned against their human makers, forming the bulk of the omnics' rebel army. Following the resolution of the crisis, nearly all of them were destroyed or disassembled. To this day, Bastion units still symbolize the horrors of the conflict."
        - "One unique Bastion unit, severely damaged in the final battles of the war, was left forgotten for over a decade. He lay dormant, exposed to the elements and rusting while nature slowly reclaimed him. Overgrown with vines and roots and nested upon by small animals, the robot sat inert, seemingly unaware of the passing of time. That was until one fateful day, when he unexpectedly reactivated. With his combat programming all but lost, he instead displayed an intense curiosity about the natural world and its inhabitants. This inquisitive Bastion unit set out to explore his surroundings and discover his purpose on a war-ravaged planet."
        - "Though \"Bastion\" appears to be gentle—even harmless, at times—his core combat programming takes over when the unit senses danger, utilizing his entire arsenal to eliminate anything he perceives as a threat. This led to instances of conflict with the few humans he encountered and drove him to avoid populated areas in favor of the wild, uncharted regions of the world."
    - heading: "Torbjörn"
      paragraphs:
        - "In his wanderings, Bastion appeared in northern Sweden, where his discovery ignited old fears in the populace. Torbjörn Lindholm, one of the original Bastion unit designers, offered to eliminate him. Amid the hunt, Torbjörn discovered this specific unit was acting counter to his combat directives. Won over by his curiosity and preliminary research, Torbjörn relocated Bastion to his Ironclad Guild, helping the robot survive if he followed the rules. Torbjörn freed Bastion from much of his wartime programming and conducted major repairs on several of Bastion’s decades-old, crumbling systems. Today, Bastion can be found assisting in Torbjörn’s workshop, helping the humans he once fought against."
    - heading: "Reign of Talon"
      paragraphs:
        - "After successfully defending Gothenburg from Null Sector with Torbjörn, Reinhardt, and Brigitte, Bastion has found his new home. Naturally, after the rise of Talon’s forces, Bastion decided to aid Overwatch, protecting a world he    was once created to destroy. "
-
  hero: "Brigitte"
  entries:
    - heading: "Ironclad"
      paragraphs:
        - "The youngest daughter of weapons designer, Torbjörn Lindholm, Brigitte was the first of his children to show an interest in mechanical engineering. Brigitte spent much of her spare time in her father's workshop, learning the trade and honing her skills. Her aptitude for engineering mirrored that of her father's, but Brigitte's primary interest was in armor fabrication and defensive systems, unlike Torbjörn, who was world-renowned (and perhaps infamous) for the weapons he created."
        - "Everyone expected that Brigitte would continue her apprenticeship and follow in her father's footsteps. But her plans changed due to the influence of another prominent figure in her life, her father's fellow Overwatch agent, Reinhardt Wilhelm. A close friend of the family and Brigitte's godfather, Reinhardt told Brigitte tales of heroes and chivalry as she grew up. After his retirement and Overwatch's fall, Reinhardt declared that he would become a knight-errant on a quest to bring justice. Before he left on his adventures, Brigitte surprised him by asking to join him as his squire. Reinhardt accepted."
    - heading: "Squire"
      paragraphs:
        - "As a squire, Brigitte had many responsibilities, the most important of which was the upkeep of Reinhardt's Crusader armor (a design she was familiar with as the current version was designed by her father). But more and more, she found her main job was taking care of Reinhardt himself. During a journey through Europe, the duo discovered a village under the heel of a local gang known as the Dragons. In his overenthusiasm, Reinhardt nearly lost the fight. Brigitte did her best to repair his armor with minimal parts, and bandage up her mentor, as his body was breaking down from years of combat."
        - "Though Reinhardt was triumphant against the Dragons, Brigitte realized that serving only as a mechanic wasn't enough and that the best way she could continue on their journey was to become a warrior in her own right. While Reinhardt trained her in combat, Brigitte built her own suit of armor. The Overwatch Recall brought them from the ruins of Eichenwald to the streets of Paris, where Brigitte fought at Reinhardt's side to protect him, and any others in need, from the ravages of Null Sector. No matter what threats they face, knight and squire continue their journey to make the world a better place, one battle at a time."
    - heading: "Reign of Talon"
      paragraphs:
        - "Overwatch has come to lean on Brigitte's steady support and natural sense of leadership, placing her in charge of welcoming new sibling recruits Wuyang and Anran to the team. But when Talon attacks Watchpoint Gibraltar, her ability to adapt to the situation is put to the test. Luckily, she’s got a few ideas for taking the fight to Talon: some of them furrier than others. "
-
  hero: "Cassidy"
  entries:
    - heading: "Blackwatch"
      paragraphs:
        - "Cassidy had already made a name for himself as a member of the notorious Deadlock Rebels Gang, when he and his associates were busted in an Overwatch sting operation. With his expert marksmanship and resourcefulness, he was given the choice between rotting in a maximum-security lockup and joining Blackwatch, Overwatch's covert ops division. He chose the latter."
        - "Although he was initially cynical, he came to believe that he could make amends for his past sins by righting the injustices of the world. Cassidy appreciated the flexibility afforded to the clandestine Blackwatch, unhindered by bureaucracy and red tape. But as Overwatch's influence waned, rogue elements within Blackwatch sought to bring down the organization and turn it to their own ends. After the destruction of Overwatch's Swiss HQ, Cassidy wanted no part of the infighting. He set off alone and went underground."
    - heading: "Post Overwatch"
      paragraphs:
        - "He resurfaced several years later as a gunslinger for hire, fighting for causes he believed were just. But trouble has a way of finding old outlaws, and Cassidy’s list of enemies is long. He fought Talon while aboard a hypertrain in Texas and busted a heist by his former Deadlock Rebel allies in New Mexico. During the latter incursion, he freed Echo, the life’s work of his late friend, Dr. Mina Liao."
        - "After Cassidy received the call to rejoin Overwatch, a nostalgic run-in with Ana Amari had the gunslinger contemplating his future. Presented with growing security threats around the world and the possibilities afforded by a new team, Cassidy went on a mission to recruit heroes forged from various incursions around the globe. Reinforced with fresh faces, Cassidy and his new recruits are out in full force to strengthen Overwatch's presence worldwide."
-
  hero: "D.Va"
  entries:
    - heading: "Gwishin"
      paragraphs:
        - "More than two decades ago, South Korea was attacked by a colossal mechanical monstrosity that rose from the depths of the East China Sea. The massive, lumbering construct caused catastrophic damage to coastal cities before it was driven back beneath the waves. In response, the South Korean government developed a mechanized armored drone unit, called MEKA, to protect urban environments in future engagements with the omnic threat."
        - "The government's fears proved to be well founded, as a disturbing pattern of attacks emerged. Every few years, the monstrosity would rise from the sea to assault South Korea and its neighbors. The threat learned from these encounters, often reconfiguring itself in a different form and appearing with new weapons and capabilities. Each incident ended in a stalemate, with the monstrosity defeated but not destroyed."
    - heading: "Meka Squad"
      paragraphs:
        - "As the threat continued to adapt, it eventually disrupted MEKA's drone-control networks, forcing the military to place pilots in the mechs. Scrambling to find suitable candidates, the government turned to the country's professional gamers, who possessed the necessary reflexes and instincts to operate the mechs' advanced weapons systems. Top stars willingly joined the effort via the nation's compulsory military service, including reigning world champion Hana Song, also known as \"D.Va.\" Famous for her elite skills, D.Va was a fierce competitor who played to win at all costs, and she had a well-earned reputation for showing no mercy to her opponents."
        - "D.Va quickly grew in skill to become MEKA’s top pilot, even streaming combat operations to her adoring fans, but the Gwishin threats’ increasing attacks on South Korea began to take a heavy toll on the MEKA squad. Where MEKA could once count on months of training and downtime between robotic assaults, a sudden attack between predicted intervals forced Hana to repel the Gwishin alone. The media praised D.Va's singlehanded defense of South Korea, though in truth, the superstar was seconds from a real game over. As the Null Sector threat emerged in Korea, D.Va obtained a special dispensation from her commander to join up as one of Overwatch's new guard, assessing the Null Sector threat alongside Cole Cassidy and his latest recruits."
-
  hero: "Domina"
  entries:
    - heading: "Inherited Expectations"
      paragraphs:
        - "Vaira Singhania grew up with a taste for the finer things in life. As the granddaughter of the Vishkar Corporation’s founder, Dr. Vishwakarma Bhatt, she was expected to inherit the family business. The immense pressure put upon her from a young age quickly shaped Vaira into a cutthroat perfectionist and shrewd negotiator."
        - "Though Vaira had a knack for corporate politics—excelling in all lessons in debate and economics—she wasn’t naturally gifted with the artistic eye that Vishkar sought in its architechs. Desperate to present herself as flawless, Vaira worked tirelessly to shape her reputation. She spent a fortune on private lessons and the development of custom assistive technology that allowed her to compete with even the most lauded Vishkar architechs. In the end, she achieved the appearance of effortlessness she so desired: a practiced and diligent professional masquerading as a natural born talent."
    - heading: "Pressure Makes A Diamond"
      paragraphs:
        - "When Vaira's professional life began, she insisted on working outside of the family business. Vaira took on even the toughest corporate challenges, determined to perfect her negotiation skills and refine her image so that she would be worthy of taking up the family mantle. With her sights still ultimately set on Vishkar, she transitioned from working in private equity to the technology sector. All the while she weaponized her drive, intelligence, and charm to secure her place at the top of the pecking order. "
        - "Nepotism, bribery, or sheer persistence—anyone might offer a different explanation for how Vaira worked her way onto Vishkar’s board. But her intellect was undeniable, and her uncanny ability to gain the upper hand in negotiations made her an incomparable asset to the company. Her oversight led to the acquisition of multiple lucrative development opportunities for Vishkar. After winning a bid for reconstruction efforts in Rio de Janeiro, Vaira took on the position of Vice President of Operations and Development at Vishkar Corporation."
    - heading: "Eyes On The Prize"
      paragraphs:
        - "As she climbed the corporate ladder, Vaira used her growing wealth to fund her own pet projects and establish clandestine partnerships. One of her newest business contacts is none other than Vendetta, a famed gladiator in Italy’s elite and the newly crowned leader of Talon. Vaira has established herself as one of Vendetta's greatest resources, supplying her with funds, connections, and hard-light shielding for Vendetta’s stable of gladiators. In return, Vaira has negotiated for exclusive rights to redevelop any communities “affected” in the aftermath of Vendetta’s plans—a surefire way to take Vishkar, and Vaira herself, to new heights."
-
  hero: "Doomfist"
  entries:
    - heading: "Omnic Crisis"
      paragraphs:
        - "Akande Ogundimu was the son of a wealthy Nigerian family who owned a prosthetic-technology company. Well-trained and proficient in a wide spectrum of bone-shattering fighting styles, Ogundimu’s stellar professional fighting career was cut short with the loss of his right arm during the Omnic Crisis. And while his family’s technology could replace his arm, without the challenge and crucible of competition, Ogundimu felt utterly lost. In that time, he searched for something to devote himself to. It was only when the current Doomfist, Akinjide Adeyemi, tapped him to join his ranks that Ogundimu saw his way forward."
    - heading: "Talon"
      paragraphs:
        - "Ogundimu was trained by Adeyemi himself and became one of his most trusted confidants, excelling not only because of his physical enhancements, but because he was extraordinarily well-suited for the work. He understood the importance of discipline and leadership, and possessed an iron will that was unmatched. It was not long before Talon also recognized his formidable skills."
        - "Before long, Adeyemi’s protégé made a fateful choice for the good of Talon. Ogundimu slayed his mentor, and assumed the mantle of Doomfist—taking on both the infamous weapon and the name. Talon understood the new Doomfist was an unmatched strategist, capable of leading both Talon’s military arm and its dealings that required more subterfuge. He would be the perfect replacement, and the rest of the organization began to fall in line."
        - "Under Doomfist, Talon underwent a significant transformation to become not just a ubiquitous shadow presence throughout the world, but a private military organization as well. This would prove a difficult balancing act, yet Doomfist was sure that they could always influence, obfuscate, or terminate any who got too close to the truth."
        - "Eight years prior to Null Sector’s global assault, Doomfist was captured by an Overwatch strike team that included Tracer, Winston, and Genji. He was imprisoned in a maximum-security facility, where he waited patiently for his plots to play out. It was only when he sensed the time had come that he broke out of his prison and recovered his gauntlet. Now, Doomfist has retaken his place in Talon, ready to drive the organization and humanity to its natural point of refinement through global conflict."
    - heading: "Doomfist's Fall"
      paragraphs:
        - "After years of shaping Talon’s philosophy and ruling through strength, Doomfist finally encountered a challenge he could not overcome. His claim to the throne was challenged by none other than Colosseo champion Vendetta. In a violent clash, Vendetta bested him in combat, severing his gauntlet and sending him plummeting to his doom. No one has seen or heard from him since, and whatever fate befell him remains unknown."
-
  hero: "Echo"
  entries:
    - heading: "Mina Liao"
      paragraphs:
        - "To chart the origins of the Echo project, it is important to delve into the personal history of Singaporean scientist Dr. Mina Liao, one of the founding members of Overwatch. Prior to joining the organization, Liao was widely considered one of the preeminent experts in the fields of robotics and artificial intelligence, and an employee of Omnica Corporation. There she worked on the team that was responsible for the design and creation of the omnics that would later wage war against humanity during the Omnic Crisis. Ultimately, it was this expertise that led her to be recruited into Overwatch to help stop her creations."
        - "Even that catastrophe was not enough to dissuade Liao of her firmly held belief in the potential of artificial life and its power to transform the world for the better. After the Crisis, she dreamed of improving upon the original omnic designs, but Overwatch’s restrictions on artificial intelligence research and development forced her to limit the parameters of her new Echo project. Instead, she created a multirole, adaptive robot that could be programmed to learn different functions—anything from medical support to construction—but had serious limits to its independent decision-making, including multiple layers of protections, fail-safes, and security to keep it under control. Echo was used successfully on test missions alongside Overwatch strike teams, but Overwatch leadership was reluctant to put it into full service."
    - heading: "Overwatch"
      paragraphs:
        - "However, the truth was that Liao had programmed Echo with a powerful, general artificial intelligence that learned by observation. After thousands of hours in the scientist’s presence, much of Liao’s behaviors (including her speech), were adopted by the Echo robot. This secret was known by very few, including Blackwatch agent Cole Cassidy, who had, at times, been assigned to guard the scientist. When Liao was killed in an attack on an Overwatch facility, Overwatch’s leadership feared the potential of such a robot without Liao’s careful stewardship. All development on Echo was shut down, and the robot was placed into quarantine."
        - "Having been freed by Cole Cassidy from an attempted heist by the Deadlock Gang, Echo joined up with the new Overwatch team to defend Paris against the Null Sector incursion. For the first time, Echo is seeing action as a full-fledged team member. But as she is exposed to new people, new ideas, and new situations without Dr. Liao to guide her, no one knows how she might evolve in the future."
-
  hero: "Emre"
  entries:
    - heading: "Walking Away"
      paragraphs:
        - "Emre was once known as a tactical prodigy and local hero. His sharp mind and natural leadership skills earned him universal respect, so it came as no surprise that he was the first post-Omnic Crisis addition to the Overwatch Strike Team. He staunchly believed in their mission to help others with unwavering conviction, frequently interfacing with support groups such as Overwatch’s Search and Rescue Team. But years of watching corruption creep into the organization pushed Emre to make the hardest call of his life: to walk away in favor of helping others on his own terms."
    - heading: "Overridden"
      paragraphs:
        - "VGQKCTUS: DBRQJKOKM-KBCTUS FÄYJJCSTRTTY: x7Q$gP2!mR4v@Zt9uE#sK1hW %Jb8^nC0yL* fD3qT&V5pB+oS6 rU=FjH?wA_McN )G(dX;YkO:[I] z>e<l/{}|aQ8M4 #v2P!t7$g5R@ w9S^h1C%u0K* f3D+J&b6T=FqW? yUoHjA_MpN)rG (dX;YkO[I]z> e<l/{}|aQ$gP2 !mR4v@Zt9uE# sK1hW%Jb8^nC0 yL*fD3qT&V5pB +oS6rU=FjH?wA_ McN)G(dX;YkO: :[ I]z>e<l/{} x7Q$gP2! mR4v@Zt9 uE#sK1hW %Jb8^nC%Jb8^nC 0yL*fD3q T&V5pB+o S6rU=FjH ?wA_McN) G(dX;YkO[I]z>e< l/{}|~aQ 8M4#v2P! t7$g5R@w 9S^h1C%u 0K*f3D+J &b6T=FqW ?yUoHjA_ MpN)rG(d X;YkO[I ]z 0 yL*fD3qT &V5pB+oS 6rU=FjH? wA_McN)G (dX;YkO [I]z>e<l /{}|aQ8 M4#v2P!t 7$g5R@w9 S^h1C%u0 K*f3D+J& b6T=FqW? yUoHjA_M pN)rG(dX ;YkO[I] z>e<l/{} |aQ$gP2 !mR4v@Zt 9uE#sK1h W >e<l/{} MR TGQFFGCHRUIIR  "
    - heading: "Bounty Hunted"
      paragraphs:
        - "In the years that followed, Emre was spotted conducting missions for Talon. Though he was reportedly effective in combat operations, other agents in Talon noted his unreliability and tendency to go dark for long stretches of time. During one such absence, Maximilien hired the ex-Overwatch bounty hunter Freja, who had been Emre’s dearest friend in his old life. "
        - "When Freja finally managed to track Emre down, he confided in her about his predicament; that he was being overtaken by an unknown force that turned him into a killing machine against his will. Unable to abandon him, Freja chose to stand with him instead of against him. Now the two operate in Talon’s shadow, fighting to keep what remains of Emre’s humanity alive. "
    - heading: "Reign of Talon"
      paragraphs:
        - "Together with Freja, Emre was sent to Watchpoint: Grand Mesa on a high‑risk mission to extract the Soldier Enhancement Serum from the fiercely guarded Naughton Vault. After battling Helix’s Head of Security, Sierra Turner Woods, they escaped with their prize—delivering Vendetta exactly what she needed to move her plans forward."
-
  hero: "Freja"
  entries:
    - heading: "Before the Storm"
      paragraphs:
        - "As the child of a diplomat, Freja had a firsthand view of the many people involved with saving lives during the Omnic Crisis. Though her mother’s work was admirable, Freja didn’t want to conduct rescues from the comfort of a safehouse; she wanted to be on the ground with the other operatives. "
        - "After studying criminology in university and gaining hands-on experience working with her local search and rescue team, Freja was recruited by Ana Amari to join Overwatch’s burgeoning SAR division. Her excellence was unmatched, with some dubbing her the best tracker in the world. Still, she remained humble as she rose through the ranks: it was clear to anyone that success in her work was all the fulfillment she needed. "
        - "In time, various members of the strike team such as Reinhardt Wilhelm, Angela Ziegler, and Emre Sarioglu came to request Freja by name for their operations. But despite her many triumphs, her few failures ate away at her conscience. Where others saw near-perfection, she saw inadequacies, and she worked tirelessly—even obsessively—to correct them."
    - heading: "The Fall"
      paragraphs:
        - "When Overwatch disbanded, Freja lost her sense of purpose. Try as she might to find work, it seemed no one was willing to take on an ex-Overwatch agent so soon after the organization—and its reputation—fell to pieces. Without her work, her sense of self-worth vanished overnight. She shut out the world, drifting directionless through life. "
        - "By luck or by fate, a local police department posting that called for the capture of wanted criminals would finally set her course. Freja realized that even if her time as a search and rescue operative was over, she could be of use in this new world."
    - heading: "The Hunt Begins"
      paragraphs:
        - "What began with small jobs became a full-time compulsion, driving Freja to more covert and dangerous operations. To protect herself in dealings with dubious clientele, she adopted a new moniker: Gefn. Though at first she tried to stick to rescue missions, the morality of her work soon became irrelevant—all that mattered was the chase. As her targets’ notoriety grew, so too did her fee. In time, she became one of the most infamous bounty hunters in the criminal underground. "
        - "Among her many jobs, one anonymous benefactor caught her attention—both on account of the strange chases they sent her on and the exorbitant pay. The jobs felt too perfect, almost manufactured, but Freja was up to the challenge. She completed several bounties for this ‘M4RQU1S’, but when payment never arrived, she decided to meet him face-to-face."
    - heading: "Opportunity Knocks"
      paragraphs:
        - "Freja eventually tracked down M4RQU1S—or rather, Maximilien—the de facto kingpin of Monte Carlo, and the source of Talon’s bottomless coffers. After a brief altercation, Max revealed that he had always intended on paying Freja. He merely wanted to confirm she was who she claimed to be. After all, for the work he had in mind, he needed to ensure that she truly was the best in the business.  "
        - "Though she was initially reluctant, Max presented a bounty that piqued her interest: Former Overwatch agent, Emre Sarioglu. Freja hadn't thought about him for years, but Max's offer brought back memories of the life she'd never truly left behind. "
        - "She agreed to Max’s terms and began a new hunt."
    - heading: "Reign of Talon"
      paragraphs:
        - "Freja’s bounty led her to old friend Emre Sarioglu. But when she found him, he was no longer the man he once was—instead, he was tormented by an unknown entity manipulating his conscience. Unwilling to leave him in Talon’s hands alone, she chose to remain with the organization at his side. Together, they search for answers as she tries to help him maintain his remaining fragments of humanity."
        - "Their most important Talon assignment yet had them headed to Watchpoint: Grand Mesa, where they were tasked with breaching the highly classified Naughton Vault. After battling Helix’s Head of Security, Sierra Turner Woods, they escaped with their prize—delivering Vendetta exactly what she needed to move her plans forward."
-
  hero: "Genji"
  entries:
    - heading: "Shimada Clan"
      paragraphs:
        - "As the youngest son of the master of the Shimada clan, Genji was raised in the art of the sword. He trained under swordmaster Asa Yamagami, forming a friendship with her young daughter Kiriko. Although he excelled at and enjoyed his ninja training, Genji had little interest in the family's illegal businesses and spent most of his time pursuing a playboy lifestyle. Many within the clan considered the carefree Genji to be a dangerous liability, and they resented his father for coddling and protecting him. Following the clan leader's untimely death, Genji's older brother, Hanzo, demanded that Genji take a more active role in their late father's empire. Genji refused, enraging Hanzo. The tension between the brothers built to a violent confrontation that left Genji on the verge of death."
    - heading: "Blackwatch"
      paragraphs:
        - "Hanzo believed that he had killed his brother, but Genji was rescued by Overwatch and the intervention of Dr. Angela Ziegler. The global security force saw Genji as a potential asset in its ongoing operations to combat the Shimada clan. As Genji's injuries left him clinging to life, Overwatch offered to rebuild his body in exchange for his help. He was put through an extensive process of cyberization, which enhanced his natural speed and agility and augmented his superlative ninja skills."
        - "Transformed into a living weapon, Genji joined Blackwatch and single-mindedly set about the task of dismantling his family's criminal empire. When this mission was complete, he moved on to more complex duties and even took part in the notorious Venice Incident, which led to Blackwatch’s public exposure and the team’s suspension."
    - heading: "Overwatch"
      paragraphs:
        - "Genji wasn’t sidelined for long, however. Overwatch leadership encouraged Genji to continue with agent training for the larger Overwatch strike team, and he graduated alongside Tracer and Winston. His efforts in both Havana and Singapore led Genji and his squad mates to successfully apprehend Doomfist, then the highest name on Overwatch’s most wanted list. But when Overwatch fell from grace, Genji felt increasingly at war with himself—all that had transpired between that fateful night in Hanamura and his life as an Overwatch agent. For the second time, he abandoned his former life and wandered the world in search of meaning. He drifted for many years before crossing paths with the omnic monk Zenyatta. In time, Zenyatta became his mentor, and under the monk's tutelage, Genji came to see both his experiences and his cybernetic form as a gift and a unique strength."
        - "The Shimada brothers would cross paths once again, on the anniversary of Genji’s death. In their former home of Shimada Castle, which had since been taken over by the Hashimoto clan, Genji revealed that he had survived their fateful encounter. Genji let his older brother know that he had forgiven him, but that Hanzo must walk the path of forgiving himself. Now the master of his own fate, Genji chooses to lend his skills to Overwatch once more, returning to aid a world in crisis alongside his former comrades and any who join their cause."
-
  hero: "Hanzo"
  entries:
    - heading: "Shimada Clan"
      paragraphs:
        - "The Shimada family was established centuries ago, a clan of assassins whose power grew over the years, enabling them to build a vast criminal empire that profited from lucrative trade in arms and illegal substances. As the eldest son of the family's head, Hanzo was bound by duty to succeed his father and rule the Shimada empire. From a young age, he was trained for that responsibility, displaying a natural aptitude for leadership and possessing an innate understanding of strategy and tactics. He also excelled in more practical areas: he was a prodigy in martial arts, swordplay, and bowmanship, having trained under swordmaster Asa Yamagami, mother of Kiriko Kamori."
        - "Upon the death of his father, the clan elders instructed Hanzo to straighten out his wayward younger brother, Genji, so that he, too, might help rule the Shimada empire. When Genji refused, Hanzo was forced to kill him. This act broke Hanzo's heart and drove him to reject his father's legacy, ultimately leading him to abandon the clan and all that he had worked so hard to attain."
    - heading: "Lone Warrior"
      paragraphs:
        - "For years, Hanzo traveled the world, perfecting his skills as a warrior, attempting to restore his honor and put the ghosts of his past to rest. His quest at last bore fruit many years after Genji’s death, when the two crossed paths—and fought—in their childhood home of Shimada Castle, which had long since been seized by the Hashimoto clan. Genji told Hanzo he had forgiven him and urged Hanzo to forgive himself. Amid new turmoil in their native Hanamura and around the world, the time may soon come when Hanzo must choose a side, but where he’ll land remains to be seen."
-
  hero: "Hazard"
  entries:
    - heading: "A Lonely Youth"
      paragraphs:
        - "Born to veterans of the Omnic Crisis, Findlay Docherty grew up poor and surrounded by stories of violence. His mother died when he was young and his father was absent and unkind, leaving young Findlay to fend for himself. It seemed the only thing keeping food on the table was the regular check the government sent as compensation for his parents’ military service. Findlay grew up respecting the institutions that fed him, but his poverty and poor performance in school made him a victim of bullying for years before he learned to fight back. He eventually enlisted in the military and left behind his old life, convinced that he could find success if he played along with the system."
    - heading: "Caught in the Crossfire"
      paragraphs:
        - "Tragedy struck when Findlay was caught at the center of a conflict between Overwatch and Talon in Glasgow. A dropship crashed into the flat he grew up in , killing his father and leaving Findlay trapped in the wreckage for almost two days. Miraculously, Findlay survived, but the accident left him a triple amputee, with chronic pain that would last for the rest of his life and brought an end to his military career. The government offered him basic prostheses, pain medication, and another monthly check to forget about what happened, but Findlay burned at the injustice of it all. His family, his home, his career... Findlay had lost everything, and had no one left to share in his grief. How was he supposed to move on?"
    - heading: "Finding the Phreaks"
      paragraphs:
        - "That was when Findlay learned of the Phreaks, a counter cultural movement of self-augmenting anarchists that protected omnics in the wake of the Crisis. He was taken in by one of their most prominent members: an expert body-modder named Touch-Up who outfitted him with custom augmentations that helped him regain mobility and manage his pain. Over time, Findlay found a family with the Phreaks and enthusiastically embraced their cause. As a member of their crew , Findlay was committed to tearing down systems upheld by organizations like Overwatch and Talon. Together with the Phreaks, Hazard traveled the world and transformed himself through augmentation. No matter the danger, he was always the first to jump into the fray to protect his friends. Over the course of his escapades , Findlay earned himself a new name: Hazard."
    - heading: "Unstoppable Upgrades"
      paragraphs:
        - "Hazard continued to push himself with new augmentations that enhanced his physical stature, speed, and strength. But the true turning point came when the Phreaks resolved to steal a rare vanadium isotope from the Oasis Ministry of Genetics. The isotope was unstable, but Touch-Up saw its potential. She designed Hazard a powerful new mod: one that could integrate the vanadium into his body and allow him to shape it into a deadly arsenal. Though Hazard knew harboring the vanadium would make him one of the most wanted criminals in the world, it was worth the risk .Thanks to this latest upgrade, Hazard has become a serious threat to the global order and a charismatic young face among the Phreaks. To the oppressed and downtrodden, Hazard is a hero; to the rich and powerful, he is a terrifying menace... and that’s just the way he likes it."
-
  hero: "Illari"
  entries:
    - heading: "Joining the Warriors"
      paragraphs:
        - "Illari began the demanding Inti Warrior training at an early age. Even then, her potential was enormous; her trainers believed she would become the strongest Warrior of her time. She bowed to the desires of her community, dedicating her free time to training so that one day she might live up to the legend already growing around her. Finally, her hard work and sacrifices paid off. She became the youngest person to join the Inti Warriors."
    - heading: "Catastrophe"
      paragraphs:
        - "In order to store and control the sun’s power, each Inti Warrior was imbued with solar threading. As per tradition, the Inti Warriors all gathered for Illari’s augmentation ceremony, ready to welcome her with open arms. However, no one could have been prepared for the true extent of her power. Her procedure unleashed a devastating amount of solar energy from her body, causing a blast that destroyed the entire chamber. The Inti Warriors were gone, and so was the future Illari had spent her life preparing for."
    - heading: "Moving Forward"
      paragraphs:
        - "Unable to face anyone after the tragedy, Illari has isolated herself, refusing anyone’s sympathy. She replays the accident over and over in her head, unable to help but wonder whether things could have been different if she’d never been pressured to strive for greatness. With no other clear path to follow, Illari continues her daily training despite having no one to guide her. Over time, one thing is made painfully clear:"
        - "She is the last Inti Warrior – and she must face the world alone."
-
  hero: "Jetpack Cat"
  entries:
    - heading: "Young Kitty"
      paragraphs:
        - "P;"
    - heading: "Good Kitty"
      paragraphs:
        - "zxcvdfgxn13Ccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccclchg;’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’’'’’’’’’"
    - heading: "Smart Kitty"
      paragraphs:
        - "One day, Brigitte discovered a lone cat wandering around the Watchpoint: Gibraltar landing bay. With no clues about the kitty’s owner, she decided to take her in, naming her “Fika” in honor of her Kanelbullar coloring and endless appetite for treats. In her downtime, Brigitte imagined fitting her new feline friend with a jetpack—a silly dream she’d had since she was young."
        - "When Talon launched their attack on Gibraltar, Brigitte thought it best to put the project aside. But soon, she realized that if Overwatch was to stand a fighting chance against this new enemy, they'd need all the help they could get. With enough resources and a good reason, Brigitte finally realized her childhood dreams and constructed a jetpack fit for little Fika."
        - "Now, she's as much a contributor to Overwatch as any other—and all for the better, considering the trials against Talon lying ahead. Of course, getting Sojourn to approve a jetpack wielding cat for use in the field is sure to be an uphill battle, but Brigitte has a few ideas (and a lot of data) to help let this cat out of the bag."
-
  hero: "Junker Queen"
  entries:
    - heading: "Wastelander"
      paragraphs:
        - "Young, brash, and confident, Odessa “Dez” Stone was born in a small Outback settlement. As one of six children, she constantly had to fight to prove her dominance. Her mother, a former Australian Liberation Front cell leader, ran the town watch, and her father, also a former ALF member, negotiated trade with the other settlements. Together they taught Dez the rules of the wasteland, how to operate in a group, and how to survive the irradiated Outback."
        - "For those living in the shadow of the ruined Australian omnium, the Omnic Crisis never really ended, it just took a different shape. The survivors and descendants of the ALF and the omnics who roamed the outback clashed in an unending battle for land and resources. Dez and her friends learned to fight from a young age, and quickly formed a posse to hunt Wastelander omnics. She used pieces and equipment of her fallen enemies to craft macabre armor and weapons for herself, including a gauntlet that could manipulate electromagnetism."
    - heading: "The Reckoning"
      paragraphs:
        - "Every few seasons Junkertown hosts the Reckoning—a boisterous, week-long gathering full of feasting, fighting, and shows of strength. Anyone may publicly challenge the reigning Junker monarch provided they defeat all the other challengers first. It’s the main event of the Reckoning: challengers spend all year training, building ostentatious mechs and weaponry, and cultivating juicy rivalries."
        - "In her Reckoning debut, Dez tore through the wall of challengers, leveraging her size and experience in the wastelands to defeat more experienced opponents. Even mechs couldn’t stop her; she took them all down using her weapons and unwavering determination. She fought her way to Mason Howl, the reigning Junker King. Their match was legendary with Dez triumphant in the end. The fight—which was filmed and broadcast throughout the Outback—made her wildly popular overnight. It gave her clout with all the factions, which was exactly what she wanted."
    - heading: "Junker Queen"
      paragraphs:
        - "After defeating King Howl, Dez took over Junkertown and set to work uniting the factions, one diplomatic beatdown at a time. In time, the Reckoning even produced a champion of her own: Wrecking Ball. Now, as the Junker Queen, Dez uses her wastelander knowledge to control the Junkers and impose order when necessary, training them to fight the omnic menace. That might mean rewarding a faction leader or taking them down. All in a day’s work."
-
  hero: "Junkrat"
  entries:
    - heading: "Junker"
      paragraphs:
        - "The attack on the Australian omnium's fusion core forever altered the landscape of the Outback. After the detonation, the area was transformed into a harsh, irradiated wasteland, littered with debris and the twisted fragments of the ruined facility, and unlivable to most."
        - "But there were some who survived. Calling themselves the Junkers, they scavenged the husk of the omnium and formed a lawless, cutthroat society in its shadow. Junkrat was one of them, eking out a living reclaiming metal and components from the ruins. Like many others, he was affected by the lingering radiation. This touch of madness made him ideal for handling dangerous explosives, a love he turned into an obsession."
    - heading: "Wanted Criminal"
      paragraphs:
        - "He came to notoriety when he discovered an extremely valuable secret in the bones of the omnium. Though few knew the nature of what he found, he was nonetheless pursued by bounty hunters, gangs, and opportunists wherever he went, until he made a deal with the Junker enforcer Roadhog, who grudgingly agreed to be his personal bodyguard in exchange for a fifty-fifty share of the spoils. After a string of offenses against the Junker Queen, Junkrat and Roadhog were officially exiled from Junkertown. They turned their sights beyond the Outback to embark upon an international crime spree, leaving nothing but havoc and bedlam in their wake. \"No job too big, no score too small.\" Though they racked up a considerable bounty on their heads, they’ve been able to evade capture through the very same methods they’ve used to acquire such a bounty: mainly those involving loads and loads of bombs."
-
  hero: "Juno"
  entries:
    - heading: "Project Red Promise"
      paragraphs:
    - heading: "Juno’s Childhood"
      paragraphs:
    - heading: "Rising Storms"
      paragraphs:
    - heading: "Journey to Earth"
      paragraphs:
    - heading: "Reign of Talon"
      paragraphs:
        - "After a trip to Lucheng Interstellar with Mei, Juno received a transmission proving her family was still alive. But her quest to save them will have to wait;  when Gibraltar is attacked by Talon, she must join the fight to protect her new allies—and the place she now calls home.  "
-
  hero: "Kiriko"
  entries:
    - heading: "Shimada Clan"
      paragraphs:
        - "Kiriko’s childhood was shaped by the many powerful figures in her life. She swept the floors of the Kanezaka shrine for her grandmother, and learned about her connection to the fox spirit. Her father was a famous bladesmith for the Shimada, and her mother, Asa, was their swordmaster. As such, Kiriko trained alongside Hanzo and Genji Shimada, whom her mother also instructed. Kiriko was treated like family, with Genji being especially fond of the young girl. They shared a love of mischief, filching sweets from the kitchen and pulling pranks on anyone too stuffy to appreciate their humor. Genji taught her the ins and outs of the Shimada Castle and even introduced her to the local arcade."
        - "But Kiriko’s peaceful world would soon be shattered."
    - heading: "Kanezaka Shrine"
      paragraphs:
        - "When she was twelve years old, the head of the clan, Sojiro Shimada, was assassinated by the rival Hashimoto clan. As rumors raged in Hanamura and Kanezaka regarding the supposed demise of Genji and flight of Hanzo, the Hashimoto took over."
        - "The Hashimoto recognized the potential threat posed by Kiriko’s family and acted quickly, kidnapping Kiriko’s father and forcing him to supply weapons for their clan. Alone and with her hands tied, Asa was unable to fight back. To protect her daughter, she sent Kiriko to her grandmother and changed her family name to Kamori—Asa’s given name."
        - "Under her grandmother’s care, Kiriko forged a close and lasting connection to the fox spirit, serving as a shrine maiden. But by the time beloved grandmother passed away, Kiriko had caught on to her parents’ predicament, and to the spreading pain the Hashimoto were inflicting on Kanezaka. From Tokyo, Toshiro supported Kiriko’s feelings and fed intel to Asa through handwritten letters. Witnessing years of the Hashimotos’ injustice, Kiriko vowed to restore peace to her town."
    - heading: "Yōkai"
      paragraphs:
        - "Kiriko wasn’t the only one seeking an end to the Hashimoto. A group of young troublemakers calling themselves the Yōkai of Hanamura were doing what they could to hinder the clan, mostly through minor vandalism. With Kiriko’s intelligence and natural leadership newly added in, the Yōkai became more and more a thorn in the Hashimoto’s side. They ambushed Hashimoto businesses, disrupted supply lines, and constantly undermined them through strategic attacks. But no matter how hard the Hashimoto press, the Yōkai seem to slip through their fingers. Perhaps this is the citizens of Kanezaka protecting their own, or perhaps the small gang really are as powerful as the spirits from whom they take their name."
        - "Wherever the truth lies, Kiriko continues to fight, both for the peace the Hashimoto stole from her long ago, and for a future free of fear for the people of Kanezaka."
-
  hero: "Lifeweaver"
  entries:
    - heading: "Childhood"
      paragraphs:
        - "Born in Chiang Mai, Thailand, Niran PruksaManee was the middle child of extremely wealthy parents with high expectations for their children. From a young age, he resisted the structured life they had planned for him. He preferred wandering his compound’s vast walled garden, mending plants alongside his family’s gardeners."
        - "Even early on, he was too intelligent for the expensive schools his family could afford. He often completed assignments incorrectly (his teachers often complained) by solving problems more thoroughly than was necessary, or in new ways that hinted at his brilliant future. His parents, desperate to instill order in Niran, sent him to the prestigious Vishkar Architech Academy."
    - heading: "Roommates"
      paragraphs:
        - "Niran developed an almost immediate distaste for both the rigid, artificial beauty that Vishkar called “perfection”. All of the other students shunned him, save one: his roommate, Satya Vaswani, later known as Symmetra. Within a few weeks, they were inseparable friends, and while they rarely agreed – on anything - they grew to respect each other a great deal."
    - heading: "Nature And Evolution"
      paragraphs:
        - "As he grew older, during breaks at school, he used his parents’ wealth to travel and learn about his true passion - the natural world. In those journeys, he was struck by the turmoil that existed outside of his perfect bubble of wealth. All around the world, people needed help. Illness, injury, and many other ailments riddled communities with pain—a pain Niran grew determined to fix."
        - "Using the academy’s resources and his parents’ influence, Niran set about on his own project—one that would help him heal the world."
    - heading: "Hard Light"
      paragraphs:
        - "In his research, he discovered that the late founder of Vishkar had hoped to provide his hard light freely to the world before Vishkar implemented more restrictions to the technology. Using this original design and his fascination with botany, he created something new. While hard light made inanimate material, Niran's new and unstable invention, biolight, created organic material that could heal terrible wounds in the blink of an eye."
        - "Unfortunately, that was where Niran's problems began."
    - heading: "Hard Consequences"
      paragraphs:
        - "Like his visionary predecessor, Niran dreamed of gifting biolight to the world. Vishkar disagreed, claiming ownership of the invention. Ignoring their demands (and Satya Vaswani’s advice), he fled the academy with his nascent technology. His parents cut him off from their wealth and pleaded for him to return, turn over his technology, and make peace with Vishkar."
        - "Alone and hunted, Niran has turned to the Atlantic Arcology, a freestanding and self-sustaining scientific and ecological city in the Atlantic Ocean, free from the governing laws of any nation on the planet. There, Lifeweaver has continued stabilizing and perfecting biolight, and intends to use it to renew the world’s connection with nature and help those in need."
-
  hero: "Lúcio"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Lúcio Correia dos Santos grew up in Rio de Janeiro, in a poor and crowded favela that was hit hard by the financial upheaval following the Omnic Crisis. As Brazil began the long process of recovery, he wanted to find a way to lift the spirits of those around him. He found his answer in music and its power to bring people together and even help them forget their troubles, if only for a short time. He performed on street corners, in block parties, and as he got older, at a string of legendary underground shows."
    - heading: "Activist"
      paragraphs:
        - "But Lúcio's close-knit community was thrown into chaos when the multinational Vishkar Corporation secured a contract to redevelop large tracts of the city. Lúcio and his neighbors had been told that the development would improve their lives. However, that promise never became a reality. Vishkar imposed controls on the residents in the name of building a more orderly society: enforcing curfews, cracking down on what the company perceived as lawless behavior, and exploiting the populace as a cheap labor force."
        - "Lúcio wouldn't stand for it. He seized the Vishkar sonic technology that his father had helped develop—technology that was now being used to suppress the people—and converted it into a tool to rally them to action. In a popular uprising, they drove Vishkar out of their neighborhoods. Lúcio's leadership made him a star overnight and a symbol for positive social change. His music skyrocketed in popularity. Whereas he had once performed locally, he was now filling arenas across the world."
    - heading: "Recording Artist"
      paragraphs:
        - "Among his newfound fans was the brilliant young inventor, Efi Oladele. In the aftermath of Doomfist’s attack on Numbani, Lúcio helped Efi source a special reactor for her robot Orisa, whom Efi was building to become a stronger protector for Numbani. He also agreed to perform a benefit concert in Unity Square to fundraise for victims of Doomfist’s attack. Talon crashed the concert but was successfully repelled by the combined efforts of Lúcio, Efi, and Orisa."
        - "With the sum of his experiences, Lúcio realized the power his platform held, and continues to make a difference with his music, changing the world for the better."
    - heading: "Reign of Talon"
      paragraphs:
        - "After Lúcio faced Null Sector in Rio de Janeiro, he joined up with Overwatch to continue aiding their cause. Now, a new major threat has risen: Vendetta’s Talon Empire—and Lúcio is more than ready to drop  back into the fight."
-
  hero: "Mauga"
  entries:
    - heading: "Deepsea Raiders"
      paragraphs:
        - "Maugaloa Malosi, otherwise known as Mauga, has challenged the law since his childhood. His father led the Samoan branch of the eco-rebel group, the Deepsea Raiders, that became like family to Mauga. They took him along on all their adventures, instilling in him a healthy dose of disrespect for the law. On their missions around Polynesia, Mauga learned from an early age that charisma opens doors and destruction gets answers. As the Deepsea Raiders fought against those disrespecting the beauty of their seas and islands, Mauga grew to be a renowned warrior."
    - heading: "Two Hearts"
      paragraphs:
        - "Mauga became a local legend in Samoa when an intense battle left him critically wounded. A Deepsea Raider medic performed emergency heart surgery, giving him a second cybernetic heart to supplement his damaged, organic one and get back into the fight. With his newfound strength, he was victorious. The triumphant Mauga returned to Samoa, where more upgrades and surgeries awaited him. As his strength increased, so did the need for constant maintenance. Always living on the edge of death taught Mauga to live every day like it might be his last."
    - heading: "A New Challenge"
      paragraphs:
        - "As the Deepsea Raiders’ activity died down, Mauga was thirsty for more adventures. News of Akande Ogundimu killing the Scourge of Numbani reached him and piqued his interest. Seeing a worthy opponent in this so-called Doomfist, Mauga challenged him to a no-rules, anything-goes fight. Amused, Doomfist sensed something in the young man and agreed. The epic fight ended in a draw, with both men exhausted but unwilling to admit defeat. Impressed, Doomfist offered him a place with Talon, the promise of regular cybernetic upgrades, and all the chaos his two hearts desired."
    - heading: "Talon and Beyond"
      paragraphs:
        - "With Talon, the whole world became Mauga’s playground. He befriended Baptiste, a talented medic who ended up defecting from the organization. Mauga was tasked to track him down and bring him back, dead or alive. They met in Haiti, and Mauga convinced his old buddy to join another Talon mission to shake down a local businessman. At the end of the mission, Baptiste managed to escape once again. But Mauga didn’t mind. The chase is half the fun. Until he faces his old comrade again, Mauga remains content in Talon’s company… for now."
    - heading: "Reign of Talon"
      paragraphs:
        - "With Doomfist overthrown, Mauga readily embraced Talon's new leadership, seizing the chance for more violence by aiding Vendetta's global crusade. After all, might makes right – a philosophy he is all too eager to prove. It’s finally time to have some fun."
-
  hero: "Mei"
  entries:
    - heading: "Overwatch"
      paragraphs:
        - "With escalating climate phenomena ravaging environments around the globe, Overwatch established a series of ecopoints at remote, critical locations worldwide. Their mission was to study ecological challenges and provide solutions for stabilizing or reversing its most pressing issues."
        - "Mei-Ling Zhou was a member of this multiyear initiative. A peerless climatologist, she had introduced cutting-edge innovations in the field of climate manipulation that protected at-risk areas in Asia and beyond. She was assigned to the program's monitoring station at Ecopoint: Antarctica when disaster struck: a sudden, catastrophic polar storm battered the installation and cut it off from the outside world, leaving the facility damaged and the scientists stranded. As their supplies dwindled, they entered cryostasis to survive until supply lines could be re-established or a rescue attempt could be made."
        - "But that rescue never came. It was years later when the team's cryogenics chamber finally opened; Mei was the team’s only survivor. The world Mei awoke to had gone through considerable changes: Overwatch was no more, the serious climate issues had worsened, and none of the ecopoints were in operation. Any clues their research had uncovered were lost."
    - heading: "Recall"
      paragraphs:
        - "But there was hope: upon reconnecting to the outside world, Mei received Winston’s Overwatch Recall missive. She joined up with Winston and Tracer at Watchpoint: Gibraltar and decided to continue her climatology work, penning a public journal that detailed her experience. Equipped with a portable version of her climate-manipulation technology, she traveled the world hoping to re-establish Overwatch’s ecological research network and track down the causes of the threats to the planet's ecosystem."
        - "Mei put her personal mission on hold to support the re-formed Overwatch team in halting the devastating attack by Null Sector on the city of Paris. With her incredible technology and her sharp mind, Mei strives to build a future that protects both the planet and the people who call it home."
-
  hero: "Mercy"
  entries:
    - heading: "Overwatch"
      paragraphs:
        - "A longtime family friend of Torbjörn Lindholm, Ziegler had pioneered a breakthrough in the field of applied nanobiology at a young age. The technology radically improved the treatment of life-threatening illnesses and injuries. It was this expertise that attracted the attention of Overwatch."
        - "Because her parents had been taken by war, Ziegler was opposed to the organization's militaristic approach to keeping global peace. Ultimately, she recognized that Overwatch offered her the opportunity to save lives on a much larger scale. As Overwatch's head of medical research, Ziegler sought to leverage her work for healing in frontline crises. The result was the Valkyrie swift-response suit, which Ziegler herself piloted on many Overwatch missions."
        - "Despite her contributions to Overwatch, she was often at odds with her superiors and the organization's overarching aims. Though she lent her brilliant mind to healing her comrades, Ziegler had dire concerns about the affairs of Blackwatch, specifically pertaining to Commander Reyes and his own medical support, Moira O’Deorain. When Overwatch dissolved, Ziegler sought distance from the agency and re-dedicated herself to helping those affected by war, caring for the broken and dispossessed in crisis areas around the world."
    - heading: "Post Overwatch"
      paragraphs:
        - "Following the Overwatch Recall, two squad mates she had thought to be dead and gone arrived at her doorstep: Jack Morrison and Ana Amari. Ziegler’s feelings on the return of Overwatch were further complicated, seeing Morrison's obsession with chasing vengeance for the agency’s fall from grace. Yet, when Talon forces descended on Cairo, Mercy appeared without fail, to protect the city’s civilians alongside her old teammates."
        - "Although she, Soldier: 76, and Ana Amari have since parted ways, the events in Cairo rekindled a sense of heroism that Ziegler had thought to be long buried. With Null Sector's targeted attack on Paris, it was clear that Overwatch was needed once again to defend the world from threats to peace. Now knowing her battle is not yet over, Mercy has since returned to Overwatch, and can be counted on to don her Valkyrie suit whenever innocents are imperiled."
-
  hero: "Mizuki"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Mizuki Kawano was born in Fukuoka under a shadow of misfortune. As a baby, he was surrounded by unexplained tragedies—grandparents lost to unnatural causes and a mother who drowned in a freak accident. His father, disturbed by their streak of bad luck, was convinced their bloodline was “cursed”. Each night, Mizuki was told tales of malevolent spirits that haunted their family as he was tucked into bed."
        - "As his father’s mental state worsened, he fled with Mizuki to Tokyo in a desperate attempt to “escape the curse”. He plunged them into debt, taking out loans with the Hashimoto Clan to pay for lucky charms, exorcists, and anything else said to ward off misfortune. But as fate would have it, he too was found dead one day, leaving Mizuki to fend for himself."
    - heading: "A Hashimoto Upbringing"
      paragraphs:
        - "The nine-year-old Mizuki inherited his father’s debt to the Hashimoto—and his belief that “the curse” would claim him next. But one of the clan's Elders took a keen interest in the boy, seeing potential where others saw a burden. In a surprising show of mercy, the Hashimoto offered to forgive what Mizuki owed in exchange for his loyalty to their organization. With nowhere left to turn, Mizuki accepted his fate, believing that resisting it as his father had might trigger the curse again. He was initially too young for their criminal dealings, so he was often left behind in the stronghold, and in his boredom, he often wound up in the company of Toshiro Yamagami—a captured weaponsmith famed for crafting anima weaponry. As Mizuki grew old enough to take on clan jobs, it was Toshiro’s kindness that balanced his harsh walk of life."
    - heading: "Mission To Kanezaka"
      paragraphs:
        - "When the clan tasked Mizuki with infiltrating the rebellious Yokai of Kanezaka, he sought Toshiro’s advice one last time. He was reluctant to embark on a mission where he might have to hurt innocents—yet his fear of both the Elders and his curse made it difficult for him to even think of abandoning his responsibilities. Recognizing Mizuki’s inner struggle, Toshiro gave him one final gift: his very own anima kusarigama—a symbol of his faith in Mizuki’s power to take control of his own fate. Toshiro urged him to find his own path on the journey ahead, encouraging Mizuki to seek his own place in the world."
        - "Now in Kanezaka, Mizuki has successfully joined the Yokai, finding himself caught between his clan duties and the desire to protect his newfound friends. Only time will tell if he can maintain his cover—and decide where his true loyalties lie."
-
  hero: "Moira"
  entries:
    - heading: "Geneticist"
      paragraphs:
        - "Equal parts brilliant and controversial, scientist Moira O'Deorain is on the cutting edge of genetic engineering, searching for a way to rewrite the fundamental building blocks of life."
        - "Over a decade ago, O'Deorain made waves when she published a controversial paper detailing a methodology for creating custom genetic programs that could alter DNA at a cellular level. It seemed like a promising step toward overcoming diseases and disorders and maximizing human potential."
        - "Dissent among her peers soon followed. Many considered her work to be dangerous because of its perceived ethical shortfalls, and O'Deorain was even accused of having the same unchecked desire for scientific advancement that some believed had caused the Omnic Crisis. In addition, other geneticists were unable to reproduce the results of O’Deorain’s research, which further called her discoveries into question. Instead of kickstarting her career, her paper seriously damaged her reputation."
    - heading: "Blackwatch"
      paragraphs:
        - "She received a lifeline in an offer from an unlikely source: Overwatch's covert ops division, Blackwatch. She continued her work in the shadows while developing new weapons and technologies for the organization, including experiments conducted directly on Commander Gabriel Reyes. Her employment was a closely kept secret, until it was uncovered during inquiries following the Venice incident. Many high-ranking Overwatch officials disavowed all knowledge of her affiliation with them."
    - heading: "Talon"
      paragraphs:
        - "After Overwatch, O'Deorain was forced to turn to unconventional sources of funding. She continued her work as part of the shadowy Talon organization. Following the destruction of Overwatch’s Swiss Headquarters, O’Deorain injected a near-dead Reyes with a potent form of the substance she had first given him in Blackwatch, claiming it as a necessary procedure to preserve his life. The results further empowered Reyes’ unique talents, although they significantly destabilized his ability to control them."
        - "Talon continued to aid in her experiments in exchange for utilizing the results for their own purposes. But O’Deorain worked with Talon in secret, she maintained appearances in the scientific community. She was invited to join the scientific collective that had founded the city of Oasis, becoming their Minister of Genetics."
        - "Though her work is still unknown to most of the world, O'Deorain will go to any lengths for a scientific breakthrough."
    - heading: "Reign of Talon"
      paragraphs:
        - "After witnessing Doomfist's downfall, Moira welcomed Vendetta's leadership within Talon. With more resources than ever before, Moira is ready to push her research to daunting   new extremes."
-
  hero: "Orisa"
  entries:
    - heading: "Efi Oladele"
      paragraphs:
        - "Originally put into service before the Omnic Crisis, the OR14 \"Idina\" line of security robots was built in Nigeria's massive manufacturing omnium. After the war, they were taken out of production, along with many of the other models used during the Crisis. Twenty years later, Numbani revived and recommissioned the OR14 program to protect the city from external threats. These new OR15s were deployed for a short time before they were destroyed in an attack by Doomfist."
        - "Following the attack, the program was scrapped, and the civic government sold off the remaining OR15 inventory. Some parts were purchased by eleven-year-old Efi Oladele, a brilliant girl whose early accomplishments in robotics and artificial intelligence had already earned her the Adawe Foundation's prestigious \"genius grant.\""
        - "With the approval of her understanding and open-minded parents, Efi spent the bulk of her grant money to acquire one of the decommissioned OR15 bots. She believed that Numbani needed a protector and that an upgraded OR15 could do just that. Efi repaired and reconfigured the robot and installed a personality core that she had designed herself."
        - "She named Numbani's newest hero Orisa."
    - heading: "Hero Of Numbani"
      paragraphs:
        - "Though Orisa was a marvel when activated, Efi spent a long time finding her optimal protocols. The robot’s inexperience could cause her to be a liability, especially in learning her own strength. But when Talon began an orchestrated attack on the City of Harmony, Efi knew Orisa’s programming would likely be put to the test. Luckily Efi had just been gifted with the final piece she needed for Orisa’s defensive capabilities: a Tobelstein reactor from Lúcio. While Efi was a superfan of Lúcio's music, Lúcio was a superfan of Efi’s ingenuity. He agreed to perform a benefit concert in Numbani for the victims of Doomfist’s attack."
        - "During Lúcio's concert in Unity Square, Talon struck. Orisa teamed up with Lúcio to defend the concertgoers from Doomfist, who was determined to sow fear in the populace. While Orisa, Efi, and Lúcio succeeded in protecting Numbani, they knew peace was a gift to be carefully guarded."
        - "After expelling Talon from Numbani, Efi and Orisa met with former Overwatch Commander Sojourn about what it meant to be a hero. Efi took Sojourn’s words to heart and used the experience to think out new upgrades for Orisa. As Orisa continues to grow with her brilliant creator at her side, one thing seems certain: Numbani’s future is in good hands."
    - heading: "Reign of Talon"
      paragraphs:
        - "After successfully defending Numbani, Efi and Orisa joined Overwatch to protect the world from Talon’s advances. Together, and with the rest of the team, they are ready to face any threat."
-
  hero: "Pharah"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "As a child, Fareeha dreamed of following in her mother's footsteps and joining the global peacekeeping force, Overwatch. Her mother, Ana Amari, was second in command of the organization, though she desired a different life for her daughter, one free from fighting. Still, Fareeha enlisted in the Egyptian army, and her dogged persistence and tactical prowess caused her to rise up through the officer ranks. She was a courageous leader and earned the loyalty of all who served under her. With her exemplary record, Fareeha was well placed to join the ranks of Overwatch, but before she had that opportunity, her mother was killed in the line of duty, and Overwatch was disbanded soon after."
    - heading: "Helix"
      paragraphs:
        - "After leaving the army with a commendation for distinguished service, Fareeha was offered employment with Helix Security International, a private security firm contracted to defend the artificial intelligence research facility beneath the Giza Plateau. The top-secret facility was touted as vital to the safety of not only the region but countries across the globe, as it housed the remains of the rogue god program Anubis. Fareeha gladly accepted the choice assignment and received training in the Raptora Mark VI, an experimental combat suit designed for rapid mobility and devastating firepower. Under the call sign \"Pharah,\" she worked to safeguard the AI installation. Years after her mother’s death, Fareeha was shocked to receive a letter from Ana, stating that she was alive, but unable to return to her. Fareeha was confused, angry, and disappointed; Ana’s pattern of choosing her mission over her daughter had damaged Fareeha’s trust in her. Fareeha had grieved her mother’s death once, and this felt like losing her again. Over time, she came more to terms with Ana’s decision. Despite her lingering hurt, Fareeha had her mission, and Ana had hers."
    - heading: "Recall"
      paragraphs:
        - "Fareeha had also let go of her childhood dreams of joining Overwatch, proud of what she had built with Helix. She turned down multiple requests from Tracer, Brigitte, and Reinhardt to answer Winston’s Recall. It was only when Cole Cassidy arrived in Cairo that she seriously considered joining. Cassidy brought Ana and Fareeha together in an emotional reunion that both reopened and healed many old wounds. When Cassidy called on Pharah to back up the nascent Overwatch on a mission to counter Null Sector in Busan, she answered the call. Now the Helix hero has expanded her horizons, lending her impressive skillset to rebuild the peacekeeping agency she once idolized."
-
  hero: "Reaper"
  entries:
    - heading: "Sightings"
      paragraphs:
        - "The Reaper is an extremely volatile mercenary, a ruthless and remorseless killer responsible for terrorist attacks across the world . . . In New Mexico, where scientist Siebren de Kuiper was kidnapped from a black site facility. In Russia, amid an assassination plot against Volskaya Industries’ Katya Volskaya. In Venice, where the body of Talon leader Augusto Vialli was found amid the carnage. Even in more public places—the Overwatch Museum in New York—Reaper was narrowly thwarted in stealing the Doomfist gauntlet. Survivors have described a black shadow ghosting unscathed through the most hellish battlefields. The few bodies recovered of those he kills are pale, empty husks drained of life, their cells showing signs of intense degradation. It is possible that he is a byproduct of failed genetic alteration which forces his cells to simultaneously decay and regenerate at a hyper-accelerated rate."
        - "Those tracking his movements have begun to see a pattern in his appearances. They believe that the Reaper is hunting former Overwatch agents and systematically eliminating them, a hypothesis supported by his infiltration of Watchpoint: Gibraltar, where he sought a list of the names and locations of former Overwatch agents. His breach was only partially successful, as he and his team were driven into retreat by Winston."
    - heading: "Talon"
      paragraphs:
        - "The truth, known to few, is that the Reaper is former Blackwatch Commander Gabriel Reyes, long thought deceased in the destruction of Overwatch’s Swiss Headquarters. After Overwatch’s capture of Doomfist, Reyes was swayed to Talon’s side, frustrated by the bureaucracy and red tape that constantly kept him from attaining true justice in Overwatch. In Egypt, Reyes came face to face with two other restless ghosts from his past: former Overwatch Strike Commander Jack Morrison and Captain Ana Amari. Though the three comrades had little to say to each other, their paths are likely to cross again."
        - "After all, their names are among the many on Reaper’s list."
    - heading: "Reign of Talon"
      paragraphs:
        - "As soon as Vendetta assumed control of Talon, Reaper went dark. He neither cared for Vendetta's goals nor did he believe his life would be spared —especially since he was responsible for her father's demise."
-
  hero: "Reinhardt"
  entries:
    - heading: "Overwatch"
      paragraphs:
        - "A highly decorated German soldier, Reinhardt was part of the Crusaders, battle-hardened warriors who wore massive suits of armor with unique capabilities. Although his mentor, Balderich von Adler, was Overwatch’s first choice to join the agency, Reinhardt was recruited after von Adler fell in the Battle of Eichenwald. Reinhardt became part of the original Overwatch strike team that put an end to the Omnic Crisis. After the conflict's resolution, Overwatch grew into a global institution, keeping the peace in a war-torn world."
        - "Reinhardt's unique ethics and larger-than-life persona earned the admiration of his peers and superiors alike. Never afraid to speak his mind, he was Overwatch's most vocal supporter and, when necessary, its harshest critic, providing a constant reminder that Overwatch was meant to be a force for good."
        - "Having served into his late fifties, Reinhardt was faced with mandatory retirement from combat operations. Despondent about being removed from active duty, Reinhardt feared that his days of purpose and glory had ended. As times grew darker and Overwatch came under suspicion of corruption and sedition, Reinhardt could only watch as the cause he had dedicated his life to defending surrendered in disgrace."
    - heading: "Post Overwatch"
      paragraphs:
        - "Though Overwatch was eventually disbanded, Reinhardt was not content to sit idly by while the world fell to disorder. Once again donning his Crusader armor, he vowed to fight for justice across Europe like a knight of old, defending the innocent and winning hearts and minds with the promise of better days to come. He was joined on this mission by his squire, Brigitte Lindholm, daughter of Reinhardt’s close friend , Torbjörn. After one particularly close call with a local gang calling themselves the Dragons, Brigitte took up her own mace to fight by her mentor’s side."
    - heading: "Recall"
      paragraphs:
        - "The old knight visited Eichenwalde after Winston triggered the Overwatch Recall. Brigitte urged him to consider the request carefully, reminding Reinhardt of how leadership had forced him out and pleading to him that, particularly given his advanced age, he had given Overwatch enough. Reinhardt was undeterred. He was called to duty, and a Crusader must always answer the call."
-
  hero: "Roadhog"
  entries:
    - heading: "Australian Liberation Front"
      paragraphs:
        - "Mako Rutledge was one of the many inhabitants of the Australian Outback whose land was seized and used for the construction of an omnium. But in the wake of the Omnic Crisis, the government made a controversial move, gifting the land to the omnics who had nearly destroyed their country, in hopes of establishing a long-term peace accord. This agreement permanently displaced Mako and a large number of the area's residents: a scattered collection of survivalists, solar farmers, and people who just wanted to be left alone."
        - "Furious over the loss of their homes, Mako and the residents turned to violent rebellion. They formed the Australian Liberation Front and struck against the omnium and its robot population to take back the lands that had been stolen from them. Events continued to escalate until the ALF sabotaged the omnium's fusion core, which resulted in an explosion that destroyed the omnium, irradiated the surrounding area, and littered the Outback with twisted metal and wreckage for miles around."
        - "Mako watched as his home became an apocalyptic wasteland, and he was forever changed."
        - "Adapting to his environment, he donned a mask and took to the broken highways of the Outback on his ramshackle chopper. Little by little, his humanity was forgotten. The last vestiges of Mako faded away and the ruthless killer Roadhog was born."
    - heading: "Junker"
      paragraphs:
        - "Roadhog set up shop on the outskirts of Junkertown, a thorn in the side of the town’s reigning monarch, the Junker Queen. He didn’t care—he was there for his gas and everyone else could rot. That held true until a chance encounter with Junkrat forged a lasting partnership, based in part on a 50% cut of a legendary lost treasure. Better it go to him than the queen."
    - heading: "Wanted Criminal"
      paragraphs:
        - "Exiled from Junkertown, the pair roamed Australia for a short while and even met with the CEO of Hyde Global, who hired them to reclaim a warehouse taken over by omnic terrorists. The duo soon realized they had been set up as part of an insurance scam. Though the job was a bust, it gave them the kick they needed to launch an international crime spree."
        - "Roadhog eventually returned to Junkertown, where Junkrat loudly disclosed their big plan to get payback on the Queen for their exile. The plan immediately failed thanks to the gate warden within earshot. Now, the duo has nothing left but money, useless disguises, and soon-to-detonate explosives."
-
  hero: "Sigma"
  entries:
    - heading: "Scientist"
      paragraphs:
        - "De Kuiper was considered a pioneer in his field. His life's work involved devising a way to harness the power of gravity. Equally known for his groundbreaking research and eccentric personality, he conducted most of his studies from his lab in The Hague. Believing that he was close to achieving his goal, he performed his most important experiment on an international space station."
        - "But something went wrong, triggering the brief formation of a black hole. De Kuiper was only exposed to its power for a moment, but he suffered serious psychological damage. The area around him began to experience strange fluctuations in gravity, peaking and dropping in time with his reactions. He had to be evacuated immediately."
    - heading: "Subject Sigma"
      paragraphs:
        - "Upon returning to Earth, De Kuiper was quarantined in a secret government facility. Between his ravings about the patterns of the universe, the nonlinear nature of time, and the gravitic anomalies happening around him, he was deemed unsafe and detained for years under the name \"Subject Sigma.\" Isolated and unable to control his powers, De Kuiper retreated into his own mind. He thought he would never see the outside world again."
        - "When Talon discovered De Kuiper's existence, they sent Reaper, Sombra, and ultimately, Widowmaker, to infiltrate the facility and break him out, planning to use his brilliance and research to further their plans. In their custody, De Kuiper slowly gained control of his powers. Now, gravity moved according to his will, and he was closer than ever to achieving his life's goal. But the same experiment that had opened his mind had also fractured it, and he struggled to keep the pieces together."
        - "De Kuiper continues to develop his powers in hopes of unlocking the secrets of the universe, unaware that Talon is using both him and his research."
    - heading: "Reign of Talon"
      paragraphs:
        - "With Talon under Vendetta’s rule, Sigma has been thrown into containment. Per Vendetta, he is no human, but a volatile weapon—and should be treated as such. Until she has need of such a tool, Sigma remains confined, holding out hope that one day someone might free him from this torment.  "
-
  hero: "Sojourn"
  entries:
    - heading: "Canadian Special Forces"
      paragraphs:
        - "Vivian Chase grew up in a small, tight-knit Toronto neighborhood, the daughter of ex-military parents. Born with a rare, terminal auto-immune disease that caused her body to attack its own organs, Vivian spent much of her childhood and teenaged years in and out of hospitals. Her parents had gotten her interested in military strategy from a young age, so she spent hours reading books and playing strategy simulations while recovering from various surgical procedures."
        - "Her case eventually caught the attention of Elaine Esat, a doctor pioneering a highly experimental treatment for Vivian’s disease. As part of the treatment, Vivian had her affected organs and limbs replaced with state-of-the-art cybernetic ones. The treatments gave Vivian a new life."
        - "Vivian followed in her parents’ footsteps and became an officer in the Canadian Armed Forces, where she gained a reputation as a tactical ace. At the start of the Omnic Crisis, she was conscripted into Special Forces . Her daring strategies—which often played out deep behind enemy lines—saved countless lives, and her squad nicknamed her “Sojourn.”"
    - heading: "Overwatch"
      paragraphs:
        - "When Canada was in its darkest hour, Vivian’s unit partnered with the nascent Overwatch, working with Jack Morrison, Torbjörn Lindholm, and Dr. Mina Liao to push the omnic forces out of Toronto. The combined efforts of Sojourn and Overwatch not only repelled the omnics from Canada, but also led to the decommissioning of the Detroit Omnium, a major victory for humanity."
        - "Vivian received numerous commendations for heroism and leadership, but after the war, she still felt her mission wasn’t over. She requested a transfer to a counterterrorism unit within the Canadian Special Forces, where she helped with the takedown of Ontario United, an anti-omnic hate group."
        - "Sojourn’s skills and her commitment to the rule of law proved she was exactly what Overwatch needed in a post-Crisis world. Morrison recruited her with the promise that her position could make a global difference. She soon gained a reputation as an empathetic, clear-headed tactician with exceptional concern for the people she led into battle. Vivian spent a considerable amount of time with Overwatch’s ground troops as well, and over time, she became one of Overwatch’s most trusted leaders."
    - heading: "Fall Of Overwatch"
      paragraphs:
        - "However, the longer Vivian spent with Overwatch, the less satisfied she became with its politics. She felt that the organization had lost its way.. She said as much when the United Nations launched an internal investigation of Overwatch, which culminated in a series of public hearings. Vivian spoke truthfully about her experiences, and her testimony proved pivotal in passing the Petras Act and ending Overwatch."
        - "After the hearings, Vivian settled into early, uneasy retirement with her rescue dog, Murphy. The cybernetic hero who saved Canada from threat after threat has earned herself some peace. But Vivian Chase was never one who fought for glory—she fought because she was needed, and should that need arise again, Sojourn will meet it."
    - heading: "Reign of Talon"
      paragraphs:
        - "Sojourn had never intended to remain with Overwatch. She anticipated the organization to be disbanded once again following Null Sector’s withdrawal, but in the face of the Talon’s global threat, she finds herself leading the team yet again. Her troubles extend beyond the battlefield, however, as the UN holds Overwatch’s fate in limbo."
-
  hero: "Soldier: 76"
  entries:
    - heading: "Vigilante"
      paragraphs:
        - "Soldier: 76 revealed himself in a string of attacks that crisscrossed the globe, targeting financial institutions, shadowy corporations, and secure Overwatch facilities. Though to the outside world his motives are inscrutable, there are those who claim that he is a former Overwatch agent, determined to shed light on the conspiracy that brought down the organization."
        - "Few would believe that former Overwatch Strike Commander Jack Morrison is the face behind Soldier: 76, given that Morrison was presumed dead during the destruction of Overwatch’s Swiss Headquarters. But the hardened veteran survived, perhaps due to the fact that he was biologically enhanced and trained as a member of the United States Soldier Enhancement Program, a top secret agency which surfaced only during the most desperate hour of the Omnic Crisis. As such, Morrison possesses physical capabilities exceeding those of a conventional soldier's, as well as other augmentations that make him a peerless combatant. In addition, he utilizes a cutting-edge arsenal, much of it stolen in raids on Overwatch installations."
    - heading: "Recall"
      paragraphs:
        - "Though Morrison did intercept Winston’s Overwatch recall broadcast, he remained singularly focused on his hunt for vengeance. The former commander came close to his prize in Egypt, where he crossed paths with several former Overwatch agents: his head of medical research, Dr. Angela Ziegler; captain, Ana Amari; and perhaps the biggest shock of all: Blackwatch Commander Gabriel Reyes, now hunting former Overwatch agents as the Reaper. Though Morrison fought the Reaper several times in Egypt, the wraith slipped through his fingers."
        - "The search for answers goes on. Luckily, Soldier: 76 is unrelenting in his search to find those responsible for Overwatch's fall, and bring them to justice."
-
  hero: "Sombra"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Long before she took up the alias \"Sombra,\" Olivia Colomar was among the millions of children who were left orphaned in the aftermath of the Omnic Crisis. With much of her country's infrastructure destroyed, she survived by utilizing her natural gifts with hacking and computers."
        - "After Olivia was taken in by Mexico's Los Muertos gang, she aided it in its self-styled revolution against the government. Los Muertos believed that the rebuilding of Mexico had primarily benefited the rich and the influential, leaving behind those who were most in need of assistance."
        - "Following her many conquests, Olivia was supremely confident in her skills, but she was caught unprepared when she stumbled into the web of a global conspiracy—one that had also noticed her. With her security irreparably compromised, Olivia was forced to delete all traces of her identity and go into hiding."
    - heading: "Talon"
      paragraphs:
        - "She later reemerged as Sombra, upgraded and determined to find out the truth behind the conspiracy she had uncovered. Sombra launched an even more audacious string of hacks, and her exploits earned her no shortage of admirers, including Talon. She joined the organization's ranks and is believed to have assisted Reaper in the kidnapping of Dr. Siebren de Kuiper, besides contributing to massive cyberattacks against corporations with strong ties to government. These efforts incited a popular revolution in Mexico against LumériCo and breached the security of Volskaya Industries, the manufacturing arm of Russia's anti-omnic defense."
        - "The Volskaya mission in particular highlighted Sombra’s questionable allegiances. Going rogue on an assassination mission against the company’s CEO, Sombra blackmailed her instead. In return, Katya Volskaya sent her own powerful ally, Zarya, after the hacker. Though Zarya was successful in finding Sombra, Sombra revealed Katya’s secret dealings with omnics and escaped."
        - "Once Doomfist released himself from prison and reworked Talon’s inner council, Sombra played an important part in the renewed organization, which, more importantly, brought her a few steps closer to her own goal. Olivia led digital terrorism efforts that directly enabled Doomfist to complete his missions in high-value areas such as Rome and Numbani."
        - "Whatever services she provides for Talon, only a fool would forget that Sombra’s agenda is her own. But while Sombra remains on the hunt for her prey, Talon gets the best hacker money can’t buy."
    - heading: "Reign of Talon"
      paragraphs:
        - "Sombra had no desire to serve a Talon controlled by Vendetta, choosing to leave on her own terms. However, with Sigma still held prisoner by Talon, she continues to operate from the shadows, keeping a careful eye on every situation about to unfold."
-
  hero: "Symmetra"
  entries:
    - heading: "Vishkar"
      paragraphs:
        - "Following the Omnic Crisis, the Vishkar Corporation of southern India began the laborious process of creating new, self-sustaining cities to house the nation's displaced population. One such city, Utopaea, was created using radical hard-light technology that enabled its architechs to shape the city's streets, utilities, and living spaces in the blink of an eye."
        - "After she was identified as one of the few capable of becoming a light-bending architech, young Satya Vaswani was plucked from extreme poverty and placed in the care of Vishkar's architech academy, never to return home. Isolated and lonely in her new life, Satya immersed herself in her education and training. She quickly grasped the applications of the technology and was one of the top students in her class. Satya approached hard-light manipulation differently than her peers, with their more procedural, mechanical constructions, instead weaving her constructs in the motions of the traditional dance of her homeland."
    - heading: "Architech"
      paragraphs:
        - "Though she was one of Utopaea's top architechs, the Vishkar Corporation saw far greater potential in Satya's abilities. Giving her the moniker \"Symmetra,\" Vishkar sent her on clandestine missions around the world to uphold its corporate interests and expand its influence into other countries. One of these missions was in Rio de Janeiro, where Vishkar was in the running to design a new city center. The company sent Symmetra to obtain leverage to use against a rival developer, but Symmetra assured her handlers that the competition was clean. In response, Vishkar destroyed their rival’s offices, resulting in civilian casualties."
        - "Symmetra’s faith in Vishkar was further rocked by her experiences in Suravasa, where Vishkar construction had caused a tremor that damaged a statue at a local temple. In a peacekeeping measure, Vishkar sent its top architech to repair the damages. Instead of providing a mere symbolic gesture, Symmetra spent time with Tekhartha Zenyatta and other Shambali pilgrims residing there. Her experience with the Shambali inspired her to repair a damaged statue with her unique weaving of hard-light and original material."
        - "Symmetra believes her actions—and those of Vishkar—serve the greater good in society. But there are times when she wonders whether the order Vishkar desires is truly best for humanity."
-
  hero: "Torbjörn"
  entries:
    - heading: "Overwatch"
      paragraphs:
        - "Before the Omnic Crisis, Torbjörn had gained notoriety for designing weapons systems used by countries around the world. However, his belief that technology must serve a better vision for humanity put him at odds with his employers, who desired to control his weapons using networked computer intelligence."
        - "Torbjörn had a deep mistrust of sentient robotic intelligence, and while many of his peers wrote this off as paranoia, his worst fears were realized when the robot populations of the world turned against their human creators during the Omnic Crisis. Because of his engineering genius, he joined the original Overwatch strike team, and his many inventions proved integral to ending the crisis. In the years that followed, Overwatch became an international peacekeeping force, and Torbjörn remained a critical resource for all of its technological needs and signature weapons systems. Among the work that bears his seal are Reinhardt Wilhelm’s evolved Crusader armor, Ana Amari’s biotic rifle, and the system that helped stop Null Sector’s assault on King’s Row."
    - heading: "Post Overwatch"
      paragraphs:
        - "In the aftermath of Overwatch's fall, many of Torbjörn's weapons—from his days in Overwatch and long before—were stolen or stashed away around the world. He pursued the misuse of these weapons wherever they occurred, even confronting and disabling a retrofitted Titan unit terrorizing Boklovo, which was being piloted by an old colleague."
        - "But not all his weapons have come to bad ends. In Europe, his daughter Brigitte chose to carry on his legacy by serving as squire and armorer for Reinhardt Wilhelm, who continues to fight on the side of justice. And in his native Sweden, Torbjörn came face to face with an oddly peaceful Bastion unit that threw his jaded perspective into disarray. The once-lethal killing machine had befriended local wildlife, inexplicably growing beyond its original wartime protocols. Torbjörn “adopted” the curious Bastion unit, and their close relationship led the engineer to question his antipathy toward robots, AI, and omnics."
        - "Feeling responsible for his creations, Torbjörn is determined to stop them from falling into the wrong hands and wreaking havoc on the innocent."
    - heading: "Reign of Talon"
      paragraphs:
        - "Though he’d retired from active duty, Torbjörn remained a trusted ally to Overwatch. In the wake of Talon’s assault on Watchpoint: Gibraltar, the team regrouped at his workshop in Gothenburg, where he welcomed old friends and new. When the moment comes, Torbjörn stands ready to help rebuild the old base."
-
  hero: "Tracer"
  entries:
    - heading: "Lost In Time"
      paragraphs:
        - "Lena Oxton (call sign: \"Tracer\") was the youngest person ever inducted into Overwatch's experimental flight program. Known for her fearless piloting skills, she was handpicked to test the prototype of a teleporting fighter, the Slipstream. But during its first flight, the aircraft's teleportation matrix malfunctioned, and it disappeared. Lena was presumed dead."
        - "She reappeared months later, but her ordeal had greatly changed her: her molecules had been desynchronized from the flow of time. Suffering from \"chronal disassociation,\" she was a living ghost, disappearing for hours and days at a time. Even for the brief moments she was present, she was unable to maintain physical form."
    - heading: "Overwatch"
      paragraphs:
        - "Overwatch's doctors and scientists were stumped, and Tracer's case seemed hopeless until Winston designed the chronal accelerator, a device capable of keeping Tracer anchored in the present. In addition, it gave Tracer the ability to control her own time, allowing her to speed it up and slow it down at will. With her newfound skills, she became one of Overwatch's most effective agents."
        - "Tracer’s first mission took place in London, where she and her team successfully halted the Null Sector forces involved in the King’s Row uprising. It was the start of a stellar career: she would go on to help apprehend a valuable contact of Talon, Maximilien, in Havana. With the lead Maximilien had given them, Tracer’s strike team then put Talon’s leader, Doomfist, behind bars."
    - heading: "Post Overwatch"
      paragraphs:
        - "Following the disbandment of Overwatch, Tracer was dissatisfied with her quiet life, of replacing heroism with a desk job in the Royal Air Force. Shortly after leaving the military, an encounter with a like-minded omnic named Iggy led Tracer to the Underworld, where her eyes were opened to the harsh conditions the omnic population of London resided in. Assisting in repairs on the Underworld's Grid earned her an audience with the leader of the Shambali, Tekhartha Mondatta, though disaster was soon to follow."
        - "Tensions between humans and omnics boiled over when Widowmaker’s crosshairs fell on Mondatta. Though Tracer was present at the event and even fought the sniper, she was unsuccessful in thwarting the assassination. The response was explosive and immediate—Mondatta’s message of peace drowned out in a sea of pain and stolen hope. When an omnic with possible ties to Null Sector stepped forward to rally the omnics of the Underworld in a full-blown revolution against humans, it was only through the combined efforts of Tracer, Winston, and Iggy that no one else was hurt."
    - heading: "Recall"
      paragraphs:
        - "Though she was grievously wounded in the process, Tracer can always be counted on to bounce back. With the help of Winston and her partner, Emily, Tracer made a full recovery, rejoining Winston and answering his Overwatch recall broadcast. Though she failed to stop Widowmaker in London, she thwarted the sniper in reclaiming Doomfist’s gauntlet in New York. And in Paris, Tracer was there to repel Null Sector, helping the newly re-formed Overwatch put a stop to any threat to peace."
        - "With her irrepressible energy and boundless idealism, Tracer inspires her team—and all who know her—to fight for a better future."
-
  hero: "Vendetta"
  entries:
    - heading: "Born To Power"
      paragraphs:
        - "Growing up, Marzia Bartalotti was promised great power. Her father, known by most as Antonio Bartalotti, was a notorious arms dealer and a key figure in Talon who instilled in her a sense of pride around her heritage and encouraged her ambition. But even in her youth, Marzia was temperamental. She found few friends among her peers and clashed with her father about the consequences of his decisions on her life—including the loss of her mother at a young age. Frustrated that Antonio’s hubris might put her own future at risk, Marzia studied his business, preparing herself to inherit his empire."
        - "When Antonio was assassinated by a team of Blackwatch agents, Marzia’s worst fears came true. With her father gone and his dealings exposed, she was pushed out of Talon. The assets she was set to inherit were seized by her father’s right hand, Augusto Vialli, and Doomfist refused to grant Marzia her father's council seat. Tired of being underestimated, she set herself on the path to reclaiming her birthright by force."
    - heading: "Colosseo's Champion"
      paragraphs:
        - "Driven by spite and determined to prove her worth, Marzia dedicated herself to training to become a fighter in the Colosseo’s gladiator games: a pageant sport that had become a cultural touchstone in the wake of the Crisis. She wanted all of Italy to know what she was capable of. She set out to be feared and respected for her strength, with grand plans to dominate her enemies inside and outside the arena."
        - "With her persistence, natural skill, and cutthroat persona, Marzia became “Vendetta”. In the Colosseo, she doggedly competed in all manner of competition and seized victory every time. Outside of the games, she grew her wealth and built connections across Italy. In time, she earned the title of Colosseo Champion and became known across Italy as La Lupa Della Ritorsione: “The Wolf of Retribution”."
    - heading: "Notorious Rise"
      paragraphs:
        - "Colosseo sponsorships became business partnerships; fame meant invitations to private events with Europe’s elite; and gambling and rigged matches behind the scenes at the Colosseo gave her a wealth of information to use as blackmail. Many newcomers to the Colosseo idolized Vendetta’s relentless nature and swore to follow her lead."
        - "Through it all, she kept her eye on Talon, watching as Vialli led it to ruin and Doomfist failed to capitalize on its potential. After careful planning, Vendetta used her influence to seize back some of her father’s territory and take out a Talon council member as a message, proving that her ambition would not rest."
        - "Vendetta’s quest for power is transparent; among the members of Talon, there is no shortage of controversy surrounding her growing influence. As she fights to build her own empire, she has forged powerful allegiances that position her to be a threat not just to Talon, but the entire world."
-
  hero: "Venture"
  entries:
    - heading: "A Born Archaeologist"
      paragraphs:
        - "Sloan Cameron had an affinity for finding lost things since they were a child. They never lived in one place for long, and each new home meant a new expedition—on which they unearthed treasures, trinkets, and traces of the past. Their unusual talent drew them to the Wayfinder Society: a group of archaeologists and historians from around the globe. At sixteen, they started an apprenticeship with the organization and never looked back."
    - heading: "The Wayfinder Society"
      paragraphs:
        - "Due to their unfettered bravery, Sloan was a unique addition to the brilliant minds of the Wayfinders. From ancient ruins to dormant omniums, dangerous expeditions quickly became their go-to assignments. They often returned from digs covered in dirt, bruises, and local fauna, but always with a smile on their face, eager to learn about the artifacts they’d recovered. Their dedication eventually saw them graduate from their apprenticeship, making them a full-fledged member of the Wayfinder Society."
    - heading: "Rise to the Challenge"
      paragraphs:
        - "Sloan’s fearlessness came in handy for more than just expeditions. With increasing threats to Wayfinder sites, security often fell into their hands. Looters, scavengers, even master thieves would try to steal artifacts recovered by the Wayfinders. But with their excavating tools and quick wit, Sloan managed to fend off any would-be troublemakers."
    - heading: "A New Mystery"
      paragraphs:
        - "While on site at Ilios, Sloan had to grapple with their most challenging enemy yet: Talon. The shadowy organization plundered the site with reckless abandon, leaving Sloan with no choice but to stand up to them. After a long-fought scrap, Sloan succeeded in driving them out. But in the wake of the attack, something stuck in their mind. What would such a powerful organization be hunting for in these ruins? It was a mystery, indeed… and Sloan could never leave a mystery unsolved."
-
  hero: "Widowmaker"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "In her former life, Amélie Lacroix loved only two things: her husband and ballet. Growing up in her family’s ancestral seat of Chateau Guillard in rural France, dance became Amélie’s only escape from the crumbling manor and her conservative family, who had always urged her to follow the aristocracy’s tenets of decorum and tradition."
        - "Her path would take a more interesting turn when she married the great love of her life, Gérard Lacroix, an Overwatch agent spearheading operations against the Talon terrorist organization. Amélie gave little thought to her husband’s career outside the interesting topic it made for dinner parties; she could hardly have guessed at the danger his job put her in."
    - heading: "Neural Reconditioning"
      paragraphs:
        - "After several unsuccessful attempts to eliminate Gérard, Talon decided to change its focus to his wife. In the dead of night, Talon operatives kidnapped Amélie and subjected her to an intense program of neural reconditioning, in effect creating a sleeper agent. Gerard devoted Overwatch’s every resource to recovering his bride, and it wasn’t long before the operation produced results. His agents saved Amélie, and a medical and psychological evaluation after the kidnapping found her to be apparently no worse for wear. Their official assessment proved fatally inaccurate two weeks later . . . when they discovered she had killed Gérard in his sleep."
        - "Overwatch had never truly rescued Amélie Lacroix. They had merely delivered Widowmaker to her first victim."
        - "Afterward, Amélie was hunted by police and Overwatch alike, but more than that, she was haunted by the way murdering her husband had made her feel. The moment of the kill was the most alive Amélie had ever felt."
    - heading: "Talon"
      paragraphs:
        - "With few other options left, Amélie returned to Talon, chasing the high that had both thrilled and terrified her. At her behest, she was given extensive training in the covert arts and agreed to participate in an experimental marksman program. Talon’s geneticist, Moira O’Deorain, altered Amélie’s physiology to improve her aim, drastically slowing her heart, which turned her skin cold and blue, and numbed her ability to experience human emotion. It dulled the pain of what she’d done, while heightening the charge she felt on the hunt."
        - "Now as Widowmaker, she is Talon's most effective assassin. She shot (and had presumably killed) Captain Ana Amari—then the second in command of Overwatch—during a mission in Poland. Shortly after, she assisted the Reaper and Sombra in securing Dr. Siebren de Kuiper for Talon’s ends. More recently she was sighted at the Overwatch Museum in New York, attempting to steal the Doomfist gauntlet; in Russia, at the near-assassination of the head of Volskaya Industries; and in Venice, where her handiwork was apparent amid the murders of Augusto Vialli and his associates."
        - "But Widowmaker is perhaps most notorious for her assassination of the Shambali leader, Tekhartha Mondatta at a rally for peace in King’s Row. Though she was intercepted by former Overwatch agent, Tracer, even the hero couldn’t keep Widowmaker from claiming her prize."
        - "An unstoppable killer, Widowmaker’s crosshairs are perhaps the most dangerous place in the world."
    - heading: "Reign of Talon"
      paragraphs:
        - "When Vendetta took control over Talon, Widowmaker seized her chance to break free of Moira’s grip. Since then, she has slipped into the night, an unseen and unbound free agent. Though she still craves the precision of assassination, she acts only on her own deadly terms."
-
  hero: "Winston"
  entries:
    - heading: "Horizon Lunar Colony"
      paragraphs:
        - "Lucheng Interstellar established the Horizon Lunar Colony as a first step for humanity’s renewed exploration of space. Among its residents was a group of genetically enhanced animals that were intended to test the effects of prolonged habitation in space."
        - "One gorilla displayed such rapid brain development from the gene therapy that he was taken under the wing of Dr. Harold Winston, who taught him science and inspired him with tales of human ingenuity. The young gorilla passed his days assisting with the scientists’ experiments, watching the distant blue world outside his habitat window, and dreaming of the endless possibilities that awaited him there."
    - heading: "Overwatch"
      paragraphs:
        - "But his life was thrown into chaos when the other gorillas led an uprising, killed the mission scientists, and claimed the colony for their own. Taking on the name of his beloved human caretaker, Winston built a makeshift rocket and escaped the base. Unbeknownst to him, Specimen 8—a hamster Winston had befriended named Hammond—had hitched a ride to Earth with him. While Hammond landed in Australia and settled among the Junkers, Winston found a new home with Overwatch, an organization that represented everything he had come to admire about humanity. Winston was finally able to live up to the heroic ideal that had been instilled in him."
        - "At Overwatch, Winston developed the chronal accelerator technology that anchored Tracer to the present. He, Tracer, and Genji graduated from agent training together and, together, assisted in apprehending first Maximilien and then the leader of Talon himself, Doomfist. When Overwatch fell, Winston was distraught and went into seclusion, longing for the golden days of heroism to return."
    - heading: "Recall"
      paragraphs:
        - "He would soon transform this longing into action. After the Reaper infiltrated Watchpoint: Gibraltar seeking the roster of former Overwatch agents, Winston repelled the Talon operative and sent out a global recall order for the agents of Overwatch to return to duty. Tracer was the first to respond, and he joined her in King’s Row, where the two successfully took out a suspected Null Sector agent and repaired the Grid, critical infrastructure to the omnics there."
        - "Inspired by their success in London, Winston remained hopeful that other ex-Overwatch agents would respond to his recall. He and Tracer embarked on a series of missions while they awaited their former comrades, even thwarting Widowmaker and Reaper in a high-profile attack on the Overwatch Museum in New York. But over a year from the recall, only Mei had joined them at Watchpoint: Gibraltar. When Winston intercepted news of the Null Sector attack in Paris, he realized it was likely to be Overwatch’s final battle. But Winston’s patience and faith were not in vain, as Genji, Mercy, Echo, Brigitte, and Reinhardt joined the fight."
        - "As more former Overwatch agents (and new blood) step forward to answer the call, Winston remains the steadfast beacon of a future worth fighting for."
-
  hero: "Wrecking Ball"
  entries:
    - heading: "Horizon Lunar Colony"
      paragraphs:
        - "In one of the many experiments carried out at Horizon Lunar Colony, animals were given genetic therapy to assess their adaptation to extended periods of habitation on the moon. As an unexpected side effect, several of them exhibited exceptional growth in physical size and brain function. While most of the test subjects were gorillas or other primates, there were some exceptions, including a hamster named Hammond."
        - "Like the others, Hammond's intelligence grew, and he became more curious about the world around him. Much to the puzzlement and amusement of the scientists, Hammond would frequently escape into different parts of the moon base. Though they'd always find him and return him to his cell, they never figured out the true purpose behind his nightly escapades. What they didn't know was that Hammond was busy scavenging and teaching himself the skills of a mechanic, which would soon come in handy."
    - heading: "Escape"
      paragraphs:
        - "The colony was eventually thrown into chaos when some of the gorillas rose up against the human scientists and took control. Not all of the subjects participated, however, and one of the gorillas, Winston, was making a plan to escape to Earth. Winston was unaware that Hammond too was searching for an exit, and had even designed his own escape pod. Winston unknowingly found Hammond’s plans in the base’s files and got to work. Hammond then built a makeshift capsule and secretly hitched it to Winston's craft as the gorilla blasted off. When the two entered Earth's atmosphere, Hammond broke off and landed in a different location: the wasteland of the Australian Outback."
    - heading: "Junker"
      paragraphs:
        - "Hammond modified his escape pod to enter the lucrative mech battle arena of the Scrapyard. Working his way up the ranks, \"Wrecking Ball\" went from contender to champion, though the pilot's identity remained a mystery to all except one."
        - "While Hammond journeys into the wider world from time to time, he’s found a happy—if somewhat chaotic—home at the Junker Queen’s side. After all, as reigning champion of the Scrapyard, he has a title to defend."
-
  hero: "Wuyang"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Wuyang grew up seeking to uphold his family’s legacy with the prestigious Wuxing University Fire College. Striving to meet their standards, he and his older sister, Anran, trained daily in various forms of kung fu, hoping to follow in the footsteps of their parents. But while Anran was easily accepted as a top student, Wuyang's best efforts were not enough to make the Fire College’s admittance cut off. Instead, he was accepted to the school’s Water College: a program that taught traditional Chinese healing methods and philosophies and how to apply them to the modern world. Unable to pursue the same field of study as his family, Wuyang was left questioning how to navigate the road ahead."
    - heading: "Wuxing University: Water College"
      paragraphs:
        - "During Wuyang’s first year in the Water College, he was surprised to find how much he enjoyed his studies. Learning about qi gong came naturally to him, and he found his classes mentally fulfilling, even if not as intense as the action-packed training of the Fire College. But in the back of his mind, it nagged at him that he was the black sheep of the family. He wanted to give his parents a reason to be proud of him despite his initial setbacks. Determined to find a way to marry his studies with his childhood training, he hatched a plan."
        - "Wuyang asked his best friend from the Metal College, Ming, to adapt one of his prototype staves into a tool that would let him manipulate the trajectory of water. With Ming’s creation in hand, he began studying Fire College techniques in addition to his normal schoolwork, coming up with innovative fighting combinations from the teachings of both the Fire and Water schools."
    - heading: "Null Sector In Chengdu"
      paragraphs:
        - "One night while Wuyang was studying, Null Sector suddenly launched an attack on Chengdu. With official forces on the way, the University's students were deployed to help evacuate citizens. After a heated argument with Anran, he reluctantly stayed behind to help injured civilians while she headed onto the battlefield with her classmates."
        - "But it wasn’t long before the tide of battle turned against them. Anran's unit had been ambushed by a Null Sector—and she'd stayed behind to buy the others time to escape. Fearing for his sister’s life, Wuyang rushed into the city to her aid, finding her completely surrounded by warbots. Using his own Water-based combat techniques, Wuyang completely wiped out the Null Sector units, saving his sister. Together, Anran and Wuyang fought their way back out of the city."
        - "Their heroic efforts were recognized by all, including the headmaster of the school—and more importantly, his parents. However, they were not the only ones who had taken notice of Wuyang’s feat. Some weeks later, he discovered a small medallion slipped under his dorm room door— one containing an invitation to join the newly reunited Overwatch. With renewed confidence and his sister’s encouragement, he prepared to join forces with them in his journey ahead."
    - heading: "Reign of Talon"
      paragraphs:
        - "Wuyang and Anran were making their journey to Watchpoint: Gibraltar for the first time when Talon launched their assault. The siblings dove into the fight, helping Overwatch deal with  the sudden attack—proof that they’re ready to help in the many battles ahead."
-
  hero: "Zarya"
  entries:
    - heading: "Early Life"
      paragraphs:
        - "Aleksandra was born in a remote Siberian village that was on the front lines of the Omnic Crisis. Although Russian forces defeated the robots and shut down their omnium, the region was devastated by the conflict. Only a child at the time, Aleksandra lost her father in the war and grew up surrounded by the devastation. As she grew older, she swore that she would gain the strength to help her people recover."
        - "Focusing on weightlifting and bodybuilding, Aleksandra was identified by the national athletics program as a potential star. She trained extensively, moving up the ranks while representing her country, and was expected to shatter longstanding records in the upcoming world championships."
    - heading: "Russian Defense Forces"
      paragraphs:
        - "But on the eve of the tournament, an attack came from the long-dormant Siberian omnium, and her village was thrust into war once again. Aleksandra immediately withdrew from the competition and rushed home to enlist in the military, sacrificing the life of fame and fortune she might have had. In one stroke, she became a sergeant in the Russian Defense Forces and a symbol to her people, a stalwart soldier who used her great strength to protect her homeland. She was given an experimental weapon by Katya Volskaya, CEO of Volskaya Industries. Her particle cannon was deemed too heavy for standard soldiers, but it also required the kind of quick maneuvering and accuracy that Russia’s mechanized force couldn’t achieve. Zarya fought on the front lines, and saved many lives with the weapon."
        - "However, in the wake of an unsuccessful assassination plot against Katya Volskaya by Talon operatives, Zarya was given a new mission: bring the Talon-affiliated hacker, Sombra, to justice. In her global search, Zarya was forced to partner with an omnic named Lynx Seventeen. The unlikely duo located Sombra in Dorado, though she slipped through their fingers after revealing that Katya was obtaining her anti-omnic technology from an omnic source. Grappling with the weight of this knowledge—and with a newfound appreciation of omnics thanks to Lynx—Zarya returned to the front lines in Siberia."
    - heading: "Siberian Front"
      paragraphs:
        - "When the search for new Overwatch operatives brought Cassidy to the frozen front in Novoanskoye, Zarya's unflinching defense of her homeland proved that he had found his newest recruit. Together they drove back the omnic forces swarming from the Siberian omnium, and Zarya was persuaded to offer her strength as part of the reformed Overwatch, defending her home on a global scale."
-
  hero: "Zenyatta"
  entries:
    - heading: "Shambali"
      paragraphs:
        - "Years ago, following the Omnic Crisis, a group of outcast omnic robots, known as the Shambali monks, abandoned their preprogrammed lives to establish a communal monastery deep in the Himalayas. After many years of meditation on the nature of existence, they came to the belief that they were more than artificial intelligences and that, like humans, they possessed the essence of a soul."
        - "Recognizing the spiritual equality they held with humans, the monks, led by their leader, Tekhartha Mondatta, sought to heal the wounds caused by the Omnic Crisis a generation earlier and bring humans and robots back into societal harmony. Their message was embraced by millions around the world, and they became global celebrities."
        - "Zenyatta was one such lost soul who embraced their message after meeting the monk Ramattra at a protest for omnic equality. Ramattra saw in him great spiritual potential, and the two became as brothers."
    - heading: "Monastery"
      paragraphs:
        - "After some time at the Shambali Monastery in Nepal, Zenyatta was able to help his own student find peace: the ex-Overwatch agent, Genji Shimada. Genji sought healing from many wounds he’d suffered, beginning with the horrific duel he’d fought with his brother, through his questionable missions in Blackwatch, to the fall of Overwatch. In time, Zenyatta helped his student see both his trials and his cybernetic form as a unique strength."
        - "But after Genji left his tutelage, Zenyatta began to see the limits of the Shambali path. He believed that the way to repair the problems between humans and omnics was not through dogmatic teaching but through interpersonal connection and engagement."
    - heading: "Wandering Monk"
      paragraphs:
        - "Ultimately, Zenyatta followed his own path. He chose to leave the monastery and wander the world, helping those he met to overcome their personal struggles and find inner peace."
        - "One of these chance encounters came in Suravasa, after a statue of Aurora, a figure at the center of Shambali teachings, was destroyed due to the aggressive construction efforts of the Vishkar Corporation. Zenyatta met with Satya Vaswani—Symmetra—whom the company had dispatched to fix the issue, sharing Aurora’s story and opening her eyes to the beauty of imperfection. Little did Satya know that Zenyatta had come to the temple in Suravasa to mourn and meditate on the loss of his master, Tekhartha Mondatta, who had been assassinated in King’s Row. Her gift to the people of the temple meant a great deal to him and to all the pilgrims there."
        - "Zenyatta continues to forge connections and impart knowledge worldwide, and when necessary, he will fight to protect the innocent, be they omnic or human."
    - heading: "Null Sector Retreats"
      paragraphs:
        - "Just before Null Sector retreated, Ramattra visited Zenyatta asking him to join his cause. Zenyatta declined his offer, refusing to abandon both omnics and humanity, and choosing to fight for a better world as his master once had."
