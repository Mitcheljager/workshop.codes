  id: 1748302
  category_id: 2
  title: Player Input Magnitude
  content: "## Description\n\n<big>Returns a value from 0 to 1 representing the magnitude of a player's current movement input. A value of 0 indicates no movement input; 1 indicates full input in any direction. Useful for detecting idle players or distinguishing walking from full-speed movement.</big>\n\n## Snippet\n\n```\nPlayer Input Magnitude(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose movement input magnitude will be returned."
  slug: player-input-magnitude
  tags: Player Input Magnitude
  group_id: Gn2vJwBp5rkC39s-DQhtMa
  created_at: "2026-04-04T14:19:22.774Z"
  updated_at: "2026-04-04T14:19:22.774Z"
-
  id: 1294830
  category_id: 2
  title: Is Match In Overtime
  content: "## Description\n\n<big>Returns True if the match is currently in an overtime state. Equivalent to checking if Match Time is 0 and the match has not yet ended, but provided as a direct boolean for convenience in conditions and HUD logic.</big>\n\n## Snippet\n\n```\nIs Match In Overtime;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: _None_"
  slug: is-match-in-overtime
  tags: Is Match In Overtime
  group_id: Wr6oNkTs1aeH84cUPjbFv
  created_at: "2026-04-04T07:44:31.117Z"
  updated_at: "2026-04-22T16:58:07.339Z"
