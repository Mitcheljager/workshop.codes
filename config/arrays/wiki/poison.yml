  id: 1473820
  category_id: 2
  title: Players Alive On Team
  content: "## Description\n\n<big>Returns an array of all players on a specified team who are currently alive. Excludes players who are dead and awaiting respawn. A convenience value equivalent to filtering All Players by team and alive state simultaneously.</big>\n\n## Snippet\n\n```\nPlayers Alive On Team(Team(Team 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team whose living players will be returned."
  slug: players-alive-on-team
  tags: Players Alive On Team
  group_id: Ns4hFvCj7wtB20r-EKdmOu
  created_at: "2026-04-06T11:27:14.441Z"
