  id: 1920582
  category_id: 1
  title: Player Armor Health
  content: "## Description\n\n<big>Returns the current armor health of a player as a flat value. Armor health is the yellow portion of the health bar that reduces incoming damage per hit. Returns 0 for heroes with no armor health component.</big>\n\n## Snippet\n\n```\nPlayer Armor Health(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose current armor health will be returned."
  slug: player-armor-health
  tags: Player Armor Health
  group_id: Sq6hOcIn3kdB72a-GEwvRp
  created_at: "2026-04-04T18:27:51.882Z"
  updated_at: "2026-04-04T18:27:51.882Z"
