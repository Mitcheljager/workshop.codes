  id: 2134507
  category_id: 2
  title: Time Since Last Damage Dealt
  content: "## Description\n\n<big>Returns the number of seconds since a player last dealt damage to any target. Resets to 0 each time damage is dealt. Returns a large value if the player has not dealt damage since the match began. Useful for detecting idle players or rewarding sustained aggression.</big>\n\n## Snippet\n\n```\nTime Since Last Damage Dealt(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose time since last damage dealt will be returned."
  slug: time-since-last-damage-dealt
  tags: Time Since Last Damage Dealt
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-25T07:18:56.229Z"
  updated_at: "2026-04-16T15:52:41.773Z"
