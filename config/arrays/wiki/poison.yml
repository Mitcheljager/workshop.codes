  id: 1739201
  category_id: 2
  title: Player With Most Eliminations
  content: "## Description\n\n<big>Returns the player on a specified team with the highest elimination count at the time of evaluation. If multiple players are tied, the first qualifying player in slot order is returned.</big>\n\n## Snippet\n\n```\nPlayer With Most Eliminations(Team(All Teams));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team from which the leading player will be selected."
  slug: player-with-most-eliminations
  tags: Player With Most Eliminations
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-19T12:33:57.441Z"
