  id: 1938674
  category_id: 2
  category_id: 2
  title: Array Sum
  content: "## Description\n\n<big>Returns the sum of all numeric values in a specified array. Non-numeric elements are ignored. Returns 0 for an empty array. Useful for totaling scores, accumulated stats, or any array of numeric Workshop values without requiring a manual loop.</big>\n\n## Snippet\n\n```\nArray Sum(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array of numeric values to sum."
  slug: array-sum
  tags: Array Sum
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2024-03-18T09:14:27.441Z"
  updated_at: "2024-03-18T09:14:27.441Z"
-
  id: 1748674
  category_id: 2
  category_id: 2
  title: Array Average
  content: "## Description\n\n<big>Returns the arithmetic mean of all numeric values in a specified array. Non-numeric elements are ignored in both the sum and the count. Returns 0 for an empty array. Useful for evaluating team averages, balancing scores, or smoothing sampled data over time.</big>\n\n## Snippet\n\n```\nArray Average(Global.HealthSamples);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array of numeric values to average."
  slug: array-average
  tags: Array Average
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2024-07-22T14:38:52.006Z"
  updated_at: "2025-02-14T10:22:37.441Z"
-
  id: 1503674
  category_id: 2
  category_id: 2
  title: Array Max
  content: "## Description\n\n<big>Returns the largest numeric value in a specified array. Non-numeric elements are ignored. Returns 0 for an empty array. Useful for leaderboard logic, identifying peak values, or selecting the highest stat among a group of players.</big>\n\n## Snippet\n\n```\nArray Max(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array from which the maximum value will be returned."
  slug: array-max
  tags: Array Max
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2024-09-11T07:52:14.882Z"
  updated_at: "2024-09-11T07:52:14.882Z"
-
  id: 1839674
  category_id: 2
  category_id: 2
  title: Array Min
  content: "## Description\n\n<big>Returns the smallest numeric value in a specified array. Non-numeric elements are ignored. Returns 0 for an empty array. Useful for identifying the lowest score, the least healthy player in a sampled set, or the minimum value in a dynamically populated dataset.</big>\n\n## Snippet\n\n```\nArray Min(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array from which the minimum value will be returned."
  slug: array-min
  tags: Array Min
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2024-09-11T07:53:29.006Z"
  updated_at: "2024-09-11T07:53:29.006Z"
