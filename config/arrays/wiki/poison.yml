  id: 1465830
  category_id: 1
  title: Match Time Elapsed
  content: "## Description\n\n<big>Returns the number of seconds that have elapsed since the current match phase began. Resets when a new phase starts, such as at the beginning of overtime or a new round. Complements the existing Match Time value which counts down.</big>\n\n## Snippet\n\n```\nMatch Time Elapsed;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: _None_"
  slug: match-time-elapsed
  tags: Match Time Elapsed
