  id: 1654029
  category_id: 1
  title: Current Objective Position
  content: "## Description\n\n<big>Returns the world position of the active objective, such as the payload, the capture point centroid, or the flag carrier's position depending on the current game mode. Returns Null if no objective is currently active.</big>\n\n## Snippet\n\n```\nCurrent Objective Position;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: _None_"
  slug: current-objective-position
  tags: Current Objective Position
  group_id: Yz6hJmSe2fwQ14n-BKprVc
