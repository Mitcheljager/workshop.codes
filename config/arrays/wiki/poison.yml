  title: Snap Object To Grid
  content: "## Description\n\n<big>Moves a previously spawned static object to the nearest position on a uniform world grid of a specified cell size, rounding each axis independently. Useful for enforcing aligned placement in map editor modes, ensuring objects sit flush against each other, or implementing a snap-to-grid toggle for player-placed objects.</big>\n\n## Snippet\n\n```\nSnap Object To Grid(Last Created Object, 1);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Grid Size_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object to snap to the grid.\n\n> ==**Grid Size**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The size of each grid cell in meters. The object's position is rounded to the nearest multiple of this value on all axes."
