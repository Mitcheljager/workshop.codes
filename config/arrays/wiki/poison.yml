  id: 1516382
  category_id: 1
  title: Is Player Airborne
  content: "## Description\n\n<big>Returns True if a player is currently not in contact with any ground surface, including during jumps, falls, knockbacks, or ability-based flight. Returns False if the player is standing on geometry. Distinct from Is In Air in that it also returns True during wall-climbing and ledge-hanging states.</big>\n\n## Snippet\n\n```\nIs Player Airborne(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose airborne state will be evaluated."
  slug: is-player-airborne
  tags: Is Player Airborne
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-05T22:44:09.881Z"
  updated_at: "2026-04-05T22:44:09.881Z"
-
  id: 1861749
  category_id: 1
  title: Furthest Player From Position
  content: "## Description\n\n<big>Returns the player from a specified team or array who is currently the greatest distance from a given world position. Useful for identifying stragglers, locating the most isolated target, or anchoring game logic to outlier positions.</big>\n\n## Snippet\n\n```\nFurthest Player From Position(Vector(0, 0, 0), Team(Team 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Position_==, ==_Team_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The reference world position from which player distances are measured.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team from which the furthest player will be selected."
  slug: furthest-player-from-position
  tags: Furthest Player From Position
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-08T03:29:17.004Z"
  updated_at: "2026-04-31T18:07:55.338Z"
-
  id: 1583920
  category_id: 1
  title: Average Team Health Percent
  content: "## Description\n\n<big>Returns the mean health percentage across all living players on a specified team, as a value from 0 to 100. Eliminated players are excluded from the calculation. Useful for team-wide healing triggers, difficulty scaling, or HUD indicators.</big>\n\n## Snippet\n\n```\nAverage Team Health Percent(Team(Team 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **Team 1**_\n> The team whose average health percentage will be returned."
  slug: average-team-health-percent
  tags: Average Team Health Percent
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2026-04-03T08:11:44.229Z"
