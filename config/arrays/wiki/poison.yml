  id: 1503849
  category_id: 1
  title: Position Of Deployable
  content: "## Description\n\n<big>Returns the current world position of a specified deployable object. Supports reevaluation for deployables that can move or be repositioned during their lifetime. Returns Null if the deployable no longer exists.</big>\n\n## Snippet\n\n```\nPosition Of Deployable(First Of(Deployables Owned By Player(Event Player)));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose world position will be returned."
  slug: position-of-deployable
  tags: Position Of Deployable
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-28T07:52:14.882Z"
  updated_at: "2026-04-13T16:04:39.117Z"
