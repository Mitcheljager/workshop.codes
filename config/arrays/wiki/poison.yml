  id: 1274920
  category_id: 1
  title: Projectile Travel Time
  content: "## Description\n\n<big>Returns the estimated time in seconds for a projectile fired by a player to travel to a specified world position, based on the hero's current projectile speed. Useful for predictive aim assistance tools, lead-calculation displays, or delay-triggered effects.</big>\n\n## Snippet\n\n```\nProjectile Travel Time(Event Player, Position Of(Attacker));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==, ==_Target Position_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose projectile speed is used for the calculation.\n\n> ==**Target Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position to calculate travel time toward."
  slug: projectile-travel-time
  tags: Projectile Travel Time
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-22T17:03:55.006Z"
  updated_at: "2026-04-22T17:03:55.006Z"
