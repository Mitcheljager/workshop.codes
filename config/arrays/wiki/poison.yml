  id: 1274674
  category_id: 2
  category_id: 2
  title: Array Contains Duplicates
  content: "## Description\n\n<big>Returns True if a specified array contains any two elements that are equal in value. Returns False if all elements are unique or the array has fewer than two elements. Useful for validating uniqueness in player assignment arrays, random draws, or configuration sets.</big>\n\n## Snippet\n\n```\nArray Contains Duplicates(Global.AssignedRoles);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to check for duplicate values."
  slug: array-contains-duplicates
  tags: Array Contains Duplicates
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2025-01-09T08:49:22.339Z"
  updated_at: "2025-01-09T08:49:22.339Z"
