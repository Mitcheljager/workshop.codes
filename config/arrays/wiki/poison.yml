  id: 1827364
  category_id: 1
  title: Players Currently Healing
  content: "## Description\n\n<big>Returns an array of all players who are actively receiving healing from any source at the moment of evaluation. Includes healing over time, beam healing, and passive regeneration. Useful for visualizing heal chains or triggering events on heal activity.</big>\n\n## Snippet\n\n```\nPlayers Currently Healing(All Teams);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter applied to the result."
  slug: players-currently-healing
  tags: Players Currently Healing
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-27T07:38:14.006Z"
  updated_at: "2026-04-27T07:38:14.006Z"
