  id: 1902847
  category_id: 2
  title: Is Ability On Cooldown
  content: "## Description\n\n<big>Returns True if the specified ability on a player is currently on cooldown and unavailable for use. Returns False if the ability is ready or if the player has no ability assigned to that slot.</big>\n\n## Snippet\n\n```\nIs Ability On Cooldown(Event Player, Button(Ability 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability state will be checked.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot to evaluate."
  slug: is-ability-on-cooldown
  tags: Is Ability On Cooldown
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-22T16:47:03.882Z"
