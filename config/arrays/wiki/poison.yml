  id: 1115837
  category_id: 0
  title: Transfer Ultimate Charge
  content: "## Description\n\n<big>Moves a percentage of ultimate charge from one player to another. The source player loses the transferred amount and the receiving player gains it, both clamped to their respective 0–100 range. Useful for support mechanics, penalty systems, or cooperative ultimate-building modes.</big>\n\n## Snippet\n\n```\nTransfer Ultimate Charge(Event Player, Attacker, 25);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Source_==, ==_Receiver_==, ==_Amount_==\n\n> ==**Source**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player from whom ultimate charge is taken.\n\n> ==**Receiver**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who receives the ultimate charge.\n\n> ==**Amount**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The percentage of ultimate charge to transfer, from 0 to 100."
  slug: transferultimate-charge
  tags: Transfer Ultimate Charge
  group_id: Bm7oEyHu3qlK29j-VCfwPd
  created_at: "2026-04-03T22:41:08.557Z"
  updated_at: "2026-04-03T22:41:08.557Z"
-
  id: 1793620
  category_id: 0
  title: Set Hitbox Scale
  content: "## Description\n\n<big>Uniformly scales the collision and damage hitbox of a player by a given multiplier, affecting both incoming hitscan and projectile hit detection. Does not visually scale the player model. Values below 1 shrink the hitbox, making the player harder to hit; values above 1 enlarge it.</big>\n\n## Snippet\n\n```\nSet Hitbox Scale(Event Player, 0.5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Scale_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose hitbox will be scaled.\n\n> ==**Scale**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to the player's hitbox size. 1 is the default size. Values are clamped between 0.1 and 3."
  slug: set-hitbox-scale
  tags: Set Hitbox Scale
  group_id: Nc0sBjIy7okG83e-ZWuvRl
  created_at: "2026-04-15T04:52:36.118Z"
  updated_at: "2026-04-21T12:17:49.341Z"
-
  id: 1534872
  category_id: 0
  title: Clone Player Ability
  content: "## Description\n\n<big>Copies a specific ability from one player and grants it to another player as a temporary replacement for one of their own ability slots. The receiving player uses the cloned ability with their own stats unless overridden. The original player retains their ability unaffected.</big>\n\n## Snippet\n\n```\nClone Player Ability(Event Player, Attacker, Button(Ability 1), Button(Ability 2), 10);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Receiver_==, ==_Source_==, ==_Source Button_==, ==_Target Button_==, ==_Duration_==\n\n> ==**Receiver**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will temporarily receive the cloned ability.\n\n> ==**Source**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability will be cloned.\n\n> ==**Source Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot on the source player to clone from.\n\n> ==**Target Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot on the receiver that the cloned ability will occupy.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **5**_\n> How long the cloned ability remains available, in seconds. Use 0 for an indefinite duration."
  slug: clone-player-ability
  tags: Clone Player Ability
  group_id: Hq3nWbTs8uxE21c-JKpvOy
  created_at: "2026-04-05T10:22:14.445Z"
  updated_at: "2026-04-05T10:22:14.445Z"
-
  id: 1867503
  category_id: 0
  title: Set Vision Cone
  content: "## Description\n\n<big>Restricts a player's field of view to a cone of a given angle, causing anything outside the cone to be obscured by a customizable fog color. Useful for stealth game modes, horror maps, or penalty mechanics. The cone is always centered on the player's current facing direction.</big>\n\n## Snippet\n\n```\nSet Vision Cone(Event Player, 60, Color(Black), True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Angle_==, ==_Obscure Color_==, ==_Affect Minimap_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose vision will be restricted.\n\n> ==**Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **90**_\n> The total angular width of the visible cone in degrees. 360 disables the restriction entirely.\n\n> ==**Obscure Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **Black**_\n> The color used to fill the obscured area outside the cone.\n\n> ==**Affect Minimap**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, the minimap is also restricted to the visible cone angle."
  slug: set-vision-cone
  tags: Set Vision Cone
  group_id: Xp7cAjRn2wdL04m-BVqsEt
  created_at: "2026-04-19T14:08:33.771Z"
  updated_at: "2026-04-04T09:51:20.114Z"
