  id: 1839193
  category_id: 1
  title: Is Player Behind Player
  content: "## Description\n\n<big>Returns True if a second player is currently located within the rear hemisphere of a reference player's facing direction. Equivalent to checking if the angle between the reference player's forward vector and the direction to the second player exceeds 90 degrees.</big>\n\n## Snippet\n\n```\nIs Player Behind Player(Event Player, Attacker);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Other Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The reference player whose facing direction is used.\n\n> ==**Other Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose position is evaluated relative to the reference."
  slug: is-player-behind-player
  tags: Is Player Behind Player
  group_id: Zt0eRwCh5bnJ19k-FUdlVo
  created_at: "2026-04-23T13:41:07.117Z"
  updated_at: "2026-04-23T13:41:07.117Z"
