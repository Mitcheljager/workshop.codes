  id: 1839471
  category_id: 1
  title: Active Status Effects Of Player
  content: "## Description\n\n<big>Returns an array of all status effects currently applied to a player, such as Hacked, Frozen, Asleep, or Stunned. The array is empty if no status effects are active. Useful for status-display HUDs, stacking-debuff logic, or cleanse mechanics.</big>\n\n## Snippet\n\n```\nActive Status Effects Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose active status effects will be returned."
  slug: active-status-effects-of-player
  tags: Active Status Effects Of Player
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-05T08:29:41.117Z"
