  id: 1638193
  category_id: 1
  title: Closest Deployable To Position
  content: "## Description\n\n<big>Returns the deployable from a specified player's active deployables that is nearest to a given world position. Returns Null if the player has no active deployables. Useful for proximity-based deployable interaction, targeting, or effect anchoring.</big>\n\n## Snippet\n\n```\nClosest Deployable To Position(Event Player, Position Of(Event Player));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Deployable</span>_\n**Parameters**: ==_Player_==, ==_Position_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose deployables will be searched.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which proximity is measured."
  slug: closest-deployable-to-position
  tags: Closest Deployable To Position
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-05T17:03:11.774Z"
  updated_at: "2026-04-05T17:03:11.774Z"
