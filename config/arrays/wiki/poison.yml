  id: 1839201
  category_id: 2
  title: Total Damage Dealt This Match
  content: "## Description\n\n<big>Returns the cumulative damage a player has dealt to all targets across the entire match, including all lives. Unlike Damage Dealt This Life, this value persists through deaths and respawns and only resets when a new match begins.</big>\n\n## Snippet\n\n```\nTotal Damage Dealt This Match(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose match-total damage dealt will be returned."
  slug: total-damage-dealt-this-match
  tags: Total Damage Dealt This Match
  group_id: Bc9pEmWu3qlK57d-ZNoxCh
  created_at: "2026-04-02T20:03:49.882Z"
  updated_at: "2026-04-13T09:14:22.006Z"
