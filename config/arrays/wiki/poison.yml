  id: 1923016
  category_id: 1
  title: Health Percent Missing
  content: "## Description\n\n<big>Returns the percentage of a player's health that is currently missing, as a value from 0 to 100. A full-health player returns 0. A player at half health returns 50. Equivalent to 100 minus the result of Health Percent, but provided as a convenience value for threshold-based conditions.</big>\n\n## Snippet\n\n```\nHealth Percent Missing(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose missing health percentage will be returned."
  slug: health-percent-missing
  tags: Health Percent Missing
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-17T20:37:04.558Z"
  updated_at: "2026-04-17T20:37:04.558Z"
