  id: 1274293
  category_id: 2
  category_id: 0
  title: Create Compass Marker
  content: "## Description\n\n<big>Places a persistent directional marker on a player's compass or heading indicator pointing toward a specified world position. The marker updates in real time as the player moves. Useful for objective waypoints, teammate indicators, or custom navigation systems.</big>\n\n## Snippet\n\n```\nCreate Compass Marker(Event Player, Current Objective Position, Color(Yellow), Icon(Arrow: Up));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Visible To_==, ==_Position_==, ==_Color_==, ==_Icon_==\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The players who will see the compass marker.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position the marker points toward. Supports reevaluation.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The color of the compass marker.\n\n> ==**Icon**==\n> _Type: **[Icon](/wiki/articles/icon)**, Default: **Icon(Dot)**_\n> The icon displayed on the compass for this marker."
  slug: create-compass-marker
  tags: Create Compass Marker
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2024-11-14T08:49:22.339Z"
  updated_at: "2025-07-30T10:38:14.882Z"
-
  id: 1920293
  category_id: 2
  category_id: 0
  title: Flash HUD Element
  content: "## Description\n\n<big>Causes an existing HUD text or icon element to flash at a specified rate for a set duration, alternating between visible and invisible states. Reverts to a steady visible state when the duration expires. Useful for drawing player attention to critical HUD information.</big>\n\n## Snippet\n\n```\nFlash HUD Element(Last Text ID, 2, 3);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_HUD Element_==, ==_Rate_==, ==_Duration_==\n\n> ==**HUD Element**==\n> _Type: **[HUD Element](/wiki/articles/hud-element)**, Default: **Last Text ID**_\n> The HUD element to flash.\n\n> ==**Rate**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The number of times per second the element toggles between visible and invisible.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **3**_\n> How long the flashing effect lasts, in seconds. Use 0 for indefinite flashing."
  slug: flash-hud-element
  tags: Flash HUD Element
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2025-04-02T13:21:33.117Z"
  updated_at: "2025-04-02T13:21:33.117Z"
-
  id: 1638493
  category_id: 2
  category_id: 0
  title: Create Damage Number
  content: "## Description\n\n<big>Spawns a floating damage number at a world position that animates upward and fades out, mimicking the in-game damage number display. The value, color, and size are configurable. Useful for custom game modes that display modified or fictional damage values independently of actual damage events.</big>\n\n## Snippet\n\n```\nCreate Damage Number(All Players, Position Of(Event Player), 250, Color(Red), 1.5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Visible To_==, ==_Position_==, ==_Value_==, ==_Color_==, ==_Scale_==\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The players who will see the damage number.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position at which the number spawns.\n\n> ==**Value**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **0**_\n> The numeric value displayed.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The color of the damage number text.\n\n> ==**Scale**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The size multiplier applied to the number. 1 is the default in-game size."
  slug: create-damage-number
  tags: Create Damage Number
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2024-07-18T16:03:11.774Z"
  updated_at: "2025-06-24T09:52:37.006Z"
-
  id: 1374293
  category_id: 2
  category_id: 0
  title: Set HUD Element Visibility
  content: "## Description\n\n<big>Shows or hides an existing HUD element for all players currently able to see it, without destroying it. Hidden elements retain their sort order and configuration and can be reshown at any time. Useful for toggling context-sensitive UI panels during different game phase states.</big>\n\n## Snippet\n\n```\nSet HUD Element Visibility(Last Text ID, False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_HUD Element_==, ==_Visible_==\n\n> ==**HUD Element**==\n> _Type: **[HUD Element](/wiki/articles/hud-element)**, Default: **Last Text ID**_\n> The HUD element to show or hide.\n\n> ==**Visible**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If False, the element is hidden from all viewers without being destroyed."
  slug: set-hud-element-visibility
  tags: Set HUD Element Visibility
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2024-03-29T08:44:58.882Z"
  updated_at: "2025-10-07T15:03:33.117Z"
-
  id: 1920493
  category_id: 2
  category_id: 0
  title: Create Crosshair Overlay
  content: "## Description\n\n<big>Renders a custom crosshair shape over a player's default crosshair, drawn in a specified color and scale. The overlay persists until destroyed with Destroy Crosshair Overlay. Useful for game modes that assign roles or states communicated through crosshair appearance.</big>\n\n## Snippet\n\n```\nCreate Crosshair Overlay(Event Player, Icon(Circle), Color(Red), 1.5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Shape_==, ==_Color_==, ==_Scale_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose crosshair will have the overlay applied.\n\n> ==**Shape**==\n> _Type: **[Icon](/wiki/articles/icon)**, Default: **Icon(Circle)**_\n> The icon shape to render as the crosshair overlay.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The color of the crosshair overlay.\n\n> ==**Scale**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The size multiplier applied to the overlay shape relative to the default crosshair size."
  slug: create-crosshair-overlay
  tags: Create Crosshair Overlay
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2025-08-14T21:17:44.117Z"
  updated_at: "2025-08-14T21:17:44.117Z"
-
  id: 1583493
  category_id: 2
  category_id: 0
  title: Set Scoreboard Row
  content: "## Description\n\n<big>Writes a custom label and value pair into a specified row of the Workshop scoreboard panel, overriding the default stat displayed in that position. Supports reevaluation of the value field. Useful for replacing default scoreboard columns with game-mode-specific metrics.</big>\n\n## Snippet\n\n```\nSet Scoreboard Row(Event Player, 0, Custom String(\"Score\"), Global.PlayerScore[Index Of Array Value(All Players, Event Player)]);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Row Index_==, ==_Label_==, ==_Value_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose scoreboard row will be customized.\n\n> ==**Row Index**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **0**_\n> The zero-based index of the scoreboard column to override.\n\n> ==**Label**==\n> _Type: **[String](/wiki/articles/string)**, Default: **Custom String(\"\")**_\n> The column header label displayed for this row entry.\n\n> ==**Value**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **0**_\n> The numeric value displayed in the cell. Supports reevaluation."
  slug: set-scoreboard-row
  tags: Set Scoreboard Row
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2024-12-22T06:38:29.003Z"
  updated_at: "2025-09-19T12:14:22.882Z"
