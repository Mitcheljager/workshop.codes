  category_id: 2
  title: Array Unique
  content: "## Description\n\n<big>Returns a copy of a specified array with all duplicate values removed, preserving only the first occurrence of each unique element. The relative order of remaining elements is maintained. Useful for deduplicating player lists, tag sets, or any array that may accumulate repeated entries over time.</big>\n\n## Snippet\n\n```\nArray Unique(Global.TaggedPlayers);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array from which duplicate values will be removed."
  slug: array-unique
  tags: Array Unique
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2025-04-03T16:03:11.774Z"
  updated_at: "2025-04-03T16:03:11.774Z"
-
  id: 1374674
  category_id: 2
  category_id: 2
  title: Array Intersection
  content: "## Description\n\n<big>Returns an array containing only the elements that appear in both of two specified arrays. Duplicate values are not included more than once in the result. Useful for finding shared members between two player groups, matching tag sets, or evaluating overlap between two datasets.</big>\n\n## Snippet\n\n```\nArray Intersection(Global.TeamAPlayers, Global.OnObjectivePlayers);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array A_==, ==_Array B_==\n\n> ==**Array A**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The first array to compare.\n\n> ==**Array B**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The second array to compare. Only elements also present in Array A are returned."
  slug: array-intersection
  tags: Array Intersection
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2024-06-14T08:44:58.882Z"
  updated_at: "2025-09-01T15:03:33.117Z"
-
  id: 1920774
  category_id: 2
  category_id: 2
  title: Array Difference
  content: "## Description\n\n<big>Returns an array containing all elements from the first array that do not appear in the second array. The order of remaining elements is preserved. Useful for computing exclusion sets, identifying players not in a group, or subtracting one filtered list from another.</big>\n\n## Snippet\n\n```\nArray Difference(All Players(All Teams), Global.EliminatedPlayers);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array A_==, ==_Array B_==\n\n> ==**Array A**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The source array whose elements will be filtered.\n\n> ==**Array B**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array of values to exclude from Array A."
  slug: array-difference
  tags: Array Difference
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2024-08-29T21:17:44.117Z"
  updated_at: "2025-06-18T12:14:22.882Z"
-
  id: 1583774
  category_id: 2
  category_id: 2
  title: Array Index Of Max
  content: "## Description\n\n<big>Returns the zero-based index of the element with the largest numeric value in a specified array. If multiple elements share the maximum value, the index of the first occurrence is returned. Useful for identifying which player, slot, or entry holds the leading value without a separate lookup step.</big>\n\n## Snippet\n\n```\nArray Index Of Max(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array in which the index of the maximum value will be located."
  slug: array-index-of-max
  tags: Array Index Of Max
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2025-07-11T06:38:29.003Z"
  updated_at: "2025-07-11T06:38:29.003Z"
-
  id: 1938775
  title: Array Sorted Ascending
  content: "## Description\n\n<big>Returns a copy of a specified array with all numeric elements sorted from smallest to largest. Non-numeric elements are appended to the end of the result in their original order. The original array is not modified. Useful for leaderboard ordering, priority queues, or rank assignment systems.</big>\n\n## Snippet\n\n```\nArray Sorted Ascending(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to sort in ascending order."
  slug: array-sorted-ascending
  tags: Array Sorted Ascending
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2024-04-02T09:14:27.441Z"
  updated_at: "2024-04-02T09:14:27.441Z"
-
  id: 1748775
  category_id: 2
  title: Array Sorted Descending
  content: "## Description\n\n<big>Returns a copy of a specified array with all numeric elements sorted from largest to smallest. Non-numeric elements are appended to the end of the result in their original order. The original array is not modified. Useful for displaying leaderboards in conventional top-down order or prioritizing highest-value targets.</big>\n\n## Snippet\n\n```\nArray Sorted Descending(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to sort in descending order."
  slug: array-sorted-descending
  tags: Array Sorted Descending
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2024-04-02T09:15:44.006Z"
  updated_at: "2024-04-02T09:15:44.006Z"
-
  id: 1503775
  category_id: 2
  title: Array Flattened
  content: "## Description\n\n<big>Returns a single-dimensional array produced by recursively merging all nested arrays within a specified array into one flat sequence. Non-array elements are included as-is. Useful for collapsing multi-dimensional data structures, merging grouped player lists, or simplifying nested Workshop array logic.</big>\n\n## Snippet\n\n```\nArray Flattened(Global.NestedTeamArrays);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The potentially nested array to flatten into a single dimension."
  slug: array-flattened
  tags: Array Flattened
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2025-02-17T07:52:14.882Z"
  updated_at: "2025-02-17T07:52:14.882Z"
-
  id: 1839775
  category_id: 2
  title: Array Shuffled
  content: "## Description\n\n<big>Returns a copy of a specified array with its elements rearranged in a random order. The original array is not modified. Each evaluation produces a independently randomized result. Useful for randomizing turn order, shuffling ability pools, or distributing roles unpredictably at the start of a match.</big>\n\n## Snippet\n\n```\nArray Shuffled(All Players(All Teams));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array whose elements will be randomly reordered."
  slug: array-shuffled
  tags: Array Shuffled
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2024-10-14T11:33:07.006Z"
  updated_at: "2024-10-14T11:33:07.006Z"
-
  id: 1274775
  category_id: 2
  title: Array Without Index
  content: "## Description\n\n<big>Returns a copy of a specified array with the element at a given zero-based index removed. All subsequent elements shift down by one position. The original array is not modified. Useful for removing a specific entry from a list without searching for its value, particularly when the index is already known.</big>\n\n## Snippet\n\n```\nArray Without Index(Global.PlayerQueue, 0);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==, ==_Index_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The source array from which an element will be removed.\n\n> ==**Index**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **0**_\n> The zero-based index of the element to remove. Out-of-range indices return the original array unchanged."
  slug: array-without-index
  tags: Array Without Index
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2024-07-31T08:49:22.339Z"
  updated_at: "2025-04-20T10:38:14.882Z"
-
  id: 1920875
  category_id: 2
  title: Array Index Of Min
  content: "## Description\n\n<big>Returns the zero-based index of the element with the smallest numeric value in a specified array. If multiple elements share the minimum value, the index of the first occurrence is returned. Useful for identifying the lowest-scoring player, the least charged ability slot, or the earliest expiring timer in a set.</big>\n\n## Snippet\n\n```\nArray Index Of Min(Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array in which the index of the minimum value will be located."
  slug: array-index-of-min
  tags: Array Index Of Min
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2025-05-09T13:21:33.117Z"
  updated_at: "2025-05-09T13:21:33.117Z"
-
  id: 1638775
  category_id: 2
  title: Array Chunk
  content: "## Description\n\n<big>Returns a two-dimensional array produced by dividing a specified array into consecutive sub-arrays of a given size. The final chunk may be smaller than the specified size if the array length is not evenly divisible. Useful for paginating player lists, distributing players into balanced groups, or processing large arrays in batches.</big>\n\n## Snippet\n\n```\nArray Chunk(All Players(All Teams), 3);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==, ==_Chunk Size_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to divide into chunks.\n\n> ==**Chunk Size**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **2**_\n> The maximum number of elements in each chunk. Must be at least 1."
  slug: array-chunk
  tags: Array Chunk
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2024-11-05T16:03:11.774Z"
  updated_at: "2025-08-29T09:52:37.006Z"
-
  id: 1374775
  category_id: 2
  title: Array Zip
  content: "## Description\n\n<big>Returns an array of two-element sub-arrays, each pairing the element at the same index from two source arrays. If the arrays are of unequal length, pairing stops at the end of the shorter array. Useful for associating parallel data sets such as player arrays with score arrays, or key-value pair structures.</big>\n\n## Snippet\n\n```\nArray Zip(All Players(All Teams), Global.ScoreArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array A_==, ==_Array B_==\n\n> ==**Array A**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The first array to pair from.\n\n> ==**Array B**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The second array to pair from. Each element is matched with the element at the same index in Array A."
  slug: array-zip
  tags: Array Zip
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2025-03-21T08:44:58.882Z"
  updated_at: "2025-03-21T08:44:58.882Z"
-
  id: 1920975
  category_id: 2
  title: Array Count Where
  content: "## Description\n\n<big>Returns the number of elements in a specified array that satisfy a given condition, evaluated using the current array element value. Mirrors the filtering logic of Filtered Array but returns a count rather than the matching elements themselves. Useful for compact condition checks, threshold triggers, and summary statistics.</big>\n\n## Snippet\n\n```\nArray Count Where(All Players(All Teams), Health Of(Current Array Element) < 50);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Array_==, ==_Condition_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array whose elements will be evaluated.\n\n> ==**Condition**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> The condition evaluated for each element using Current Array Element. Elements for which this evaluates to True are counted."
  slug: array-count-where
  tags: Array Count Where
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2024-06-18T21:17:44.117Z"
  updated_at: "2025-07-24T12:14:22.882Z"
-
  id: 1583875
  category_id: 2
  title: Array Sorted By
  content: "## Description\n\n<big>Returns a copy of a specified array sorted according to a custom key expression evaluated for each element using Current Array Element. Elements are ordered from the smallest to the largest key value. Useful for sorting players by health, score, distance, or any other dynamically computed property without requiring a manual sort implementation.</big>\n\n## Snippet\n\n```\nArray Sorted By(All Players(All Teams), Health Of(Current Array Element));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==, ==_Key_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to sort.\n\n> ==**Key**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **Current Array Element**_\n> The expression evaluated for each element using Current Array Element. Elements are sorted in ascending order of this value."
  slug: array-sorted-by
  tags: Array Sorted By
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2024-09-27T06:38:29.003Z"
  updated_at: "2025-10-15T12:14:22.882Z"
-
  id: 1938876
  category_id: 0
  title: Spawn Static Object
  content: "## Description\n\n<big>Places a persistent static mesh object at a specified world position and rotation. The object has no collision or interaction by default and is purely visual unless configured otherwise. Destroyed with Destroy Static Object. Useful for constructing custom map geometry, decorations, or level design elements at runtime.</big>\n\n## Snippet\n\n```\nSpawn Static Object(Mesh(Crate), Vector(0, 0, 0), Vector(0, 0, 0), Vector(1, 1, 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Mesh_==, ==_Position_==, ==_Rotation_==, ==_Scale_==\n\n> ==**Mesh**==\n> _Type: **[Mesh](/wiki/articles/mesh)**, Default: **Mesh(Crate)**_\n> The static mesh asset to place in the world.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position at which the object will be placed.\n\n> ==**Rotation**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The Euler rotation of the object in degrees on each axis.\n\n> ==**Scale**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(1, 1, 1)**_\n> The scale of the object on each axis. A value of Vector(1, 1, 1) represents the mesh's default size."
  slug: spawn-static-object
  tags: Spawn Static Object
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2024-05-19T09:14:27.441Z"
  updated_at: "2025-03-07T11:22:14.882Z"
-
  id: 1748876
  category_id: 0
  title: Set Object Position
  content: "## Description\n\n<big>Moves a previously spawned static object to a new world position without destroying and replacing it. The object retains its current rotation and scale. Supports reevaluation, allowing the object to track a dynamic position in real time. Useful for animated props, moving platforms, or editor-style drag-and-drop placement.</big>\n\n## Snippet\n\n```\nSet Object Position(Last Created Object, Vector(0, 5, 0));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Position_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object to reposition.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The new world position for the object. Supports reevaluation."
  slug: set-object-position
  tags: Set Object Position
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2024-08-11T14:38:52.006Z"
  updated_at: "2025-05-29T10:22:37.441Z"
-
  id: 1503876
  category_id: 0
  title: Set Object Rotation
  content: "## Description\n\n<big>Applies a new Euler rotation to a previously spawned static object, overriding its current orientation. Does not affect the object's position or scale. Supports reevaluation for continuously rotating objects. Useful for spinning props, directional indicators, or editor rotation handles.</big>\n\n## Snippet\n\n```\nSet Object Rotation(Last Created Object, Vector(0, Total Time Elapsed * 90, 0));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Rotation_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object whose rotation will be set.\n\n> ==**Rotation**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The new Euler rotation in degrees on each axis. Supports reevaluation."
  slug: set-object-rotation
  tags: Set Object Rotation
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2025-01-03T07:52:14.882Z"
  updated_at: "2025-01-03T07:52:14.882Z"
-
  id: 1839876
  category_id: 0
  title: Set Object Scale
  content: "## Description\n\n<big>Resizes a previously spawned static object by applying a new scale vector, overriding its current size. Each axis is scaled independently, allowing non-uniform stretching. Supports reevaluation. Useful for growing or shrinking props dynamically, simulating construction, or building resize handles in a map editor context.</big>\n\n## Snippet\n\n```\nSet Object Scale(Last Created Object, Vector(2, 1, 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Scale_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object whose scale will be set.\n\n> ==**Scale**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(1, 1, 1)**_\n> The new scale of the object on each axis. Supports reevaluation."
  slug: set-object-scale
  tags: Set Object Scale
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2024-07-07T11:33:07.006Z"
  updated_at: "2025-04-14T14:57:48.441Z"
-
  id: 1274876
  category_id: 0
  title: Set Object Color
  content: "## Description\n\n<big>Applies a color tint to a previously spawned static object, overriding its default material color. The tint is multiplicative, meaning a value of White preserves the original colors while other values shift the appearance accordingly. Useful for team-colored props, state-indicating objects, or stylized map decoration.</big>\n\n## Snippet\n\n```\nSet Object Color(Last Created Object, Color(Red));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Color_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object whose color tint will be set.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The color tint to apply to the object. White preserves the original material color."
  slug: set-object-color
  tags: Set Object Color
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2024-11-22T08:49:22.339Z"
  updated_at: "2025-08-05T10:38:14.882Z"
-
  id: 1920876
  category_id: 0
  title: Set Object Collision
  content: "## Description\n\n<big>Enables or disables physical collision on a previously spawned static object. When collision is enabled, players and projectiles are blocked by the object's geometry. When disabled, the object acts as a purely visual element that players and projectiles pass through freely.</big>\n\n## Snippet\n\n```\nSet Object Collision(Last Created Object, True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Enabled_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object whose collision state will be changed.\n\n> ==**Enabled**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If True, the object blocks players and projectiles. If False, the object is passable."
  slug: set-object-collision
  tags: Set Object Collision
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2025-06-26T13:21:33.117Z"
  updated_at: "2025-06-26T13:21:33.117Z"
-
  id: 1638876
  category_id: 0
  title: Set Object Visibility
  content: "## Description\n\n<big>Shows or hides a previously spawned static object for a specified audience without destroying it. Hidden objects retain their position, rotation, scale, and collision state. Useful for revealing map elements at specific moments, creating team-asymmetric environments, or toggling props during different game phases.</big>\n\n## Snippet\n\n```\nSet Object Visibility(Last Created Object, All Players, False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Visible To_==, ==_Visible_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object whose visibility will be changed.\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The players for whom visibility will be changed.\n\n> ==**Visible**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If False, the object will not render for the specified audience."
  slug: set-object-visibility
  tags: Set Object Visibility
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2024-09-14T16:03:11.774Z"
  updated_at: "2025-07-12T09:52:37.006Z"
-
  id: 1374876
  category_id: 0
  title: Destroy All Objects
  content: "## Description\n\n<big>Instantly destroys all static objects currently present in the world that were spawned via Spawn Static Object, regardless of when or by whom they were created. Useful for resetting a map editor session, clearing a round's custom geometry, or wiping all props at the start of a new phase.</big>\n\n## Snippet\n\n```\nDestroy All Objects;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: _None_"
  slug: destroy-all-objects
  tags: Destroy All Objects
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2024-03-01T08:44:58.882Z"
  updated_at: "2024-03-01T08:44:58.882Z"
-
  id: 1920976
  category_id: 0
  title: Duplicate Object
  content: "## Description\n\n<big>Creates an exact copy of a previously spawned static object, including its current position, rotation, scale, color, and collision state. The duplicate is registered as a new independent object and can be manipulated separately. Useful for stamping repeated elements, mirroring geometry, or building symmetrical map layouts efficiently.</big>\n\n## Snippet\n\n```\nDuplicate Object(Last Created Object, Vector(10, 0, 0));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Object_==, ==_Position Offset_==\n\n> ==**Object**==\n> _Type: **[Object](/wiki/articles/object)**, Default: **Last Created Object**_\n> The static object to duplicate.\n\n> ==**Position Offset**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> A positional offset applied to the duplicate relative to the original object's position. Use Vector(0, 0, 0) to place the copy at the same location."
  slug: duplicate-object
  tags: Duplicate Object
