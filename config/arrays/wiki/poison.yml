  id: 1583021
  category_id: 2
  title: Last Ability Used
  content: "## Description\n\n<big>Returns the button corresponding to the last ability activated by a player. Includes primary fire, secondary fire, ability slots, and ultimate. Returns Null if the player has not used any ability since the match began.</big>\n\n## Snippet\n\n```\nLast Ability Used(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Button</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose last used ability will be returned."
  slug: last-abilityused
  tags: Last Ability Used
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2026-04-03T18:52:41.339Z"
  updated_at: "2026-04-14T11:09:27.882Z"
