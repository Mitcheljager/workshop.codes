  id: 1274193
  category_id: 1
  title: Owner Of Deployable
  content: "## Description\n\n<big>Returns the player who placed a specified deployable. Useful for attributing deployable interactions, damage dealt by turrets, or trap activations back to the owning player for scoring and rule-triggering purposes.</big>\n\n## Snippet\n\n```\nOwner Of Deployable(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose owning player will be returned."
  slug: owner-of-deployable
  tags: Owner Of Deployable
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-05T16:49:22.339Z"
