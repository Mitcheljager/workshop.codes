  id: 1473820
  category_id: 1
  title: Players Alive On Team
  content: "## Description\n\n<big>Returns an array of all players on a specified team who are currently alive. Excludes players who are dead and awaiting respawn. A convenience value equivalent to filtering All Players by team and alive state simultaneously.</big>\n\n## Snippet\n\n```\nPlayers Alive On Team(Team(Team 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team whose living players will be returned."
  slug: players-alive-on-team
  tags: Players Alive On Team
  group_id: Ns4hFvCj7wtB20r-EKdmOu
  created_at: "2026-04-06T11:27:14.441Z"
  updated_at: "2026-04-06T11:27:14.441Z"
-
  id: 1928473
  category_id: 1
  title: Current Hero Role
  content: "## Description\n\n<big>Returns the role of the hero currently played by a specified player as a string value. Possible return values are Tank, Damage, and Support. Useful for role-based rule filtering without enumerating individual heroes.</big>\n\n## Snippet\n\n```\nCurrent Hero Role(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">String</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose hero role will be returned."
  slug: current-hero-role
  tags: Current Hero Role
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-24T15:58:03.006Z"
  updated_at: "2026-04-05T12:33:41.774Z"
-
  id: 1638291
  category_id: 1
  title: Is Button Held
  content: "## Description\n\n<big>Returns True if a player is currently holding a specified input button at the moment of evaluation. Differs from Is Button Pressed in that it reflects a sustained hold state rather than the initial press frame. Useful for charge mechanics or hold-to-activate triggers.</big>\n\n## Snippet\n\n```\nIs Button Held(Event Player, Button(Crouch));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose input state will be evaluated.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Primary Fire**_\n> The button to check for a sustained hold."
  slug: is-button-held
  tags: Is Button Held
  group_id: Af7nBqWx2ycL04m-KRjvOs
  created_at: "2026-04-17T07:09:55.339Z"
  updated_at: "2026-04-14T18:42:07.117Z"
-
  id: 1503847
  category_id: 1
  title: Spawn Time Remaining
  content: "## Description\n\n<big>Returns the number of seconds until a dead player respawns. Returns 0 if the player is alive or in a mode with instant respawning. Useful for displaying respawn countdowns, gating events on imminent respawns, or calculating team availability windows.</big>\n\n## Snippet\n\n```\nSpawn Time Remaining(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose remaining respawn time will be returned."
  slug: spawn-time-remaining
  tags: Spawn Time Remaining
  group_id: Pv7mChDk2stN48r-WBouEj
  created_at: "2026-04-19T20:41:03.882Z"
  updated_at: "2026-04-19T20:41:03.882Z"
-
  id: 1748920
  category_id: 1
  title: Players Targeting Player
  content: "## Description\n\n<big>Returns an array of all players who are currently aiming at a specified player, determined by crosshair proximity within a configurable tolerance angle. Useful for focus-fire detection, aggro tracking, or threat-assessment systems.</big>\n\n## Snippet\n\n```\nPlayers Targeting Player(Event Player, 15);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==, ==_Tolerance Angle_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player being targeted.\n\n> ==**Tolerance Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum angle in degrees between a potential targeter's aim direction and the player for the targeter to be included in the result."
  slug: players-targeting-player
  tags: Players Targeting Player
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-08T06:22:17.006Z"
  updated_at: "2026-04-30T14:11:38.441Z"
-
  id: 1293047
  category_id: 1
  title: Is Player Looking At Position
  content: "## Description\n\n<big>Returns True if a player's current aim direction falls within a specified angular tolerance of a given world position. A convenience wrapper around crosshair and direction math, useful for gaze-detection triggers and interactive world elements.</big>\n\n## Snippet\n\n```\nIs Player Looking At Position(Event Player, Vector(0, 5, 0), 10);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Position_==, ==_Tolerance Angle_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose aim direction will be evaluated.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position to check against the player's aim.\n\n> ==**Tolerance Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum angle in degrees between the player's aim and the position for the value to return True."
  slug: is-player-looking-at-position
  tags: Is Player Looking At Position
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-02T17:34:09.774Z"
  updated_at: "2026-04-21T10:58:22.003Z"
-
  id: 1839740
  category_id: 1
  title: Objective Capture Percent
  content: "## Description\n\n<big>Returns the current capture progress of the active objective as a value from 0 to 100. Works on assault, hybrid, and control map objectives. Returns 0 if no capturable objective is currently active. Useful for progress bars and threshold-based rule triggers.</big>\n\n## Snippet\n\n```\nObjective Capture Percent;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: _None_"
  slug: objective-capture-percent
  tags: Objective Capture Percent
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-27T09:03:44.117Z"
  updated_at: "2026-04-27T09:03:44.117Z"
-
  id: 1504829
  category_id: 1
  title: Knockback Received This Life
  content: "## Description\n\n<big>Returns the cumulative magnitude of all knockback impulses a player has received since their last spawn. Each knockback event contributes its velocity magnitude to the total. Resets on respawn. Useful for tracking disruption, stagger scoring, or environmental hazard interaction.</big>\n\n## Snippet\n\n```\nKnockback Received This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose accumulated knockback magnitude will be returned."
  slug: knockback-received-this-life
  tags: Knockback Received This Life
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2026-04-21T12:47:39.339Z"
  updated_at: "2026-04-29T07:16:51.882Z"
-
  id: 1738492
  category_id: 1
  title: Team Alive Count
  content: "## Description\n\n<big>Returns the number of currently living players on a specified team. A convenience value equivalent to counting the result of Players Alive On Team, provided for use in compact expressions and condition comparisons.</big>\n\n## Snippet\n\n```\nTeam Alive Count(Team(Team 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team whose living player count will be returned."
  slug: team-alive-count
  tags: Team Alive Count
  group_id: Sq6hOcIn3kdB72a-GEwvRp
  created_at: "2026-04-18T08:14:27.006Z"
  updated_at: "2026-04-18T08:14:27.006Z"
-
  id: 1920384
  category_id: 1
  title: Is Player Sprinting
  content: "## Description\n\n<big>Returns True if a player is currently moving at their maximum base movement speed with no speed-reducing effects active. Does not distinguish between heroes with passive sprint and those without. Returns False during crouching, airborne states, or ability animations that suppress movement.</big>\n\n## Snippet\n\n```\nIs Player Sprinting(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose sprint state will be evaluated."
  slug: is-player-sprinting
  tags: Is Player Sprinting
  group_id: Fw8lPqAm9vtC03b-HRjnKe
  created_at: "2026-04-03T21:57:44.774Z"
  updated_at: "2026-04-03T21:57:44.774Z"
-
  id: 1648203
  category_id: 1
  title: Time Player Has Been Dead
  content: "## Description\n\n<big>Returns the number of seconds a player has been in a dead state since their most recent elimination. Returns 0 if the player is currently alive. Useful for respawn sequencing, ghost-mode timing, or dead-player event triggers.</big>\n\n## Snippet\n\n```\nTime Player Has Been Dead(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose time spent dead will be returned."
  slug: time-player-has-been-dead
  tags: Time Player Has Been Dead
  group_id: Zt0eRwCh5bnJ19k-FUdlVo
  created_at: "2026-04-14T16:03:52.117Z"
  updated_at: "2026-04-17T11:29:38.006Z"
-
  id: 1503920
  category_id: 1
  title: Players Within Angle Of Player
  content: "## Description\n\n<big>Returns an array of players who fall within a specified angular cone in front of a reference player. Only players within the cone and optionally within a maximum range are included. Useful for frontal AOE targeting, vision-cone detection, and aimed ability previews.</big>\n\n## Snippet\n\n```\nPlayers Within Angle Of Player(Event Player, All Teams, 45, 15);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==, ==_Team_==, ==_Angle_==, ==_Max Range_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The reference player whose facing direction defines the cone.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter applied to detected players.\n\n> ==**Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **45**_\n> The half-angle of the detection cone in degrees.\n\n> ==**Max Range**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum distance in meters a player can be from the reference player to be included."
  slug: players-within-angle-of-player
  tags: Players Within Angle Of Player
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-11T04:48:29.441Z"
  updated_at: "2026-04-06T09:37:14.882Z"
-
  id: 1839582
  category_id: 1
  title: Last Player Healed By
  content: "## Description\n\n<big>Returns the player who most recently applied healing to a specified player. Returns Null if the player has not received healing since the match began. Useful for tracking heal sources, attribution chains, or assist-style scoring systems.</big>\n\n## Snippet\n\n```\nLast Player Healed By(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose most recent healer will be returned."
  slug: last-player-healed-by
  tags: Last Player Healed By
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-05T13:22:41.006Z"
  updated_at: "2026-04-05T13:22:41.006Z"
-
  id: 1274038
  category_id: 1
  title: Ground Position Of Player
  content: "## Description\n\n<big>Returns the world position directly below a player on the nearest ground surface, calculated by a downward raycast from the player's feet. Useful for spawning ground-level effects, snapping decals to terrain, or evaluating floor height beneath an airborne player.</big>\n\n## Snippet\n\n```\nGround Position Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player beneath whom the ground position will be calculated."
  slug: ground-position-of-player
  tags: Ground Position Of Player
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-28T10:11:55.774Z"
  updated_at: "2026-04-02T17:44:08.003Z"
-
  id: 1920473
  category_id: 1
  title: Is Payload Moving
  content: "## Description\n\n<big>Returns True if the payload is currently advancing, including during contested movement. Returns False if the payload is stopped, blocking, or rolling back. Only meaningful on payload and hybrid maps; returns False on all other map types.</big>\n\n## Snippet\n\n```\nIs Payload Moving;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: _None_"
  slug: is-payload-moving
  tags: Is Payload Moving
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-01T19:37:22.882Z"
  updated_at: "2026-04-18T08:03:49.117Z"
-
  id: 1583291
  category_id: 1
  title: Closest Enemy To Player
  content: "## Description\n\n<big>Returns the living enemy player nearest to a specified player at the time of evaluation. Equivalent to Closest Player To with an opposing team filter, provided as a convenience value for common targeting expressions.</big>\n\n## Snippet\n\n```\nClosest Enemy To Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The reference player from whose position the nearest enemy is calculated."
  slug: closest-enemy-to-player
  tags: Closest Enemy To Player
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-10T07:58:33.441Z"
  updated_at: "2026-04-10T07:58:33.441Z"
-
  id: 1748193
  category_id: 1
  title: Shield Health Of Player
  content: "## Description\n\n<big>Returns the current shield health of a player as a flat value. Shield health is the regenerating blue portion of the health bar present on certain heroes. Returns 0 for heroes with no shield health component.</big>\n\n## Snippet\n\n```\nShield Health Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose current shield health will be returned."
  slug: shield-health-of-player
  tags: Shield Health Of Player
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-12T15:14:07.006Z"
  updated_at: "2026-04-22T10:07:33.774Z"
-
  id: 1374820
  category_id: 1
  title: Eliminations This Life
  content: "## Description\n\n<big>Returns the number of eliminations a player has secured since their last spawn. Resets to 0 on each respawn. Useful for per-life killstreak tracking, bonus triggers, or life-based scoring multipliers.</big>\n\n## Snippet\n\n```\nEliminations This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose elimination count for the current life will be returned."
  slug: eliminations-this-life
  tags: Eliminations This Life
  group_id: Lw0sFnVt6uxB13p-HYdkRq
  created_at: "2026-04-19T11:32:44.117Z"
  updated_at: "2026-04-19T11:32:44.117Z"
