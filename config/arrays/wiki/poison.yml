  id: 1839203
  category_id: 1
  title: Deployable Health Percent
  content: "## Description\n\n<big>Returns the current health of a deployable as a percentage of its maximum health, from 0 to 100. Useful for triggering repair events, displaying deployable condition on a HUD, or evaluating when a deployable is near destruction.</big>\n\n## Snippet\n\n```\nDeployable Health Percent(First Of(Deployables Owned By Player(Event Player)));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose health percentage will be returned."
  slug: deployable-health-percent
  tags: Deployable Health Percent
