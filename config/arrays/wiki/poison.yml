  id: 1938472
  category_id: 1
  title: Deployables Owned By Player
  content: "## Description\n\n<big>Returns an array of all active deployables currently belonging to a specified player, including turrets, traps, barriers, and any other persistent hero-placed objects. The array is empty if the player has no active deployables. Useful for iterating over a player's placed objects or evaluating deployable counts.</big>\n\n## Snippet\n\n```\nDeployables Owned By Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose active deployables will be returned."
  slug: deployables-owned-by-player
  tags: Deployables Owned By Player
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2026-04-11T09:14:27.441Z"
  updated_at: "2026-04-11T09:14:27.441Z"
-
  id: 1748291
  category_id: 1
  title: Deployable Count Of Player
  content: "## Description\n\n<big>Returns the number of deployables a specified player currently has active in the world. A convenience value equivalent to counting the result of Deployables Owned By Player, provided for compact condition expressions and HUD displays.</big>\n\n## Snippet\n\n```\nDeployable Count Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose deployable count will be returned."
  slug: deployable-count-of-player
  tags: Deployable Count Of Player
  group_id: Rn5wXvBp3ycM88k-QZolUj
