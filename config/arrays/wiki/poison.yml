  id: 1482937
  category_id: 0
  title: Apply Gravity Field To Players
  content: "## Description\n\n<big>Creates a sustained gravitational singularity at a world position that continuously pulls or repels players toward or away from its center over a set duration. Unlike instant impulse actions, this field persists and supports reevaluation, allowing it to track a moving position in real time. Optionally affects projectiles in flight. Only players matching the specified team filter are affected.</big>\n\n## Snippet\n\n```\nApply Gravity Field To Players(All Teams, Position Of(Event Player), 8, 40, 3, True, Destination and Radius);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Team_==, ==_Center_==, ==_Radius_==, ==_Pull Strength_==, ==_Duration_==, ==_Affect Projectiles_==, ==_Reevaluation_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team or teams whose players will be affected by the gravity field.\n\n> ==**Center**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position at which the gravitational singularity is created. Supports reevaluation.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **8**_\n> The radius in meters within which players are affected.\n\n> ==**Pull Strength**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **40**_\n> The force applied toward the center per second, in physics units. Negative values repel players away from the center instead.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **3**_\n> How long the gravity field persists, in seconds. Use 0 for an indefinite field that must be stopped manually.\n\n> ==**Affect Projectiles**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, projectiles passing through the field radius are also deflected toward the center.\n\n> ==**Reevaluation**==\n> _Type: **[Gravity Field Reevaluation](/wiki/articles/gravity-field-reevaluation)**, Default: **None**_\n> Specifies which parameters are continuously reevaluated. Options are None, Destination and Radius, or Destination, Radius, and Pull Strength."
  slug: apply-gravity-field-to-players
  tags: Apply Gravity Field To Players
  group_id: Xq7mKsLp3wnA08c-FGvtYe
  created_at: "2026-04-14T09:22:47.511Z"
  updated_at: "2026-04-02T16:05:33.874Z"
-
  id: 1847291
  category_id: 0
  title: Freeze Player In Place
  content: "## Description\n\n<big>Completely halts a player's position in world space for a set duration, preventing all movement including knockback, gravity, and self-initiated motion. The player retains full ability to aim and use abilities unless separately restricted. Differs from Root in that it also negates external forces.</big>\n\n## Snippet\n\n```\nFreeze Player In Place(Event Player, 2, True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Duration_==, ==_Ignore External Forces_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to freeze in place.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> How long the freeze lasts, in seconds. Use 0 for an indefinite freeze.\n\n> ==**Ignore External Forces**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If True, knockback and gravity are suppressed during the freeze. If False, forces accumulate and are applied when the freeze ends."
  slug: freeze-player-in-place
  tags: Freeze Player In Place
  group_id: Ks9pLmWq1bnC34r-HTdxNa
  created_at: "2026-04-03T11:14:52.001Z"
  updated_at: "2026-04-03T11:14:52.001Z"
-
  id: 1563047
  category_id: 0
  title: Redirect Projectile
  content: "## Description\n\n<big>Instantly changes the direction of a projectile in flight, reassigning its velocity vector to a new facing direction while preserving its speed. Can optionally reassign the projectile's owner, causing it to deal damage on behalf of a different player.</big>\n\n## Snippet\n\n```\nRedirect Projectile(Last Created Projectile, Direction Towards(Position Of(Event Player), Position Of(Closest Player To(Position Of(Event Player), Opposing Team(Team Of(Event Player))))), Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Projectile_==, ==_Direction_==, ==_New Owner_==\n\n> ==**Projectile**==\n> _Type: **[Projectile](/wiki/articles/projectile)**, Default: **Last Created Projectile**_\n> The projectile to redirect.\n\n> ==**Direction**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 1)**_\n> The new normalized direction vector for the projectile.\n\n> ==**New Owner**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Null**_\n> If specified, damage dealt by the projectile will be attributed to this player. Leave as Null to keep the original owner."
  slug: redirect-projectile
  tags: Redirect Projectile
  group_id: Wd4tNkRz6uvP02s-CLamFh
  created_at: "2026-04-11T17:45:09.332Z"
  updated_at: "2026-04-28T10:03:55.618Z"
-
  id: 1729384
  category_id: 0
  title: Set Ability Charge Count
  content: "## Description\n\n<big>Directly sets the current number of charges available for a specified ability on a player. This action works with any ability that uses a charge system and supports reevaluation. Charges are clamped to the ability's defined minimum and maximum.</big>\n\n## Snippet\n\n```\nSet Ability Charge Count(Event Player, Button(Ability 1), 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_Charges_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability charge count will be set.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability button whose charge count will be modified.\n\n> ==**Charges**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The number of charges to assign. Values are clamped to the valid range for the ability."
  slug: set-ability-charge-count
  tags: Set Ability Charge Count
  group_id: Yz8hJmSe5fwQ37n-BKprVc
  created_at: "2026-04-14T06:58:23.115Z"
  updated_at: "2026-04-14T06:58:23.115Z"
-
  id: 1904712
  category_id: 0
  title: Attach Player To Player
  content: "## Description\n\n<big>Locks a player's position and rotation relative to another player, causing them to move as a single unit. The attached player cannot move independently while the attachment is active. Useful for creating carry mechanics, mounts, or tethered movement modes.</big>\n\n## Snippet\n\n```\nAttach Player To Player(Event Player, Attacker, Vector(0, 1, 0), True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Anchor_==, ==_Offset_==, ==_Inherit Rotation_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to attach.\n\n> ==**Anchor**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to attach to. The attached player will move with this player.\n\n> ==**Offset**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> A positional offset relative to the anchor player's local space.\n\n> ==**Inherit Rotation**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If True, the attached player's facing direction also follows the anchor's rotation."
  slug: attach-player-to-player
  tags: Attach Player To Player
  group_id: Gh6uPqAt9xdL15m-WNesKo
  created_at: "2026-04-30T20:11:44.887Z"
  updated_at: "2026-04-17T09:44:21.553Z"
-
  id: 1388265
  category_id: 0
  title: Override Respawn Location
  content: "## Description\n\n<big>Sets a custom world position at which a player will respawn on their next death, bypassing the map's default spawn room logic entirely. The override applies once and clears after use unless set to persist. Cannot be used to respawn players inside geometry.</big>\n\n## Snippet\n\n```\nOverride Respawn Location(Event Player, Vector(0, 5, 0), False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Position_==, ==_Persist_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose respawn location will be overridden.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position at which the player will respawn.\n\n> ==**Persist**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, the override applies to every subsequent respawn until cleared. If False, it applies only to the next respawn."
  slug: override-respawn-location
  tags: Override Respawn Location
  group_id: Lf3cOhDw8stB46p-MXrkIq
  created_at: "2026-04-22T13:07:30.229Z"
  updated_at: "2026-04-04T18:55:02.774Z"
