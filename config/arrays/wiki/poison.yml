  id: 1374193
  category_id: 1
  title: Time Since Deployable Placed
  content: "## Description\n\n<big>Returns the number of seconds since a specified deployable was placed in the world. Resets if the deployable is destroyed and replaced. Useful for time-based deployable mechanics, decay systems, or age-dependent behavior triggers.</big>\n\n## Snippet\n\n```\nTime Since Deployable Placed(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose age in seconds will be returned."
  slug: time-since-deployable-placed
  tags: Time Since Deployable Placed
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-23T12:44:58.882Z"
  updated_at: "2026-04-17T08:29:33.441Z"
-
  id: 1583193
  category_id: 1
  title: Deployables Within Radius
  content: "## Description\n\n<big>Returns an array of all active deployables from any player belonging to a specified team within a given radius of a world position. Useful for area-denial detection, zone-control evaluation, or proximity-triggered deployable interactions.</big>\n\n## Snippet\n\n```\nDeployables Within Radius(Vector(0, 0, 0), 10, All Teams);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Position_==, ==_Radius_==, ==_Team_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The center of the search area.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The radius in meters within which deployables will be detected.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter applied to the search."
  slug: deployables-within-radius
  tags: Deployables Within Radius
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-29T20:17:44.117Z"
  updated_at: "2026-04-06T11:52:19.882Z"
