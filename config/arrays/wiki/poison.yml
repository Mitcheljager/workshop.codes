  id: 1920674
  category_id: 2
  category_id: 2
  title: Array Reversed
  content: "## Description\n\n<big>Returns a copy of a specified array with its elements in reverse order. The original array is not modified. Useful for reversing sorted leaderboards, processing queue structures as stacks, or iterating over a sequence in the opposite direction.</big>\n\n## Snippet\n\n```\nArray Reversed(Global.LeaderboardArray);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Array_==\n\n> ==**Array**==\n> _Type: **[Array](/wiki/articles/array)**, Default: **Empty Array**_\n> The array to reverse."
  slug: array-reversed
  tags: Array Reversed
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2024-11-27T13:21:33.117Z"
