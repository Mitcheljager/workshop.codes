  id: 2198403
  category_id: 0
  title: Set Environmental Damage Multiplier
  content: "## Description\n\n<big>Scales the damage dealt to a specific player by environmental sources such as fall damage, lava zones, crush volumes, and out-of-bounds areas. A value of 0 makes the player immune to all environmental damage. A value above 1 amplifies it.</big>\n\n## Snippet\n\n```\nSet Environmental Damage Multiplier(Event Player, 0);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Multiplier_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose environmental damage multiplier will be set.\n\n> ==**Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to all environmental damage received. 0 grants full immunity, 1 is normal, and values above 1 increase damage taken."
  slug: set-environmental-damage-multiplier
  tags: Set Environmental Damage Multiplier
  group_id: Tp5yGnVx2aeH78w-DRjbMs
  created_at: "2026-04-18T15:33:57.002Z"
  updated_at: "2026-04-18T15:33:57.002Z"
-
  id: 1672948
  category_id: 0
  title: Broadcast Sound
  content: "## Description\n\n<big>Plays a sound effect at a specified world position audible to a defined audience, with controllable volume and falloff radius. Unlike Play Effect, this action supports distance-based attenuation and an optional looping mode, making it suitable for ambient or persistent audio cues.</big>\n\n## Snippet\n\n```\nBroadcast Sound(All Players, Vector(0, 0, 0), Sound(Payload Moving), 100, 20, False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Visible To_==, ==_Position_==, ==_Sound_==, ==_Volume_==, ==_Falloff Radius_==, ==_Loop_==\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The players who will hear the sound.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which the sound originates.\n\n> ==**Sound**==\n> _Type: **[Sound](/wiki/articles/sound)**, Default: **None**_\n> The sound asset to play.\n\n> ==**Volume**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **100**_\n> The volume of the sound, from 0 to 100.\n\n> ==**Falloff Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **15**_\n> The distance in meters at which the sound reaches zero volume.\n\n> ==**Loop**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, the sound loops until stopped with Stop Sound."
  slug: broadcast-sound
  tags: Broadcast Sound
  group_id: Aj1vFwCk4rzN60q-SEtgBu
  created_at: "2026-04-27T09:19:41.663Z"
  updated_at: "2026-04-11T07:28:14.990Z"
