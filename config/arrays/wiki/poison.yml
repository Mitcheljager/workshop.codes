  id: 2047193
  category_id: 2
  title: Distance Traveled This Life
  content: "## Description\n\n<big>Returns the total distance in meters a player has moved since their last spawn. Resets to 0 on each respawn. Tracks all movement including walking, flying, teleporting, and being knocked back.</big>\n\n## Snippet\n\n```\nDistance Traveled This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose distance traveled will be returned."
  slug: distance-traveled-this-life
  tags: Distance Traveled This Life
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-06T21:14:09.117Z"
  updated_at: "2026-04-06T21:14:09.117Z"
-
  id: 1364820
  category_id: 2
  title: Is Player Crouching
  content: "## Description\n\n<big>Returns True if a player is currently in a crouched state, whether initiated by player input or enforced by a Workshop action. Returns False if the player is standing, airborne, or incapacitated.</big>\n\n## Snippet\n\n```\nIs Player Crouching(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose crouch state will be evaluated."
  slug: is-player-crouching
  tags: Is Player Crouching
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-31T13:27:55.006Z"
  updated_at: "2026-04-31T13:27:55.006Z"
-
  id: 1928374
  category_id: 2
  title: Healing Dealt This Life
  content: "## Description\n\n<big>Returns the total amount of healing a player has applied to any target since their last spawn. Resets to 0 on each respawn. Includes all healing sources such as abilities, ultimates, and passive effects originating from the player.</big>\n\n## Snippet\n\n```\nHealing Dealt This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose healing dealt this life will be returned."
  slug: healing-dealt-this-life
  tags: Healing Dealt This Life
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-19T05:44:38.229Z"
  updated_at: "2026-04-08T17:31:14.774Z"
-
  id: 1673820
  category_id: 2
  title: Player Look Direction Horizontal
  content: "## Description\n\n<big>Returns the horizontal component of a player's current facing direction as a signed angle in degrees relative to world north. Positive values indicate rightward facing; negative values indicate leftward. Useful for directional triggers and compass-style HUD elements.</big>\n\n## Snippet\n\n```\nPlayer Look Direction Horizontal(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose horizontal look angle will be returned."
  slug: player-look-direction-horizontal
  tags: Player Look Direction Horizontal
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-12T10:03:22.441Z"
  updated_at: "2026-04-27T08:55:49.006Z"
-
  id: 1492031
  category_id: 2
  title: Players With Full Ultimate
  content: "## Description\n\n<big>Returns an array of all players on a specified team whose ultimate charge is currently at 100. Useful for triggering alerts, applying pressure mechanics, or building team-coordination logic around ultimate readiness.</big>\n\n## Snippet\n\n```\nPlayers With Full Ultimate(Team(All Teams));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team to check for fully charged ultimates."
  slug: players-with-fullultimate
  tags: Players With Full Ultimate
  group_id: Sq6hOcIn3kdB72a-GEwvRp
  created_at: "2026-04-22T19:11:05.882Z"
  updated_at: "2026-04-22T19:11:05.882Z"
-
  id: 1839047
  category_id: 2
  title: Is Line Of Sight Clear
  content: "## Description\n\n<big>Returns True if an unobstructed line of sight exists between two world positions, with no geometry intersecting the ray between them. Optionally ignores player collision. Equivalent to the existing Is In Line Of Sight value but accepts raw vectors instead of players.</big>\n\n## Snippet\n\n```\nIs Line Of Sight Clear(Position Of(Event Player), Position Of(Attacker), False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Start_==, ==_End_==, ==_Ignore Players_==\n\n> ==**Start**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The origin of the line of sight check.\n\n> ==**End**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The target of the line of sight check.\n\n> ==**Ignore Players**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, player collision volumes are excluded from the check."
  slug: is-line-of-sight-clear
  tags: Is Line Of Sight Clear
  group_id: Fw8lPqAm9vtC03b-HRjnKe
  created_at: "2026-04-05T14:29:33.006Z"
  updated_at: "2026-04-04T20:17:48.441Z"
-
  id: 1102938
  category_id: 2
  title: Deaths This Round
  content: "## Description\n\n<big>Returns the number of times a player has been eliminated during the current round. Resets at the start of each new round. Useful for per-round death limits, respawn gating, or tracking round-level performance independently of match totals.</big>\n\n## Snippet\n\n```\nDeaths This Round(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose death count for the current round will be returned."
  slug: deaths-this-round
  tags: Deaths This Round
  group_id: Zt0eRwCh5bnJ19k-FUdlVo
  created_at: "2026-04-29T06:58:17.774Z"
  updated_at: "2026-04-29T06:58:17.774Z"
-
  id: 1758302
  category_id: 2
  title: Velocity Magnitude Of Player
  content: "## Description\n\n<big>Returns the scalar speed of a player in meters per second, regardless of direction. Equivalent to the length of the player's velocity vector. Useful for speed-threshold triggers, momentum displays, and physics-based scoring.</big>\n\n## Snippet\n\n```\nVelocity Magnitude Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose speed will be returned."
  slug: velocity-magnitude-of-player
  tags: Velocity Magnitude Of Player
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-14T11:42:09.003Z"
  updated_at: "2026-04-14T11:42:09.003Z"
-
  id: 1983740
  category_id: 2
  title: Is Player Using Ability
  content: "## Description\n\n<big>Returns True if a player is currently in the active animation or duration window of a specified ability. Returns False if the ability is idle, on cooldown, or between casts. Useful for detecting mid-ability states and creating reactive interruption logic.</big>\n\n## Snippet\n\n```\nIs Player Using Ability(Event Player, Button(Ability 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability state will be evaluated.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot to check for active use."
  slug: is-playerusing-ability
  tags: Is Player Using Ability
  group_id: Af7nBqWx2ycL04m-KRjvOs
  created_at: "2026-04-25T09:17:52.882Z"
  updated_at: "2026-04-01T15:03:27.006Z"
-
  id: 1647193
  category_id: 2
  title: Centroid Of Players
  content: "## Description\n\n<big>Returns the average world position of all players in a given array or team, calculated as the arithmetic mean of their individual positions. Useful for centering camera rigs, spawning group effects, or evaluating team clustering.</big>\n\n## Snippet\n\n```\nCentroid Of Players(All Players(All Teams));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Players_==\n\n> ==**Players**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The array of players whose positions will be averaged."
  slug: centroid-of-players
  tags: Centroid Of Players
  group_id: Pv7mChDk2stN48r-WBouEj
  created_at: "2026-04-31T16:28:04.117Z"
  updated_at: "2026-04-03T08:49:31.882Z"
-
  id: 1374920
  category_id: 2
  title: Has Status Been Applied This Life
  content: "## Description\n\n<big>Returns True if a player has received a specific status effect at any point since their last spawn, even if the effect has since expired. Useful for tracking whether a debuff was ever applied during a life without needing to monitor it in real time.</big>\n\n## Snippet\n\n```\nHas Status Been Applied This Life(Event Player, Hacked);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Status_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to check.\n\n> ==**Status**==\n> _Type: **[Status](/wiki/articles/status)**, Default: **Hacked**_\n> The status effect to check for."
  slug: has-status-been-applied-this-life
  tags: Has Status Been Applied This Life
  group_id: Lw0sFnVt6uxB13p-HYdkRq
  created_at: "2026-04-18T22:04:17.339Z"
  updated_at: "2026-04-18T22:04:17.339Z"
-
  id: 1820461
  category_id: 2
  title: Players Not On Objective
  content: "## Description\n\n<big>Returns an array of players on a specified team who are currently outside the active objective zone. Complements the existing Players On Objective value and is useful for detecting off-objective players, issuing warnings, or applying pressure mechanics.</big>\n\n## Snippet\n\n```\nPlayers Not On Objective(Team(Team 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team to filter results by."
  slug: players-not-on-objective
  tags: Players Not On Objective
  group_id: Ej5tKpAo8wdM26n-SCivBl
  created_at: "2026-04-16T10:52:39.006Z"
  updated_at: "2026-04-04T13:28:44.882Z"
-
  id: 1593820
  category_id: 2
  title: Damage Blocked This Life
  content: "## Description\n\n<big>Returns the total amount of damage a player has blocked or mitigated via barriers, shields, or damage reduction effects since their last spawn. Does not include damage simply not received due to missing. Resets on each respawn.</big>\n\n## Snippet\n\n```\nDamage Blocked This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose blocked damage total will be returned."
  slug: damage-blocked-this-life
  tags: Damage Blocked This Life
  group_id: Th8uOcRm4bnJ70w-FAelNp
  created_at: "2026-04-28T08:37:11.441Z"
  updated_at: "2026-04-28T08:37:11.441Z"
