  id: 1374820
  category_id: 2
  title: Eliminations This Life
  content: "## Description\n\n<big>Returns the number of eliminations a player has secured since their last spawn. Resets to 0 on each respawn. Useful for per-life killstreak tracking, bonus triggers, or life-based scoring multipliers.</big>\n\n## Snippet\n\n```\nEliminations This Life(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose elimination count for the current life will be returned."
  slug: eliminations-this-life
  tags: Eliminations This Life
  group_id: Lw0sFnVt6uxB13p-HYdkRq
  created_at: "2026-04-19T11:32:44.117Z"
  updated_at: "2026-04-19T11:32:44.117Z"
-
  id: 1920582
  category_id: 2
  title: Player Armor Health
  content: "## Description\n\n<big>Returns the current armor health of a player as a flat value. Armor health is the yellow portion of the health bar that reduces incoming damage per hit. Returns 0 for heroes with no armor health component.</big>\n\n## Snippet\n\n```\nPlayer Armor Health(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose current armor health will be returned."
  slug: player-armor-health
  tags: Player Armor Health
  group_id: Sq6hOcIn3kdB72a-GEwvRp
  created_at: "2026-04-04T18:27:51.882Z"
  updated_at: "2026-04-04T18:27:51.882Z"
-
  id: 1293582
  category_id: 2
  title: Hero Pick Rate
  content: "## Description\n\n<big>Returns the percentage of players currently playing a specified hero across all or a specified team, as a value from 0 to 100. Useful for dynamic game mode balancing, hero-diversity bonuses, or live pick tracking displays.</big>\n\n## Snippet\n\n```\nHero Pick Rate(Hero(Tracer), All Teams);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Hero_==, ==_Team_==\n\n> ==**Hero**==\n> _Type: **[Hero](/wiki/articles/hero)**, Default: **Hero(Reaper)**_\n> The hero whose pick rate will be evaluated.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team scope within which the pick rate is calculated."
  slug: hero-pick-rate
  tags: Hero Pick Rate
  group_id: Fw8lPqAm9vtC03b-HRjnKe
  created_at: "2026-04-15T06:03:17.339Z"
  updated_at: "2026-04-04T14:52:29.006Z"
-
  id: 1839193
  category_id: 2
  title: Is Player Behind Player
  content: "## Description\n\n<big>Returns True if a second player is currently located within the rear hemisphere of a reference player's facing direction. Equivalent to checking if the angle between the reference player's forward vector and the direction to the second player exceeds 90 degrees.</big>\n\n## Snippet\n\n```\nIs Player Behind Player(Event Player, Attacker);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Other Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The reference player whose facing direction is used.\n\n> ==**Other Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose position is evaluated relative to the reference."
  slug: is-player-behind-player
  tags: Is Player Behind Player
  group_id: Zt0eRwCh5bnJ19k-FUdlVo
  created_at: "2026-04-23T13:41:07.117Z"
  updated_at: "2026-04-23T13:41:07.117Z"
-
  id: 1638920
  category_id: 2
  title: Payload Progress Percent
  content: "## Description\n\n<big>Returns the overall progress of the payload along its track as a value from 0 to 100. Accounts for checkpoints and multi-phase routes by returning progress within the current segment. Returns 0 on non-payload maps.</big>\n\n## Snippet\n\n```\nPayload Progress Percent;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: _None_"
  slug: payload-progress-percent
  tags: Payload Progress Percent
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-30T10:22:19.882Z"
  updated_at: "2026-04-11T07:38:44.441Z"
-
  id: 1748582
  category_id: 2
  title: Random Living Player
  content: "## Description\n\n<big>Returns a single randomly selected living player from the specified team at the moment of evaluation. Re-evaluates to a new random player each time the value is computed unless stored in a variable. Returns Null if no living players exist on the team.</big>\n\n## Snippet\n\n```\nRandom Living Player(All Teams);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Team_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team from which a random living player will be selected."
  slug: random-living-player
  tags: Random Living Player
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-24T09:17:33.006Z"
  updated_at: "2026-04-18T15:03:57.774Z"
-
  id: 1503291
  category_id: 2
  title: Time Since Last Death
  content: "## Description\n\n<big>Returns the number of seconds since a player was last eliminated. If the player has not died since the match began, returns a large value. Resets when the player is next eliminated. Useful for time-alive bonuses, comeback mechanics, and streak tracking.</big>\n\n## Snippet\n\n```\nTime Since Last Death(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose time since last death will be returned."
  slug: time-since-last-death
  tags: Time Since Last Death
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-08T14:52:07.003Z"
  updated_at: "2026-04-08T14:52:07.003Z"
-
  id: 1839471
  category_id: 2
  title: Active Status Effects Of Player
  content: "## Description\n\n<big>Returns an array of all status effects currently applied to a player, such as Hacked, Frozen, Asleep, or Stunned. The array is empty if no status effects are active. Useful for status-display HUDs, stacking-debuff logic, or cleanse mechanics.</big>\n\n## Snippet\n\n```\nActive Status Effects Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose active status effects will be returned."
  slug: active-status-effects-of-player
  tags: Active Status Effects Of Player
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-05T08:29:41.117Z"
  updated_at: "2026-04-16T12:14:22.882Z"
-
  id: 1274920
  category_id: 2
  title: Projectile Travel Time
  content: "## Description\n\n<big>Returns the estimated time in seconds for a projectile fired by a player to travel to a specified world position, based on the hero's current projectile speed. Useful for predictive aim assistance tools, lead-calculation displays, or delay-triggered effects.</big>\n\n## Snippet\n\n```\nProjectile Travel Time(Event Player, Position Of(Attacker));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==, ==_Target Position_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose projectile speed is used for the calculation.\n\n> ==**Target Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position to calculate travel time toward."
  slug: projectile-travel-time
  tags: Projectile Travel Time
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-22T17:03:55.006Z"
  updated_at: "2026-04-22T17:03:55.006Z"
-
  id: 1938472
  category_id: 2
  title: Deployables Owned By Player
  content: "## Description\n\n<big>Returns an array of all active deployables currently belonging to a specified player, including turrets, traps, barriers, and any other persistent hero-placed objects. The array is empty if the player has no active deployables. Useful for iterating over a player's placed objects or evaluating deployable counts.</big>\n\n## Snippet\n\n```\nDeployables Owned By Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose active deployables will be returned."
  slug: deployables-owned-by-player
  tags: Deployables Owned By Player
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2026-04-11T09:14:27.441Z"
  updated_at: "2026-04-11T09:14:27.441Z"
-
  id: 1748291
  category_id: 2
  title: Deployable Count Of Player
  content: "## Description\n\n<big>Returns the number of deployables a specified player currently has active in the world. A convenience value equivalent to counting the result of Deployables Owned By Player, provided for compact condition expressions and HUD displays.</big>\n\n## Snippet\n\n```\nDeployable Count Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose deployable count will be returned."
  slug: deployable-count-of-player
  tags: Deployable Count Of Player
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-04T14:38:52.006Z"
  updated_at: "2026-04-19T10:22:37.441Z"
-
  id: 1503849
  category_id: 2
  title: Position Of Deployable
  content: "## Description\n\n<big>Returns the current world position of a specified deployable object. Supports reevaluation for deployables that can move or be repositioned during their lifetime. Returns Null if the deployable no longer exists.</big>\n\n## Snippet\n\n```\nPosition Of Deployable(First Of(Deployables Owned By Player(Event Player)));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose world position will be returned."
  slug: position-of-deployable
  tags: Position Of Deployable
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-28T07:52:14.882Z"
  updated_at: "2026-04-13T16:04:39.117Z"
-
  id: 1839203
  category_id: 2
  title: Deployable Health Percent
  content: "## Description\n\n<big>Returns the current health of a deployable as a percentage of its maximum health, from 0 to 100. Useful for triggering repair events, displaying deployable condition on a HUD, or evaluating when a deployable is near destruction.</big>\n\n## Snippet\n\n```\nDeployable Health Percent(First Of(Deployables Owned By Player(Event Player)));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose health percentage will be returned."
  slug: deployable-health-percent
  tags: Deployable Health Percent
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2026-04-14T11:33:07.006Z"
  updated_at: "2026-04-14T11:33:07.006Z"
-
  id: 1274193
  category_id: 2
  title: Owner Of Deployable
  content: "## Description\n\n<big>Returns the player who placed a specified deployable. Useful for attributing deployable interactions, damage dealt by turrets, or trap activations back to the owning player for scoring and rule-triggering purposes.</big>\n\n## Snippet\n\n```\nOwner Of Deployable(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose owning player will be returned."
  slug: owner-of-deployable
  tags: Owner Of Deployable
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-05T16:49:22.339Z"
  updated_at: "2026-04-25T09:38:14.882Z"
-
  id: 1920193
  category_id: 2
  title: Is Deployable Active
  content: "## Description\n\n<big>Returns True if a specified deployable currently exists in the world and has not been destroyed or expired. Returns False if the deployable has been eliminated, timed out, or was never placed. Useful for guarding subsequent deployable value calls against Null references.</big>\n\n## Snippet\n\n```\nIs Deployable Active(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose active state will be evaluated."
  slug: is-deployable-active
  tags: Is Deployable Active
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2026-04-19T08:21:33.117Z"
  updated_at: "2026-04-01T14:57:48.006Z"
-
  id: 1638193
  category_id: 2
  title: Closest Deployable To Position
  content: "## Description\n\n<big>Returns the deployable from a specified player's active deployables that is nearest to a given world position. Returns Null if the player has no active deployables. Useful for proximity-based deployable interaction, targeting, or effect anchoring.</big>\n\n## Snippet\n\n```\nClosest Deployable To Position(Event Player, Position Of(Event Player));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Deployable</span>_\n**Parameters**: ==_Player_==, ==_Position_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose deployables will be searched.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which proximity is measured."
  slug: closest-deployable-to-position
  tags: Closest Deployable To Position
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-05T17:03:11.774Z"
  updated_at: "2026-04-05T17:03:11.774Z"
-
  id: 1374193
  category_id: 2
  title: Time Since Deployable Placed
  content: "## Description\n\n<big>Returns the number of seconds since a specified deployable was placed in the world. Resets if the deployable is destroyed and replaced. Useful for time-based deployable mechanics, decay systems, or age-dependent behavior triggers.</big>\n\n## Snippet\n\n```\nTime Since Deployable Placed(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose age in seconds will be returned."
  slug: time-since-deployable-placed
  tags: Time Since Deployable Placed
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-23T12:44:58.882Z"
  updated_at: "2026-04-17T08:29:33.441Z"
-
  id: 1583193
  category_id: 2
  title: Deployables Within Radius
  content: "## Description\n\n<big>Returns an array of all active deployables from any player belonging to a specified team within a given radius of a world position. Useful for area-denial detection, zone-control evaluation, or proximity-triggered deployable interactions.</big>\n\n## Snippet\n\n```\nDeployables Within Radius(Vector(0, 0, 0), 10, All Teams);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Position_==, ==_Radius_==, ==_Team_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The center of the search area.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The radius in meters within which deployables will be detected.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter applied to the search."
  slug: deployables-within-radius
  tags: Deployables Within Radius
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2026-04-29T20:17:44.117Z"
  updated_at: "2026-04-06T11:52:19.882Z"
-
  id: 1748193
  category_id: 2
  title: Last Destroyed Deployable Owner
  content: "## Description\n\n<big>Returns the player who owned the most recently destroyed deployable in the match. Updates each time any deployable is eliminated. Useful for triggering events on deployable destruction, attributing destruction credit, or building deployable-loss reaction rules.</big>\n\n## Snippet\n\n```\nLast Destroyed Deployable Owner;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: _None_"
  slug: last-destroyed-deployable-owner
  tags: Last Destroyed Deployable Owner
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-14T06:38:29.003Z"
  updated_at: "2026-04-14T06:38:29.003Z"
-
  id: 1938573
  category_id: 2
  category_id: 0
  title: Grant Hero Ability
  content: "## Description\n\n<big>Assigns a specified hero's ability to a player's chosen ability slot, regardless of the player's current hero. The granted ability behaves as it would on its native hero, using that hero's default values unless overridden by other Workshop actions. Reverts when cleared with Remove Hero Ability.</big>\n\n## Snippet\n\n```\nGrant Hero Ability(Event Player, Hero(Tracer), Button(Ability 1), Button(Ability 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Hero_==, ==_Source Button_==, ==_Target Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will receive the granted ability.\n\n> ==**Hero**==\n> _Type: **[Hero](/wiki/articles/hero)**, Default: **Hero(Reaper)**_\n> The hero from whose kit the ability will be taken.\n\n> ==**Source Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot on the source hero to copy from.\n\n> ==**Target Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot on the player that will be replaced with the granted ability."
  slug: grant-hero-ability
  tags: Grant Hero Ability
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2024-05-07T09:14:27.441Z"
  updated_at: "2025-03-11T11:22:14.882Z"
-
  id: 1748573
  category_id: 2
  category_id: 0
  title: Remove Hero Ability
  content: "## Description\n\n<big>Removes a previously granted ability from a player's ability slot, restoring the slot to the player's native hero ability. Has no effect if the slot has not been overridden by Grant Hero Ability. The player's hero and all other slots are unaffected.</big>\n\n## Snippet\n\n```\nRemove Hero Ability(Event Player, Button(Ability 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose granted ability will be removed.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot from which the granted ability will be cleared."
  slug: remove-hero-ability
  tags: Remove Hero Ability
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2024-05-07T09:15:44.006Z"
  updated_at: "2024-05-07T09:15:44.006Z"
-
  id: 1503573
  category_id: 2
  category_id: 0
  title: Swap Ability Slots
  content: "## Description\n\n<big>Exchanges the abilities assigned to two specified button slots on a player, swapping their functions, cooldowns, and charge counts simultaneously. Both slots must belong to the same player. Useful for randomization mechanics, ability shuffle modes, or mirror-control effects.</big>\n\n## Snippet\n\n```\nSwap Ability Slots(Event Player, Button(Ability 1), Button(Ability 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button A_==, ==_Button B_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability slots will be swapped.\n\n> ==**Button A**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The first ability slot to swap.\n\n> ==**Button B**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 2**_\n> The second ability slot to swap."
  slug: swap-ability-slots
  tags: Swap Ability Slots
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2024-08-19T14:52:14.882Z"
  updated_at: "2025-04-03T10:27:39.117Z"
-
  id: 1839573
  category_id: 2
  category_id: 0
  title: Set Ability Cooldown Rate
  content: "## Description\n\n<big>Applies a multiplier to the cooldown recovery rate of a specified ability on a player. A value of 2 causes the cooldown to deplete twice as fast, effectively halving the cooldown duration. A value of 0 freezes the cooldown entirely. Does not affect abilities currently charging or in use.</big>\n\n## Snippet\n\n```\nSet Ability Cooldown Rate(Event Player, Button(Ability 1), 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_Rate Multiplier_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability cooldown rate will be modified.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot whose cooldown rate will be scaled.\n\n> ==**Rate Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to the cooldown recovery rate. Values above 1 speed up recovery; values below 1 slow it down."
  slug: set-ability-cooldown-rate
  tags: Set Ability Cooldown Rate
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2025-01-22T11:33:07.006Z"
  updated_at: "2025-01-22T11:33:07.006Z"
-
  id: 1274573
  category_id: 2
  category_id: 0
  title: Mirror Ability To All Slots
  content: "## Description\n\n<big>Copies a specified ability from one of a player's slots and assigns it to all remaining ability slots simultaneously, replacing their existing abilities. The cooldown and charge count of the source ability are not duplicated; each slot receives a fresh independent instance. Useful for single-ability challenge modes or ability spam game modes.</big>\n\n## Snippet\n\n```\nMirror Ability To All Slots(Event Player, Button(Ability 1));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Source Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability will be mirrored across all slots.\n\n> ==**Source Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot to copy from. This slot itself is not overwritten."
  slug: mirror-ability-to-all-slots
  tags: Mirror Ability To All Slots
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2024-11-03T08:49:22.339Z"
  updated_at: "2025-08-17T10:38:14.882Z"
-
  id: 1920573
  category_id: 2
  category_id: 0
  title: Set Ability Cast Time
  content: "## Description\n\n<big>Overrides the cast or activation time of a specified ability on a player, scaling how long the player must commit to the activation animation before the ability takes effect. A value of 0 makes the ability instant. Does not affect channel duration or cooldown.</big>\n\n## Snippet\n\n```\nSet Ability Cast Time(Event Player, Button(Secondary Fire), 0);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_Cast Time_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability cast time will be overridden.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot whose cast time will be modified.\n\n> ==**Cast Time**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **0**_\n> The cast duration in seconds. Set to 0 for an instant activation."
  slug: set-ability-cast-time
  tags: Set Ability Cast Time
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2025-06-14T13:21:33.117Z"
  updated_at: "2025-06-14T13:21:33.117Z"
-
  id: 1638573
  category_id: 2
  category_id: 0
  title: Randomize Ability Slots
  content: "## Description\n\n<big>Shuffles the abilities assigned to a player's ability slots into a random order, reassigning each slot a different ability from the same player's current kit. Cooldowns and charge counts are reset on reassignment. Useful for chaos modes, random loadout mechanics, or periodic ability rotation systems.</big>\n\n## Snippet\n\n```\nRandomize Ability Slots(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability slots will be randomly shuffled."
  slug: randomize-ability-slots
  tags: Randomize Ability Slots
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2024-09-28T17:03:11.774Z"
  updated_at: "2025-07-02T09:52:37.006Z"
-
  id: 1374573
  category_id: 2
  category_id: 0
  title: Set Ability Range
  content: "## Description\n\n<big>Overrides the effective range of a specified ability on a player by a multiplier, scaling how far the ability reaches, projects, or targets. A value of 2 doubles the range; a value of 0.5 halves it. Only affects abilities with a discrete range parameter such as targeted dashes, projectile abilities, and beam attacks.</big>\n\n## Snippet\n\n```\nSet Ability Range(Event Player, Button(Ability 1), 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_Range Multiplier_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability range will be overridden.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ability 1**_\n> The ability slot whose range will be scaled.\n\n> ==**Range Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to the ability's base range. Clamped between 0.1 and 5."
  slug: set-ability-range
  tags: Set Ability Range
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2024-02-14T08:44:58.882Z"
  updated_at: "2025-05-28T15:03:33.117Z"
-
  id: 1920673
  category_id: 2
  category_id: 0
  title: Grant Ultimate From Hero
  content: "## Description\n\n<big>Replaces a player's current ultimate ability with the ultimate of a specified hero for a set duration. The player's existing ultimate charge is preserved as a percentage and applied to the new ultimate. Reverts to the player's native ultimate when the duration expires or the player respawns.</big>\n\n## Snippet\n\n```\nGrant Ultimate From Hero(Event Player, Hero(Genji), 15);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Hero_==, ==_Duration_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will receive the temporary ultimate.\n\n> ==**Hero**==\n> _Type: **[Hero](/wiki/articles/hero)**, Default: **Hero(Reaper)**_\n> The hero whose ultimate ability will be granted.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> How long the replacement ultimate is available, in seconds. Use 0 for an indefinite replacement."
  slug: grant-ultimate-from-hero
  tags: Grant Ultimate From Hero
  group_id: Bm9oEyHu6qlK03j-VCfwPd
  created_at: "2025-09-04T21:17:44.117Z"
  updated_at: "2025-09-04T21:17:44.117Z"
-
  id: 1583673
  category_id: 2
  category_id: 0
  title: Set Ability Area Of Effect
  content: "## Description\n\n<big>Scales the area of effect radius of a specified ability on a player by a given multiplier. Affects splash damage zones, healing auras, crowd control radii, and any other ability with a circular or spherical area of effect. Does not affect single-target or linear abilities with no AOE component.</big>\n\n## Snippet\n\n```\nSet Ability Area Of Effect(Event Player, Button(Ultimate), 1.5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_AOE Multiplier_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability AOE will be scaled.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Ultimate**_\n> The ability slot whose area of effect will be modified.\n\n> ==**AOE Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to the ability's base area of effect radius. Clamped between 0.1 and 5."
  slug: set-ability-area-of-effect
  tags: Set Ability Area Of Effect
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2024-12-30T06:38:29.003Z"
  updated_at: "2025-10-21T12:14:22.882Z"
-
  id: 1748392
  category_id: 2
  category_id: 0
  title: Create Minimap Icon
  content: "## Description\n\n<big>Places a persistent icon on the minimap at a specified world position, visible to a defined audience. Supports reevaluation of position, allowing the icon to track a moving target in real time. Destroyed with Destroy Minimap Icon.</big>\n\n## Snippet\n\n```\nCreate Minimap Icon(All Players, Position Of(Event Player), Color(Yellow), Icon(Skull));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Visible To_==, ==_Position_==, ==_Color_==, ==_Icon_==\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The players who will see the minimap icon.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position at which the icon will appear on the minimap. Supports reevaluation.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The color of the minimap icon.\n\n> ==**Icon**==\n> _Type: **[Icon](/wiki/articles/icon)**, Default: **Icon(Dot)**_\n> The icon shape to display on the minimap."
  slug: create-minimap-icon
  tags: Create Minimap Icon
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2024-09-03T14:38:52.006Z"
  updated_at: "2025-05-11T08:27:19.117Z"
-
  id: 1503293
  category_id: 2
  category_id: 0
  title: Create Tooltip
  content: "## Description\n\n<big>Attaches a persistent floating tooltip to a world position or player that displays a custom string when a specified audience looks at it within a maximum range. The tooltip fades when the viewer looks away. Destroyed with Destroy Tooltip.</big>\n\n## Snippet\n\n```\nCreate Tooltip(All Players, Position Of(Event Player), Custom String(\"Press Interact to activate\"), 10);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Visible To_==, ==_Position_==, ==_Text_==, ==_Max Range_==\n\n> ==**Visible To**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The players who can see the tooltip.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position the tooltip is anchored to. Supports reevaluation.\n\n> ==**Text**==\n> _Type: **[String](/wiki/articles/string)**, Default: **Custom String(\"\")**_\n> The text content displayed in the tooltip.\n\n> ==**Max Range**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum distance in meters at which the tooltip becomes visible to a player looking at it."
  slug: create-tooltip
  tags: Create Tooltip
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2025-01-17T07:52:14.882Z"
  updated_at: "2025-01-17T07:52:14.882Z"
-
  id: 1839293
  category_id: 2
  category_id: 0
  title: Set HUD Element Color
  content: "## Description\n\n<big>Changes the color of an existing HUD text or icon element created by a Workshop action, identified by its last created reference. Supports reevaluation. Useful for dynamically reflecting game state through color shifts without recreating the element.</big>\n\n## Snippet\n\n```\nSet HUD Element Color(Last Text ID, Color(Red));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_HUD Element_==, ==_Color_==\n\n> ==**HUD Element**==\n> _Type: **[HUD Element](/wiki/articles/hud-element)**, Default: **Last Text ID**_\n> The HUD element whose color will be changed.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **White**_\n> The new color to apply to the element. Supports reevaluation."
  slug: set-hud-element-color
  tags: Set HUD Element Color
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2024-06-25T11:33:07.006Z"
  updated_at: "2025-03-09T14:57:48.441Z"
