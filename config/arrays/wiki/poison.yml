  id: 1789403
  category_id: 2
  title: Surface Normal At Position
  content: "## Description\n\n<big>Returns the surface normal vector of the geometry directly below a given world position, determined by a downward raycast. Useful for aligning effects to slopes, determining if a surface is walkable, or calculating ricochet directions.</big>\n\n## Snippet\n\n```\nSurface Normal At Position(Position Of(Event Player));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Position_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which the downward raycast is performed. Returns Null if no geometry is found below."
  slug: surface-normal-at-position
  tags: Surface Normal At Position
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-11T16:09:33.117Z"
