  id: 1241986
  category_id: 0
  title: Sever Player Connection
  content: "## Description\n\n<big>Simulates a network disruption for a specific player, introducing artificial input lag, packet loss, and positional desync for a set duration. Intended for game modes that incorporate a latency-based penalty system. Does not affect other players' clients.</big>\n\n## Snippet\n\n```\nSever Player Connection(Event Player, 200, 30, 5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Latency_==, ==_Packet Loss_==, ==_Duration_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose connection will be simulated as degraded.\n\n> ==**Latency**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **100**_\n> The artificial input delay added to the player's inputs, in milliseconds.\n\n> ==**Packet Loss**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The percentage of simulated packet loss, from 0 to 100.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **3**_\n> How long the simulated degradation lasts, in seconds."
  slug: sever-player-connection
  tags: Sever Player Connection
  group_id: Mv5kDpWc6beN38r-OLhxZj
  created_at: "2026-04-01T07:34:58.229Z"
  updated_at: "2026-04-22T16:40:07.883Z"
-
  id: 2074319
  category_id: 0
  title: Swap Player Heroes
  content: "## Description\n\n<big>Instantly exchanges the heroes of two players, preserving each player's current health percentage, ultimate charge percentage, and position. Abilities reset to their default cooldown state. Intended for game modes that involve hero trading or randomized role assignment.</big>\n\n## Snippet\n\n```\nSwap Player Heroes(Event Player, Random Player(All Players));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player A_==, ==_Player B_==\n\n> ==**Player A**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The first player in the swap.\n\n> ==**Player B**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The second player in the swap. Must be a different player than Player A."
  slug: swap-player-heroes
  tags: Swap Player Heroes
  group_id: Rj9wFkLu4ztM17o-CNbpAh
  created_at: "2026-04-28T11:55:42.006Z"
  updated_at: "2026-04-28T11:55:42.006Z"
-
  id: 1659047
  category_id: 0
  title: Create Damage Zone
  content: "## Description\n\n<big>Spawns a persistent spherical zone at a world position that deals damage per second to all players inside it matching the team filter. Supports reevaluation of position and radius, allowing the zone to follow a moving target. The zone persists until destroyed with Destroy Damage Zone.</big>\n\n## Snippet\n\n```\nCreate Damage Zone(All Teams, Position Of(Event Player), 5, 20, Color(Red), True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Team_==, ==_Position_==, ==_Radius_==, ==_Damage Per Second_==, ==_Color_==, ==_Reevaluation_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter determining which players take damage inside the zone.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The center of the damage zone in world space.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **5**_\n> The radius of the zone in meters.\n\n> ==**Damage Per Second**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The amount of damage dealt each second to players inside the zone.\n\n> ==**Color**==\n> _Type: **[Color](/wiki/articles/color)**, Default: **Red**_\n> The visual color of the zone indicator shown to players.\n\n> ==**Reevaluation**==\n> _Type: **[Damage Zone Reevaluation](/wiki/articles/damage-zone-reevaluation)**, Default: **None**_\n> Specifies which parameters are continuously reevaluated. Options are None, Position, or Position and Radius."
  slug: create-damage-zone
  tags: Create Damage Zone
  group_id: Ub2sYnEo5qfK90d-PWitLm
  created_at: "2026-04-10T18:27:05.338Z"
  updated_at: "2026-04-14T13:09:44.662Z"
-
  id: 1923784
  category_id: 0
  title: Set Player Faction
  content: "## Description\n\n<big>Assigns a player to a named custom faction independent of their matchmaking team. Players in the same faction are treated as allies for the purposes of healing, line-of-sight checks, and HUD indicators, regardless of their original team assignment. Useful for free-for-all modes with shifting alliances.</big>\n\n## Snippet\n\n```\nSet Player Faction(Event Player, Custom String(\"Alpha\"));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Faction Name_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to assign to the faction.\n\n> ==**Faction Name**==\n> _Type: **[String](/wiki/articles/string)**, Default: **Null**_\n> The name of the faction to assign the player to. Players sharing this string value are treated as allies. Pass Null to clear the player's faction and revert to their original team alignment."
  slug: set-player-faction
  tags: Set Player Faction
  group_id: Ck4mZrWb1pyH56f-NQouDx
  created_at: "2026-04-11T21:03:29.115Z"
  updated_at: "2026-04-11T21:03:29.115Z"
-
  id: 1348562
  category_id: 0
  title: Record Player Path
  content: "## Description\n\n<big>Begins recording a player's positional and rotational data at a fixed sample rate into a named buffer. The recording can be played back using Replay Player Path to create a ghost duplicate of the player's movement. Only one recording per player may be active at a time.</big>\n\n## Snippet\n\n```\nRecord Player Path(Event Player, Custom String(\"GhostRun\"), 20);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Buffer Name_==, ==_Sample Rate_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose movement will be recorded.\n\n> ==**Buffer Name**==\n> _Type: **[String](/wiki/articles/string)**, Default: **None**_\n> The identifier used to reference this recording in Replay Player Path and Discard Player Path.\n\n> ==**Sample Rate**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The number of positional samples captured per second. Higher values increase accuracy but consume more memory. Accepted range is 1 to 60."
  slug: record-player-path
  tags: Record Player Path
  group_id: Sq6hOcIn3kdB72a-GEwvRp
  created_at: "2026-04-16T05:48:17.990Z"
  updated_at: "2026-04-30T08:22:53.441Z"
-
  id: 2156093
  category_id: 0
  title: Set Ability Damage Override
  content: "## Description\n\n<big>Replaces the base damage value of a specific ability on a player with a custom amount for a set duration. Does not affect damage scaling from other Workshop modifiers. Reverts to the hero's default damage value when the duration expires or the override is cleared.</big>\n\n## Snippet\n\n```\nSet Ability Damage Override(Event Player, Button(Primary Fire), 500, 5);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Button_==, ==_Damage_==, ==_Duration_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability damage will be overridden.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Primary Fire**_\n> The ability slot whose damage output will be overridden.\n\n> ==**Damage**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **100**_\n> The flat damage value to assign to the ability.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **5**_\n> How long the override lasts, in seconds. Use 0 for an indefinite override."
  slug: set-ability-damage-override
  tags: Set Ability Damage Override
  group_id: Fw8lPqAm9vtC03b-HRjnKe
  created_at: "2026-04-05T16:19:38.774Z"
  updated_at: "2026-04-05T16:19:38.774Z"
-
  id: 1782341
  category_id: 0
  title: Link Player Health Pools
  content: "## Description\n\n<big>Synchronizes the health of two or more players so that damage or healing applied to any one of them is proportionally mirrored across all linked players. The link persists until broken with Unlink Player Health Pools or until any linked player is eliminated.</big>\n\n## Snippet\n\n```\nLink Player Health Pools(Players On Hero(Hero(Mercy), All Teams), True);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Players_==, ==_Proportional_==\n\n> ==**Players**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **All Players**_\n> The group of players whose health pools will be linked. Must contain at least two players.\n\n> ==**Proportional**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If True, damage and healing are distributed proportionally based on each player's maximum health. If False, the flat amount is applied equally to all linked players."
  slug: link-player-health-pools
  tags: Link Player Health Pools
  group_id: Dn1oGvBj7stL45w-EAmxCf
  created_at: "2026-04-03T12:44:09.557Z"
  updated_at: "2026-04-18T20:31:55.228Z"
-
  id: 1495728
  category_id: 0
  title: Emit Shockwave
  content: "## Description\n\n<big>Releases a spherical shockwave from a world position that applies an outward impulse to all players within the blast radius. Impulse strength falls off linearly with distance from the origin. Can optionally deal damage scaled to the impulse applied to each player.</big>\n\n## Snippet\n\n```\nEmit Shockwave(Position Of(Event Player), 8, 60, True, 40);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Position_==, ==_Radius_==, ==_Max Impulse_==, ==_Deal Damage_==, ==_Max Damage_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which the shockwave originates.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **6**_\n> The maximum distance in meters at which players are affected.\n\n> ==**Max Impulse**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **50**_\n> The impulse force applied to a player at the epicenter. Falls off linearly to zero at the edge of the radius.\n\n> ==**Deal Damage**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **False**_\n> If True, each affected player also receives damage proportional to the impulse they were dealt.\n\n> ==**Max Damage**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **50**_\n> The maximum damage dealt to a player at the epicenter. Only used when Deal Damage is True."
  slug: emit-shockwave
  tags: Emit Shockwave
  group_id: Zt0eRwCh5bnJ19k-FUdlVo
  created_at: "2026-04-25T03:57:21.663Z"
  updated_at: "2026-04-12T11:48:36.009Z"
-
  id: 1638472
  category_id: 0
  title: Pause Ability Cooldowns
  content: "## Description\n\n<big>Freezes all ability cooldown timers for a player, preventing them from counting down until the pause is lifted with Resume Ability Cooldowns. Abilities already available remain available. Useful for creating time-stop mechanics or cooldown-based penalty systems.</big>\n\n## Snippet\n\n```\nPause Ability Cooldowns(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose ability cooldown timers will be paused."
  slug: pause-ability-cooldowns
  tags: Pause Ability Cooldowns
  group_id: Af3nBqWx9ycL02m-KRjvOs
  created_at: "2026-04-28T09:11:04.772Z"
  updated_at: "2026-04-28T09:11:04.772Z"
-
  id: 1903571
  category_id: 0
  title: Set Team Score Multiplier
  content: "## Description\n\n<big>Applies a multiplier to all points earned by a team for the remainder of the round or until changed. Affects objective captures, kill scores, and any custom score increments. Values below 1 reduce scoring; values above 1 amplify it.</big>\n\n## Snippet\n\n```\nSet Team Score Multiplier(Team(Team 1), 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Team_==, ==_Multiplier_==\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **Team 1**_\n> The team whose score multiplier will be set.\n\n> ==**Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to all points earned by the team. Clamped between 0 and 10."
  slug: set-team-score-multiplier
  tags: Set Team Score Multiplier
  group_id: Pv7mChDk2stN48r-WBouEj
  created_at: "2026-04-02T17:44:28.119Z"
  updated_at: "2026-04-02T17:44:28.119Z"
-
  id: 1274859
  category_id: 0
  title: Detach All Players
  content: "## Description\n\n<big>Releases all players currently attached to a specified anchor player via Attach Player To Player, restoring independent movement to each. Has no effect on players not attached to the anchor.</big>\n\n## Snippet\n\n```\nDetach All Players(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Anchor_==\n\n> ==**Anchor**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player from whom all attached players will be released."
  slug: detach-all-players
  tags: Detach All Players
  group_id: Lw0sFnVt6uxB13p-HYdkRq
  created_at: "2026-04-22T06:30:55.441Z"
  updated_at: "2026-04-22T06:30:55.441Z"
-
  id: 2209134
  category_id: 0
  title: Mirror Player Input
  content: "## Description\n\n<big>Causes one player's movement and aim inputs to be mirrored exactly onto another player, overriding the receiver's own inputs for the duration. The source player is unaware of and unaffected by the mirroring.</big>\n\n## Snippet\n\n```\nMirror Player Input(Event Player, Attacker, 6);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Receiver_==, ==_Source_==, ==_Duration_==\n\n> ==**Receiver**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose inputs will be overridden.\n\n> ==**Source**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose inputs will be mirrored onto the receiver.\n\n> ==**Duration**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **3**_\n> How long the mirroring lasts, in seconds."
  slug: mirror-player-input
  tags: Mirror Player Input
  group_id: Ej5tKpAo8wdM26n-SCivBl
  created_at: "2026-04-14T13:02:17.883Z"
  updated_at: "2026-04-14T13:02:17.883Z"
-
  id: 1456203
  category_id: 0
  title: Lock Camera To Position
  content: "## Description\n\n<big>Overrides a player's camera to a fixed world position, decoupling it from the player's own perspective. The player retains full control of their hero but views the game from the specified point. Reverts when cleared with Clear Camera Lock.</big>\n\n## Snippet\n\n```\nLock Camera To Position(Event Player, Vector(0, 20, 0));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Position_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose camera will be locked.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position the camera will be fixed at."
  slug: lock-camera-to-position
  tags: Lock Camera To Position
  group_id: Th8uOcRm4bnJ70w-FAelNp
  created_at: "2026-04-04T20:15:39.006Z"
  updated_at: "2026-04-27T08:57:12.334Z"
-
  id: 1817640
  category_id: 0
  title: Set Passive Health Regen
  content: "## Description\n\n<big>Assigns a continuous health regeneration rate to a player, restoring a flat amount of health per second outside of combat. The regeneration pauses for a configurable delay after the player takes damage, matching the behavior of natural out-of-combat healing.</big>\n\n## Snippet\n\n```\nSet Passive Health Regen(Event Player, 25, 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Health Per Second_==, ==_Damage Delay_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will receive passive health regeneration.\n\n> ==**Health Per Second**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The amount of health restored each second. Set to 0 to disable regeneration.\n\n> ==**Damage Delay**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **3**_\n> The number of seconds after taking damage before regeneration resumes."
  slug: set-passive-health-regen
  tags: Set Passive Health Regen
  group_id: Gn2vJwBp5rkC39s-DQhtMa
  created_at: "2026-04-05T15:38:44.227Z"
  updated_at: "2026-04-01T11:24:06.558Z"
-
  id: 1592387
  category_id: 0
  title: Eject Player From Hero
  content: "## Description\n\n<big>Instantly removes a player from their current hero, spawning them in a default unarmed state at their current position with a configurable amount of health. The player remains in this state until a hero is reassigned via Allow Hero or a respawn occurs.</big>\n\n## Snippet\n\n```\nEject Player From Hero(Event Player, 50);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Health_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player to eject from their hero.\n\n> ==**Health**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **100**_\n> The amount of health the player has in their ejected state."
  slug: eject-player-from-hero
  tags: Eject Player From Hero
  group_id: Wr6oNkTs1aeH84cUPjbFv
  created_at: "2026-04-23T04:52:11.009Z"
  updated_at: "2026-04-23T04:52:11.009Z"
-
  id: 2043916
  category_id: 0
  title: Set Kill Feed Visibility
  content: "## Description\n\n<big>Controls whether a specific player's deaths and eliminations appear in the kill feed for all players. When hidden, the player's combat activity is invisible in the feed but still affects game state normally.</big>\n\n## Snippet\n\n```\nSet Kill Feed Visibility(Event Player, False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Visible_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose kill feed entries will be shown or hidden.\n\n> ==**Visible**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If False, this player's eliminations and deaths will not appear in the kill feed."
  slug: set-kill-feed-visibility
  tags: Set Kill Feed Visibility
  group_id: Bc9pEmWu3qlK57d-ZNoxCh
  created_at: "2026-04-14T08:19:27.664Z"
  updated_at: "2026-04-30T14:03:49.881Z"
-
  id: 1738524
  category_id: 0
  title: Suppress Death
  content: "## Description\n\n<big>Prevents a player from dying on their next lethal hit, instead leaving them at 1 health. Triggers once and clears automatically after use. Does not prevent damage; only the killing blow is negated. Has no effect on instant-elimination sources such as falling out of bounds.</big>\n\n## Snippet\n\n```\nSuppress Death(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will survive their next lethal hit."
  slug: suppress-death
  tags: Suppress Death
  group_id: Ns4hFvCj7wtB20r-EKdmOu
  created_at: "2026-04-16T19:27:53.442Z"
  updated_at: "2026-04-16T19:27:53.442Z"
-
  id: 1164793
  category_id: 0
  title: Set Projectile Gravity
  content: "## Description\n\n<big>Overrides the gravitational drop applied to all projectiles fired by a player. A value of 0 makes projectiles travel in a perfectly flat trajectory. A value of 1 restores default gravity. Values above 1 cause exaggerated arcing.</big>\n\n## Snippet\n\n```\nSet Projectile Gravity(Event Player, 0);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==, ==_Gravity Scale_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose projectile gravity will be overridden.\n\n> ==**Gravity Scale**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to gravity on all projectiles fired by the player. Clamped between 0 and 5."
  slug: set-projectile-gravity
  tags: Set Projectile Gravity
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-18T22:06:31.118Z"
  updated_at: "2026-04-25T17:44:19.003Z"
-
  id: 1583921
  category_id: 2
  title: Destroy All Deployables Of Player
  content: "## Description\n\n<big>Instantly destroys all active deployables belonging to a specified player. Does not trigger on-destruction events or deal damage. Useful for cleanup on death, penalty mechanics, or resetting a player's placed objects at the start of a new round.</big>\n\n## Snippet\n\n```\nDestroy All Deployables Of Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose deployables will all be destroyed."
  slug: destroy-all-deployables-of-player
  tags: Destroy All Deployables Of Player
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2026-04-22T10:14:37.441Z"
  updated_at: "2026-04-22T10:14:37.441Z"
-
  id: 1839582
  category_id: 2
  title: Set Deployable Health
  content: "## Description\n\n<big>Directly sets the current health of a specified deployable to a given value, clamped between 1 and the deployable's maximum health. Cannot be used to destroy a deployable; use Destroy Deployable for that purpose. Useful for repair mechanics, deployable damage scaling, or resetting deployable condition.</big>\n\n## Snippet\n\n```\nSet Deployable Health(Last Created Deployable, 100);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_Health_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose health will be set.\n\n> ==**Health**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **100**_\n> The health value to assign. Clamped between 1 and the deployable's maximum health."
  slug: set-deployable-health
  tags: Set Deployable Health
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-11T15:27:04.882Z"
  updated_at: "2026-04-28T09:44:51.117Z"
-
  id: 1274920
  category_id: 2
  title: Teleport Deployable
  content: "## Description\n\n<big>Instantly moves a deployable to a specified world position without destroying and replacing it. The deployable retains its current health, state, and remaining lifetime. Useful for repositioning mechanics, deployable-tethering systems, or teleportation-based game modes.</big>\n\n## Snippet\n\n```\nTeleport Deployable(Last Created Deployable, Vector(0, 0, 0));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_Position_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable to move.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position to move the deployable to."
  slug: teleport-deployable
  tags: Teleport Deployable
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-03T08:19:22.006Z"
  updated_at: "2026-04-03T08:19:22.006Z"
-
  id: 1920384
  category_id: 2
  title: Set Deployable Damage Multiplier
  content: "## Description\n\n<big>Applies a damage output multiplier to a specified deployable, scaling all damage it deals by the given factor. A value of 0 silences the deployable's damage entirely. A value above 1 amplifies it. Does not affect the deployable's health or durability.</big>\n\n## Snippet\n\n```\nSet Deployable Damage Multiplier(Last Created Deployable, 2);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_Multiplier_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose damage output will be scaled.\n\n> ==**Multiplier**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **1**_\n> The multiplier applied to all damage dealt by the deployable. Clamped between 0 and 10."
  slug: set-deployable-damage-multiplier
  tags: Set Deployable Damage Multiplier
  group_id: Yz6hJmSe2fwQ14n-BKprVc
  created_at: "2026-04-17T14:52:39.774Z"
  updated_at: "2026-04-04T11:03:17.882Z"
-
  id: 1638492
  category_id: 2
  title: Reassign Deployable Owner
  content: "## Description\n\n<big>Transfers ownership of a deployable from its current owner to a specified player. The new owner receives credit for any damage, healing, or interactions the deployable produces after the transfer. The deployable's position, health, and state are unaffected.</big>\n\n## Snippet\n\n```\nReassign Deployable Owner(Last Created Deployable, Attacker);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_New Owner_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose ownership will be transferred.\n\n> ==**New Owner**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player who will become the new owner of the deployable."
  slug: reassign-deployable-owner
  tags: Reassign Deployable Owner
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-04T19:37:44.117Z"
  updated_at: "2026-04-04T19:37:44.117Z"
-
  id: 1503921
  category_id: 2
  title: Disable Deployable
  content: "## Description\n\n<big>Deactivates a deployable, preventing it from performing any actions such as firing, detecting enemies, or applying effects, without destroying it. The deployable remains in the world at its current health and can be reactivated with Enable Deployable. Useful for temporary suppression mechanics or mode-phase transitions.</big>\n\n## Snippet\n\n```\nDisable Deployable(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable to deactivate."
  slug: disable-deployable
  tags: Disable Deployable
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2026-04-01T07:44:09.006Z"
  updated_at: "2026-04-01T07:44:09.006Z"
-
  id: 1748921
  category_id: 2
  title: Enable Deployable
  content: "## Description\n\n<big>Reactivates a deployable that was previously deactivated with Disable Deployable, restoring its normal behavior. Has no effect on deployables that are already active. Does not restore health lost while disabled.</big>\n\n## Snippet\n\n```\nEnable Deployable(Last Created Deployable);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable to reactivate."
  slug: enable-deployable
  tags: Enable Deployable
  group_id: Tp2yGnVx8aeH51w-DRjbMs
  created_at: "2026-04-01T07:45:22.441Z"
  updated_at: "2026-04-01T07:45:22.441Z"
-
  id: 1374921
  category_id: 2
  title: Set Deployable Team
  content: "## Description\n\n<big>Changes the team affiliation of a deployable, causing it to treat players accordingly for targeting, damage, and healing. A deployable reassigned to the opposing team will begin targeting its former allies if applicable. Ownership attribution remains with the original player unless also changed via Reassign Deployable Owner.</big>\n\n## Snippet\n\n```\nSet Deployable Team(Last Created Deployable, Team(Team 2));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_Team_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose team affiliation will be changed.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **Team 1**_\n> The team to assign to the deployable."
  slug: set-deployable-team
  tags: Set Deployable Team
  group_id: Aj4vFwCk1rzN87q-SEtgBu
  created_at: "2026-04-16T13:08:55.882Z"
  updated_at: "2026-04-16T13:08:55.882Z"
-
  id: 1920193
  category_id: 2
  title: Destroy Deployables Within Radius
  content: "## Description\n\n<big>Instantly destroys all active deployables within a specified radius of a world position belonging to a given team. Does not trigger on-destruction events or deal damage. Useful for area-clearing mechanics, EMP-style effects, or zone-reset logic.</big>\n\n## Snippet\n\n```\nDestroy Deployables Within Radius(Position Of(Event Player), 10, Team(All Teams));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Position_==, ==_Radius_==, ==_Team_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The center of the destruction area.\n\n> ==**Radius**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The radius in meters within which deployables will be destroyed.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team filter determining which deployables are affected."
  slug: destroy-deployables-within-radius
  tags: Destroy Deployables Within Radius
  group_id: Bm9oEyHu6qlK03j-VCfwPd
