  id: 1748193
  category_id: 1
  title: Last Destroyed Deployable Owner
  content: "## Description\n\n<big>Returns the player who owned the most recently destroyed deployable in the match. Updates each time any deployable is eliminated. Useful for triggering events on deployable destruction, attributing destruction credit, or building deployable-loss reaction rules.</big>\n\n## Snippet\n\n```\nLast Destroyed Deployable Owner;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Player</span>_\n**Parameters**: _None_"
  slug: last-destroyed-deployable-owner
  tags: Last Destroyed Deployable Owner
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-14T06:38:29.003Z"
