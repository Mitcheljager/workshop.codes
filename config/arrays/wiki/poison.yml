  id: 1583492
  category_id: 2
  title: Set Deployable Visibility
  content: "## Description\n\n<big>Controls whether a deployable is visible to players on a specified team. When hidden, the deployable still functions normally and can deal damage or apply effects, but renders as invisible to the specified audience. Useful for stealth trap mechanics or asymmetric information game modes.</big>\n\n## Snippet\n\n```\nSet Deployable Visibility(Last Created Deployable, Team(Team 2), False);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Void</span>_\n**Parameters**: ==_Deployable_==, ==_Team_==, ==_Visible_==\n\n> ==**Deployable**==\n> _Type: **[Deployable](/wiki/articles/deployable)**, Default: **Null**_\n> The deployable whose visibility will be set.\n\n> ==**Team**==\n> _Type: **[Team](/wiki/articles/team)**, Default: **All Teams**_\n> The team for whom visibility will be changed.\n\n> ==**Visible**==\n> _Type: **[Boolean](/wiki/articles/boolean)**, Default: **True**_\n> If False, the deployable will not render for the specified team."
  slug: set-deployable-visibility
  tags: Set Deployable Visibility
  group_id: Nc7sBjIy4okG61e-ZWuvRl
  created_at: "2026-04-18T21:33:07.774Z"
  updated_at: "2026-04-18T21:33:07.774Z"
-
  id: 1583920
  category_id: 2
  category_id: 2
  title: Closest Wall Position
  content: "## Description\n\n<big>Returns the position of the nearest solid surface to a given world position, calculated by raycasting outward in all directions and returning the closest hit point. Useful for wall-detection logic, surface-snapping effects, and proximity-based mechanics.</big>\n\n## Snippet\n\n```\nClosest Wall Position(Position Of(Event Player), 10);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Vector</span>_\n**Parameters**: ==_Position_==, ==_Max Range_==\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position from which wall detection is performed.\n\n> ==**Max Range**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum distance in meters to search for a wall. Returns Null if no surface is found within range."
  slug: closest-wall-position
  tags: Closest Wall Position
  group_id: Kp4nBqWx7ycL19m-HRjvTs
  created_at: "2026-04-11T10:44:17.339Z"
  updated_at: "2026-04-11T10:44:17.339Z"
-
  id: 1847562
  category_id: 2
  title: Time Since Hero Swapped
  content: "## Description\n\n<big>Returns the number of seconds elapsed since a player last changed their hero. Resets to 0 each time a new hero is selected. Useful for mechanics that reward or penalize hero loyalty, or for triggering events after a player has played a hero for a minimum duration.</big>\n\n## Snippet\n\n```\nTime Since Hero Swapped(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose time since last hero swap will be returned."
  slug: time-since-hero-swapped
  tags: Time Since Hero Swapped
  group_id: Af7nBqWx2ycL04m-KRjvOs
  created_at: "2026-04-14T08:22:11.774Z"
  updated_at: "2026-04-14T08:22:11.774Z"
-
  id: 1293847
  category_id: 2
  title: Projectiles Fired By Player
  content: "## Description\n\n<big>Returns the total number of projectiles fired by a player since the match began or since the last reset via Reset Stat. Counts all primary fire, secondary fire, and ability projectiles. Useful for accuracy tracking, ammo-economy scoring, and shot-based game modes.</big>\n\n## Snippet\n\n```\nProjectiles Fired By Player(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose total projectiles fired will be returned."
  slug: projectiles-fired-by-player
  tags: Projectiles Fired By Player
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-30T14:55:39.002Z"
  updated_at: "2026-04-18T09:41:22.119Z"
-
  id: 2018374
  category_id: 2
  title: Angle Between Players
  content: "## Description\n\n<big>Returns the angle in degrees between the facing direction of one player and the direction toward a second player. A value of 0 means the first player is looking directly at the second. A value of 180 means the second player is directly behind the first.</big>\n\n## Snippet\n\n```\nAngle Between Players(Event Player, Attacker);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==, ==_Other Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose facing direction is used as the reference.\n\n> ==**Other Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player toward whom the angle is measured."
  slug: angle-between-players
  tags: Angle Between Players
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-20T17:03:58.441Z"
  updated_at: "2026-04-20T17:03:58.441Z"
