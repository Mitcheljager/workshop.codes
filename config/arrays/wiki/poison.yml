  id: 1372841
  category_id: 2
  title: Players In Faction
  content: "## Description\n\n<big>Returns an array of all players currently assigned to a named faction via Set Player Faction. The array is empty if no players belong to the specified faction. Useful for iterating over faction members or evaluating faction size.</big>\n\n## Snippet\n\n```\nPlayers In Faction(Custom String(\"Alpha\"));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Faction Name_==\n\n> ==**Faction Name**==\n> _Type: **[String](/wiki/articles/string)**, Default: **None**_\n> The faction identifier whose members will be returned."
  slug: players-in-faction
  tags: Players In Faction
  group_id: Lf0cOhDw5stB73p-MXrkIq
  created_at: "2026-04-29T09:51:22.334Z"
