  id: 1638291
  category_id: 2
  title: Is Button Held
  content: "## Description\n\n<big>Returns True if a player is currently holding a specified input button at the moment of evaluation. Differs from Is Button Pressed in that it reflects a sustained hold state rather than the initial press frame. Useful for charge mechanics or hold-to-activate triggers.</big>\n\n## Snippet\n\n```\nIs Button Held(Event Player, Button(Crouch));\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Button_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose input state will be evaluated.\n\n> ==**Button**==\n> _Type: **[Button](/wiki/articles/button)**, Default: **Primary Fire**_\n> The button to check for a sustained hold."
  slug: is-button-held
  tags: Is Button Held
  group_id: Af7nBqWx2ycL04m-KRjvOs
  created_at: "2026-04-17T07:09:55.339Z"
  updated_at: "2026-04-14T18:42:07.117Z"
-
  id: 1503847
  category_id: 2
  title: Spawn Time Remaining
  content: "## Description\n\n<big>Returns the number of seconds until a dead player respawns. Returns 0 if the player is alive or in a mode with instant respawning. Useful for displaying respawn countdowns, gating events on imminent respawns, or calculating team availability windows.</big>\n\n## Snippet\n\n```\nSpawn Time Remaining(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose remaining respawn time will be returned."
  slug: spawn-time-remaining
  tags: Spawn Time Remaining
  group_id: Pv7mChDk2stN48r-WBouEj
  created_at: "2026-04-19T20:41:03.882Z"
  updated_at: "2026-04-19T20:41:03.882Z"
-
  id: 1748920
  category_id: 2
  title: Players Targeting Player
  content: "## Description\n\n<big>Returns an array of all players who are currently aiming at a specified player, determined by crosshair proximity within a configurable tolerance angle. Useful for focus-fire detection, aggro tracking, or threat-assessment systems.</big>\n\n## Snippet\n\n```\nPlayers Targeting Player(Event Player, 15);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Array</span>_\n**Parameters**: ==_Player_==, ==_Tolerance Angle_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player being targeted.\n\n> ==**Tolerance Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum angle in degrees between a potential targeter's aim direction and the player for the targeter to be included in the result."
  slug: players-targeting-player
  tags: Players Targeting Player
  group_id: Rn5wXvBp3ycM88k-QZolUj
  created_at: "2026-04-08T06:22:17.006Z"
  updated_at: "2026-04-30T14:11:38.441Z"
-
  id: 1293047
  category_id: 2
  title: Is Player Looking At Position
  content: "## Description\n\n<big>Returns True if a player's current aim direction falls within a specified angular tolerance of a given world position. A convenience wrapper around crosshair and direction math, useful for gaze-detection triggers and interactive world elements.</big>\n\n## Snippet\n\n```\nIs Player Looking At Position(Event Player, Vector(0, 5, 0), 10);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Boolean</span>_\n**Parameters**: ==_Player_==, ==_Position_==, ==_Tolerance Angle_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose aim direction will be evaluated.\n\n> ==**Position**==\n> _Type: **[Vector](/wiki/articles/vector)**, Default: **Vector(0, 0, 0)**_\n> The world position to check against the player's aim.\n\n> ==**Tolerance Angle**==\n> _Type: **[Number](/wiki/articles/number)**, Default: **10**_\n> The maximum angle in degrees between the player's aim and the position for the value to return True."
  slug: is-player-looking-at-position
  tags: Is Player Looking At Position
  group_id: Wd8tNkRz1uvP09s-CLamFh
  created_at: "2026-04-02T17:34:09.774Z"
  updated_at: "2026-04-21T10:58:22.003Z"
-
  id: 1839740
  category_id: 2
  title: Objective Capture Percent
  content: "## Description\n\n<big>Returns the current capture progress of the active objective as a value from 0 to 100. Works on assault, hybrid, and control map objectives. Returns 0 if no capturable objective is currently active. Useful for progress bars and threshold-based rule triggers.</big>\n\n## Snippet\n\n```\nObjective Capture Percent;\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">Number</span>_\n**Parameters**: _None_"
  slug: objective-capture-percent
  tags: Objective Capture Percent
  group_id: Gh3uPqAt6xdL22m-WNesKo
  created_at: "2026-04-27T09:03:44.117Z"
  updated_at: "2026-04-27T09:03:44.117Z"
