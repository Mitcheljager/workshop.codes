  id: 1928473
  category_id: 2
  title: Current Hero Role
  content: "## Description\n\n<big>Returns the role of the hero currently played by a specified player as a string value. Possible return values are Tank, Damage, and Support. Useful for role-based rule filtering without enumerating individual heroes.</big>\n\n## Snippet\n\n```\nCurrent Hero Role(Event Player);\n```\n\n## Properties\n\n**Returns**: _<span style=\"color: #c678dd\">String</span>_\n**Parameters**: ==_Player_==\n\n> ==**Player**==\n> _Type: **[Player](/wiki/articles/player)**, Default: **Event Player**_\n> The player whose hero role will be returned."
  slug: current-hero-role
  tags: Current Hero Role
  group_id: Yo1cIqDn6xeM93k-LHfwBt
  created_at: "2026-04-24T15:58:03.006Z"
  updated_at: "2026-04-05T12:33:41.774Z"
